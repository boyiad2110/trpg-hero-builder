<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超級英雄建檔工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chocolate+Classical+Sans&family=IBM+Plex+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --night:#f6f2e8; --paper:#fffdf6; --ink:#181a20; --ink-soft:#5b5b66;
  --rule:#d9d2c0; --red:#cf3529; --gold:#ffd23f; --green:#1e8e7e;
  --cyan:#0e94b4; --cyan-ink:#0a5d72;
  --line:2px solid var(--ink);
  --shadow:4px 4px 0 rgba(24,26,32,.9);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--night);
  background-image:radial-gradient(rgba(24,26,32,.055) 1px,transparent 1.2px);
  background-size:16px 16px;
  color:var(--ink); line-height:1.7; min-height:100vh; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold)}
.display{font-family:"Chocolate Classical Sans","Noto Sans TC",sans-serif;font-weight:400}
.mono{font-family:"IBM Plex Mono","Noto Sans TC",monospace}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* 報頭 */
.masthead{padding:54px 0 30px;text-align:center}
.eyebrow{display:inline-block;font-family:"IBM Plex Mono",monospace;font-weight:700;
  letter-spacing:.28em;font-size:.7rem;text-transform:uppercase;color:var(--cyan-ink);
  border:2px solid var(--cyan);background:var(--paper);padding:5px 12px 5px 16px;
  border-radius:3px;box-shadow:3px 3px 0 rgba(14,148,180,.35);margin-bottom:20px}
.wordmark{font-size:clamp(2.6rem,8vw,4.8rem);line-height:1.05;letter-spacing:.05em;
  color:var(--ink);text-shadow:.05em .05em 0 var(--cyan)}
.wordmark .wm-part{display:inline-block;white-space:nowrap}
.tagline{margin-top:16px;color:var(--ink-soft);font-size:clamp(.95rem,2.4vw,1.1rem);max-width:none}
.count-strip{margin-top:26px;display:inline-flex;align-items:center;gap:14px;font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.82rem;letter-spacing:.12em;color:var(--ink-soft)}
.count-strip b{color:var(--ink);font-size:1.05rem}
.count-strip .ln{display:inline-block;width:34px;height:2px;background:var(--rule)}

/* 卡片牆（檔案夾風格） */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:14px 0 70px}
.card{position:relative;background:var(--paper);color:var(--ink);border:var(--line);
  border-radius:0 8px 8px 8px;box-shadow:var(--shadow);margin-top:20px;
  padding:22px 20px 20px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease;
  outline:none;display:flex;flex-direction:column}
.card-top{display:flex;justify-content:flex-end;align-items:center;gap:10px;min-height:20px}
.card-en{position:absolute;top:-20px;left:-2px;height:22px;display:inline-flex;
  align-items:center;background:var(--paper);border:var(--line);border-bottom:none;
  border-radius:8px 8px 0 0;padding:0 12px;font-family:"IBM Plex Mono",monospace;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:.66rem;
  color:var(--cyan-ink);white-space:nowrap;max-width:calc(100% - 8px);
  overflow:hidden;text-overflow:ellipsis}

@media(hover:hover){
  .card:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--cyan)}
  .card.sel:hover{box-shadow:8px 8px 0 var(--green)}
  .land-card:hover:not(:disabled){transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--cyan)}
}
.card:focus-visible{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--cyan)}
.card.sel{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--green)}

/* 橡皮章 */
.role-badge{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.66rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--red);
  border:2px solid var(--red);border-radius:3px;padding:1px 8px;
  transform:rotate(-3deg);white-space:nowrap}
.card-name{font-size:2rem;line-height:1.1;margin:12px 0 4px;color:var(--ink)}
.card-hex{display:flex;justify-content:center;margin:4px 0 10px}
.card-intro{font-size:.9rem;color:var(--ink-soft)}
.card-cta{margin-top:auto;padding-top:16px;font-family:"IBM Plex Mono",monospace;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;display:flex;align-items:center;gap:6px}
.card-cta::after{content:"→";transition:transform .14s ease}
@media(hover:hover){ .card:hover .card-cta::after{transform:translateX(4px)} }
.card.sel .card-cta{color:var(--green)}
.card.sel .card-cta::after{content:"✓";transform:none}
.prof-card.sel .card-cta::after{content:"→";transform:none}

/* 雷達圖色彩 */
.hex-grid{stroke:var(--rule);stroke-width:1;fill:none}
.hex-spoke{stroke:#e6dfcd;stroke-width:1}
.hex-shape{fill:rgba(14,148,180,.18);stroke:var(--cyan);stroke-width:2.5;stroke-linejoin:round}
.hex-dot{fill:var(--cyan-ink)}
.hex-num{font-family:"IBM Plex Mono",monospace;font-weight:700;fill:var(--ink)}
.hex-name{font-family:"Noto Sans TC",sans-serif;font-weight:700;fill:var(--ink-soft)}

/* 覆蓋頁 */
.screen{display:none;position:fixed;inset:0;z-index:40;background:var(--night);
  background-image:radial-gradient(rgba(24,26,32,.055) 1px,transparent 1.2px);
  background-size:16px 16px;overflow-y:auto}
.screen.on{display:block}
.screen-inner{max-width:1000px;margin:0 auto;padding:calc(26px + env(safe-area-inset-top)) 24px 90px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 24px;gap:12px;flex-wrap:wrap}

/* 按鈕：壓印效果 */
.btn{font-family:"IBM Plex Mono","Noto Sans TC",monospace;font-weight:700;
  letter-spacing:.06em;font-size:.84rem;padding:10px 18px;border-radius:4px;
  cursor:pointer;border:2px solid var(--ink);background:var(--paper);color:var(--ink);
  box-shadow:3px 3px 0 var(--ink);display:inline-flex;align-items:center;gap:8px;
  transition:transform .1s ease,box-shadow .1s ease,background .12s ease}
.btn:hover{background:#fff}
.btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.btn-gold{background:var(--gold)}
.btn-gold:hover{background:#ffdb63}
.btn-ghost{background:transparent;box-shadow:none;border-color:var(--ink-soft);color:var(--ink-soft)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.btn-ink{background:var(--paper);color:var(--ink);border-color:var(--ink)}
.btn-ink:hover{background:#fff}
.btn[disabled]{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}

/* 建檔區塊 */
.builder-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:8px;color:var(--ink)}
.builder-head .display{font-size:clamp(1.8rem,5vw,2.6rem)}
.builder-name{color:var(--cyan-ink)}
.builder-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.builder-en{font-family:"IBM Plex Mono",monospace;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem;color:var(--ink-soft)}
.builder-role{font-family:"IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;font-size:.78rem;border:2px solid var(--ink);color:var(--ink);padding:3px 10px;border-radius:3px;transform:rotate(-2deg)}
.builder-tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.builder-sub{color:var(--ink-soft);margin-bottom:16px}
.builder-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:30px;align-items:start}
.builder-col{display:flex;flex-direction:column;gap:18px;min-width:0}

.bsec{background:var(--paper);border:2px solid var(--rule);border-radius:6px;padding:18px 18px 20px;box-shadow:2px 2px 0 rgba(24,26,32,.05)}
.sec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.sec-title{font-size:1.4rem;color:var(--ink)}
.sec-hint{display:block;font-size:.75rem;color:var(--ink-soft);margin-top:2px;letter-spacing:.04em}
.dice-btn{flex:none;background:#fff;border:2px solid var(--ink);color:var(--ink);font-family:"IBM Plex Mono",monospace;font-size:.74rem;letter-spacing:.06em;padding:6px 11px;border-radius:3px;cursor:pointer;box-shadow:2px 2px 0 var(--ink);transition:transform .1s,box-shadow .1s}
.dice-btn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}

/* 範型概覽 */
.ov-top{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:start;margin-bottom:18px}
.ov-intro{font-size:.98rem;color:var(--ink);line-height:1.7}
.ov-top2{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.ov-hexbox{background:#fff;border:2px solid var(--rule);border-radius:6px;padding:6px;display:flex;justify-content:center}
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.ov-stat{background:#fff;border:2px solid var(--rule);border-radius:6px;padding:12px 10px;text-align:center}
.ov-stat-up{border-color:var(--green); background:rgba(30,142,126,.05)}
.ov-stat-num{display:block;font-size:2rem;color:var(--ink);line-height:1}
.ov-stat-up .ov-stat-num{color:var(--green)}
.ov-stat-label{display:block;margin-top:5px;font-family:"IBM Plex Mono",monospace;letter-spacing:.08em;font-size:.72rem;color:var(--ink-soft)}

/* 表單 / 卷宗選項 */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:"IBM Plex Mono",monospace;letter-spacing:.1em;text-transform:uppercase;font-size:.74rem;color:var(--ink-soft);margin-bottom:7px}
.field input,.field textarea{width:100%;background:#fff;border:2px solid var(--rule);border-radius:3px;color:var(--ink);font-family:inherit;font-size:1rem;padding:11px 13px;line-height:1.6;transition:border-color .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(14,148,180,.1)}
.field textarea{resize:vertical;min-height:96px}

/* 選取與藥丸 */
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;
  border:2px solid var(--rule);border-radius:5px;cursor:pointer;margin-bottom:9px;
  background:#fff;transition:border-color .12s,background .12s}
.opt:last-child{margin-bottom:0}
.opt:hover{border-color:var(--ink-soft)}
.opt.sel{border-color:var(--ink);background:rgba(207,53,41,.05);box-shadow:inset 4px 0 0 var(--red)}
.opt-mark{flex:none;width:17px;height:17px;border:2px solid var(--ink-soft);
  border-radius:3px;margin-top:4px;position:relative;background:#fff}
.opt.sel .opt-mark{border-color:var(--ink);background:var(--red)}
.opt.sel .opt-mark::after{content:"✓";position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;color:#fff;font-size:.78rem;
  font-weight:900;line-height:1}
.opt-name{display:block;font-weight:900;color:var(--ink);margin-bottom:3px}
.opt-desc{display:block;font-size:.88rem;color:#4a4a55;line-height:1.7}
.opt.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.opt-lock{display:block;font-size:.78rem;font-weight:700;color:var(--red);margin-bottom:3px}

.pill{background:#fff;border:2px solid var(--rule);color:var(--ink-soft);
  padding:7px 16px;border-radius:30px;cursor:pointer;font-family:inherit;
  font-weight:500;font-size:.95rem;transition:background .12s,border-color .12s,color .12s}
.pill:hover{border-color:var(--ink-soft); color:var(--ink)}
.pill.sel{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.opt-pills{display:flex;flex-wrap:wrap;gap:9px}

/* 警示與標籤 */
.wip-banner{background:rgba(255,210,63,.3);border:2px dashed #c79a00;color:#6e5500;
  border-radius:6px;padding:14px 16px;margin:0 0 22px;font-weight:600;line-height:1.65}
.step-intro{color:var(--ink);line-height:1.75;margin:6px 0 18px;font-size:.95rem}
.step-intro-list{margin:-10px 0 18px;padding-left:20px;color:var(--ink);font-size:.92rem;line-height:1.7}
.step-intro-list li{margin-bottom:5px}
.tier-sel-badge{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.66rem;
  letter-spacing:.1em;text-transform:uppercase;background:var(--green);color:#fff;
  padding:3px 9px;border-radius:3px;white-space:nowrap}
.draft-badge{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.64rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);
  border:1.5px dashed var(--ink-soft);padding:3px 8px;border-radius:3px;white-space:nowrap}

.tier-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;padding:4px 0 6px}
.tier-card-paper{padding:20px 20px 18px; display:block}
.tier-card-paper .card-name{font-size:1.7rem;margin:4px 0 2px}
.prof-card-desc{font-size:.82rem;color:var(--ink-soft);line-height:1.5;margin:6px 0 12px}
.prof-modal-body{padding:2px}
.tier-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0 4px}
.tier-stat{background:var(--night);border:2px solid var(--rule);border-radius:4px;padding:8px 10px;display:flex;flex-direction:column;gap:2px;align-items:center}
.tier-stat-num{font-size:1.6rem;color:var(--ink);line-height:1;font-weight:700}
.tier-stat-label{font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:var(--ink-soft)}
.tier-hint{color:var(--ink-soft);font-style:italic;padding:6px 0}

/* 點數計 */
.points-bar{display:inline-block;background:var(--paper);border:2px solid var(--ink);
  border-radius:30px;padding:8px 18px;font-weight:700;color:var(--ink);
  box-shadow:3px 3px 0 rgba(24,26,32,.85);margin-bottom:16px}
.points-bar b{font-family:"IBM Plex Mono",monospace;color:var(--red);font-size:1.15rem}
.points-sticky{position:sticky;top:0;z-index:30;padding:10px 0 8px;margin-bottom:6px;background:linear-gradient(var(--night) 70%,transparent);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.count-bar{color:var(--ink);border-color:var(--rule);background:#fff;font-weight:600}
.count-bar b{color:var(--cyan-ink)}
.points-sticky .points-bar{margin-bottom:0}

/* 屬性加點 */
.attr-alloc{display:flex;flex-direction:column;gap:10px}
.attr-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fff;border:2px solid var(--rule);border-radius:6px;padding:12px 16px}
.attr-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.attr-name{font-weight:700;color:var(--ink);font-size:1.05rem}
.attr-desc{font-size:.8rem;color:var(--ink-soft);line-height:1.5}
.attr-stepper{display:flex;align-items:center;gap:10px;flex:none}
.step-btn{width:38px;height:38px;border-radius:4px;border:2px solid var(--ink);background:var(--paper);color:var(--ink);font-size:1.3rem;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--ink);transition:transform .1s,box-shadow .1s}
.step-btn:hover:not(:disabled){background:#fff}
.step-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
.step-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;transform:none}
.attr-val{font-size:1.8rem;color:var(--red);min-width:26px;text-align:center}
.attr-word{font-size:.85rem;color:var(--ink-soft);min-width:38px;text-align:center}
.step-nav{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 20px}
.step-chip{min-width:42px;height:38px;padding:0 14px;border-radius:30px;border:2px solid var(--rule);background:#fff;color:var(--ink-soft);font-family:"IBM Plex Mono",monospace;font-weight:700;cursor:pointer;transition:border-color .12s,background .12s,color .12s}
.step-chip:hover{border-color:var(--ink-soft); color:var(--ink)}
.step-chip.cur{background:var(--red);border-color:var(--red);color:#fff}
.step-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:26px;padding-top:18px;border-top:2px dashed var(--rule)}
.step-count{font-family:"IBM Plex Mono",monospace;color:var(--ink-soft);font-size:.85rem;white-space:nowrap}

/* 來源與成本 */
.src-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.src-card{background:#fff;border:2px solid var(--rule);border-radius:6px;padding:16px;cursor:pointer;transition:border-color .12s,background .12s;outline:none}
.src-card:hover{border-color:var(--ink-soft)}
.src-card.sel{border-color:var(--ink);background:rgba(207,53,41,.05);box-shadow:inset 4px 0 0 var(--red)}
.src-card.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.src-name{font-weight:700;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.src-tag{font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:3px}
.src-tag.free{background:var(--rule);color:var(--ink)}
.src-tag.sel{background:var(--green);color:#fff}
.cost-pill{font-family:"IBM Plex Mono","Noto Sans TC",monospace;font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;margin-left:8px}
.cost-free{background:#cdeeda;color:#12572f;border:1px solid #7fc79c}
.cost-need{background:#ffe9b0;color:#5a3d06;border:1px solid #dbb75a}
.cost-paid{background:#ddd2f5;color:#382566;border:1px solid #a893da}
.src-none-hint{display:flex;align-items:center;gap:12px;flex-wrap:wrap;color:var(--gold);font-size:.9rem;font-weight:700}
.src-desc{font-size:.86rem;color:var(--ink-soft);line-height:1.6}
.src-note{color:var(--ink-soft);font-size:.85rem;margin-top:10px;line-height:1.6}
.btn-sm{padding:6px 14px;font-size:.85rem;min-height:0}

/* 異能卡片 */
.pw-empty{color:var(--ink-soft);font-style:italic;font-size:.88rem;padding:2px 0 6px}
.pw-card{background:#fff;border:2px solid var(--rule);border-radius:6px;padding:16px;margin-bottom:12px;transition:border-color .12s}
.pw-card.added{border-color:var(--ink);box-shadow:3px 3px 0 rgba(24,26,32,.05)}
.pw-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pw-head-toggle{cursor:pointer;border-radius:5px;margin:-4px -6px;padding:4px 6px;transition:background .12s}
.pw-head-toggle:hover{background:rgba(255,210,63,.2)}
.pw-caret{color:var(--cyan);font-size:1rem;font-weight:900;width:16px;display:inline-flex;justify-content:center;flex:0 0 auto}
.pw-name{font-weight:700;color:var(--ink);font-size:1.12rem}
.pw-en{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.74rem;letter-spacing:.04em;color:var(--ink-soft);margin-left:8px;text-transform:uppercase;vertical-align:middle}
.pw-type-tag{font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:3px;background:var(--rule);color:var(--ink)}
.pw-contrib-tag{font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:3px;background:var(--paper);border:2px solid var(--gold);color:var(--ink)}
.pw-head .btn{margin-left:auto}
.pw-card-acts{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pw-card-acts .btn{margin-left:0}
.pw-desc{font-size:.9rem;color:var(--ink);line-height:1.65;margin-top:10px}
.pw-cfg-sum{margin-top:8px;font-family:"IBM Plex Mono",monospace;font-size:.84rem;font-weight:700;color:var(--cyan-ink)}
.pw-sum{margin-top:10px;display:flex;flex-direction:column;gap:5px;border-top:2px dashed var(--rule);padding-top:10px}
.pw-sum-row{display:flex;gap:10px;font-size:.86rem;line-height:1.5}
.pw-sum-k{flex:0 0 40px;color:var(--ink-soft);font-weight:700}
.pw-sum-v{color:var(--ink)}
.pw-block{margin-top:16px}
.pw-block-label{font-family:"IBM Plex Mono",monospace;font-size:.76rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;text-transform:uppercase}
.lvl-row{display:flex;flex-wrap:wrap;gap:8px}
.lvl-btn{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;padding:8px 12px;border-radius:4px;border:2px solid var(--rule);background:#fff;color:var(--ink-soft);font-family:inherit;font-weight:700;cursor:pointer;transition:border-color .1s,background .1s}
.lvl-btn:hover:not(.disabled){border-color:var(--ink);color:var(--ink)}
.lvl-btn.cur{background:var(--red);border-color:var(--red);color:#fff;box-shadow:2px 2px 0 var(--red)}
.lvl-btn.disabled{opacity:.4;cursor:not-allowed}
.lvl-na{font-family:"IBM Plex Mono",monospace;font-size:.62rem;font-weight:700;opacity:.85}
.lvl-desc{margin-top:10px;font-size:.86rem;color:var(--ink);line-height:1.6;background:var(--night);border:2px dashed var(--rule);border-radius:4px;padding:10px 14px}
.lim-tag{font-family:"IBM Plex Mono",monospace;font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--green);color:#fff;margin-left:6px}
.slot-list{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.src-group{display:flex;flex-direction:column;gap:12px}
.src-group-head{font-family:"IBM Plex Mono",monospace;text-transform:uppercase;letter-spacing:.05em;font-size:.9rem;font-weight:700;color:var(--cyan-ink);border-bottom:2px solid var(--rule);padding-bottom:6px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.src-group-count{font-size:.72rem;background:var(--rule);color:var(--ink);border-radius:20px;padding:1px 9px;font-family:inherit}
.slot-empty{border:2px dashed var(--ink-soft);border-radius:6px;padding:14px 16px;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.slot-empty-head{font-weight:700;color:var(--ink-soft);font-size:.95rem}
.slot-empty-acts{display:flex;gap:9px;flex-wrap:wrap}
.slot-add-row{margin-top:12px}

/* Modal 內元件 */
.pw-search-wrap{margin-top:12px}
.pw-search{width:100%;background:#fff;border:2px solid var(--rule);border-radius:4px;color:var(--ink);font-family:inherit;font-size:.92rem;padding:9px 12px;box-shadow:inset 2px 2px 0 rgba(0,0,0,.03)}
.pw-search:focus{outline:none;border-color:var(--cyan);box-shadow:inset 2px 2px 0 rgba(14,148,180,.1)}
.pw-inline-config{border:2px solid var(--ink);border-top:2px dashed var(--rule);border-radius:0 0 6px 6px;background:#fff;padding:16px;margin:0 0 16px;box-shadow:inset 4px 0 0 var(--red), 4px 4px 0 rgba(24,26,32,.05)}
.pw-inline-top{margin-bottom:8px}
.store-title{font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--cyan-ink);font-size:.92rem;margin:8px 0 12px}
.store-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;border:2px solid var(--rule);border-radius:6px;margin-bottom:8px;background:#fff;cursor:pointer;transition:border-color .12s}
.store-item:hover{border-color:var(--ink-soft)}
.store-item.taken{opacity:.6;border-style:dashed;cursor:not-allowed;background:var(--night)}
.store-item.taken:hover{border-color:var(--rule)}
.store-item.sel{border-color:var(--ink);background:rgba(207,53,41,.05);border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:0;border-bottom:none;box-shadow:inset 4px 0 0 var(--red)}
.cat-head{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:12px 0 8px;border:2px solid var(--rule);border-radius:6px;background:var(--night);cursor:pointer;user-select:none;transition:border-color .12s}
.cat-head:hover{border-color:var(--ink-soft)}
.cat-arrow{color:var(--cyan);font-size:.85rem;width:14px;text-align:center;font-weight:900}
.cat-name{font-weight:700;color:var(--ink);font-size:1.05rem;flex:1}
.cat-count{font-family:"IBM Plex Mono",monospace;font-size:.78rem;font-weight:700;color:var(--ink-soft);background:var(--rule);border-radius:20px;padding:1px 10px}
.store-info{display:flex;flex-direction:column;gap:4px}
.store-name{font-weight:700;color:var(--ink);font-size:1.05rem}
.store-ex{font-size:.82rem;color:var(--ink-soft)}
.src-pick-row{display:flex;flex-wrap:wrap;gap:8px}
.src-pick{font-family:inherit;font-size:.9rem;font-weight:500;padding:7px 14px;border-radius:4px;border:2px solid var(--rule);background:#fff;color:var(--ink-soft);cursor:pointer;transition:border-color .12s,color .12s}
.src-pick:hover{border-color:var(--ink);color:var(--ink)}
.src-pick.cur{background:var(--gold);color:var(--ink);border-color:var(--ink);font-weight:700;box-shadow:2px 2px 0 var(--ink)}

/* Modal 框架 */
.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(24,26,32,.72);align-items:center;justify-content:center;padding:24px}
.modal.on{display:flex}
.modal-box{background:var(--paper);border:var(--line);border-radius:8px;max-width:430px;width:100%;padding:24px;box-shadow:8px 8px 0 var(--ink)}
.modal-title{font-size:1.6rem;color:var(--ink);margin-bottom:12px}
.modal-body{white-space:pre-line;color:var(--ink);font-size:.95rem;line-height:1.75;margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap}
#choiceModal{z-index:120}
.choice-desc{color:var(--ink);font-size:.92rem;line-height:1.7;margin-bottom:10px}
.choice-q{color:var(--ink-soft);font-size:.86rem;font-weight:700;margin-bottom:2px}
#choiceActions{flex-direction:column;align-items:stretch}
#choiceActions .btn{width:100%; justify-content:center}

.modal-box-wide{max-width:680px;max-height:88vh;display:flex;flex-direction:column;padding:0}
.modal-box-wide #powerModalContent,.modal-box-wide #profModalContent{display:flex;flex-direction:column;min-height:0;flex:1}
.pw-modal-head{padding:18px 22px 12px;border-bottom:2px solid var(--rule);background:var(--night);border-radius:8px 8px 0 0}
.pw-modal-stats{display:flex;gap:14px;flex-wrap:wrap;font-family:"IBM Plex Mono",monospace;font-size:.84rem;color:var(--ink-soft);margin-top:8px}
.pw-modal-stats b{color:var(--cyan-ink)}
.pw-modal-list{overflow-y:auto;padding:12px 22px;flex:1;background:var(--paper)}
.pw-modal-foot{padding:14px 22px;border-top:2px solid var(--rule);justify-content:space-between;background:var(--night);border-radius:0 0 8px 8px}
.pw-modal-titlebar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pw-modal-titlebar .modal-title{margin-bottom:0}
.pw-buy-slot{white-space:nowrap}
.prof-done-hint{font-family:"IBM Plex Mono","Noto Sans TC",monospace;font-size:.82rem;font-weight:700;color:var(--red);align-self:center;margin-right:auto}
.prof-done-btn{margin-left:auto}

/* 其他設定 */
.bsec-sub{margin-top:22px}
.resource-badge{font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--ink);background:var(--gold);border:2px solid var(--ink);border-radius:3px;padding:4px 12px;font-size:.85rem;white-space:nowrap;box-shadow:2px 2px 0 var(--ink);transform:rotate(2deg)}
.prof-desc{color:var(--ink-soft);font-size:.92rem;line-height:1.7;margin-top:8px}
.scene-list{margin:4px 0 0;padding-left:20px;color:var(--ink);font-size:.9rem;line-height:1.75}
.scene-list li{margin-bottom:6px}
.bond-input{width:100%;margin-top:10px;background:#fff;border:2px solid var(--ink);border-radius:4px;color:var(--ink);font-family:inherit;font-size:.92rem;padding:12px;line-height:1.6;resize:vertical;box-shadow:inset 2px 2px 0 rgba(0,0,0,.03)}
.bond-input:focus{outline:none;border-color:var(--cyan);box-shadow:inset 2px 2px 0 rgba(14,148,180,.1)}
.weak-list{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.weak-card{border:2px solid var(--rule);border-radius:6px;padding:16px;background:#fff;transition:border-color .12s}
.weak-card.on{border-color:var(--ink);background:rgba(207,53,41,.03);box-shadow:inset 4px 0 0 var(--red)}
.weak-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.weak-name{font-weight:700;color:var(--ink);font-size:1.05rem;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.weak-desc{font-size:.88rem;color:var(--ink-soft);line-height:1.65}
.tal-stepper{display:flex;align-items:center;gap:12px}
.tal-count{min-width:24px;text-align:center;font-size:1.4rem;font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--red)}
.tal-lock{font-size:.8rem;font-weight:700;color:var(--ink-soft);background:var(--rule);padding:4px 10px;border-radius:4px}
.tal-subj-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.tal-chip{background:#fff;border:2px solid var(--rule);color:var(--ink-soft);padding:6px 14px;border-radius:30px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:500;transition:border-color .1s,color .1s}
.tal-chip:hover:not(.blocked){border-color:var(--ink);color:var(--ink)}
.tal-chip.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.tal-chip.blocked{opacity:.4;cursor:not-allowed;text-decoration:line-through}
.data-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:10px}
.data-card{background:#fff;border:2px solid var(--ink);border-radius:8px;padding:18px 16px;text-align:center;box-shadow:3px 3px 0 rgba(24,26,32,.85)}
.data-val{font-family:"IBM Plex Mono",monospace;font-size:2.6rem;font-weight:700;color:var(--red);line-height:1}
.data-label{font-weight:900;color:var(--ink);margin-top:6px}
.data-formula{font-size:.8rem;color:var(--ink-soft);margin-top:8px}
.data-bonus{margin-top:10px;text-align:left;background:rgba(30,142,126,.08);border:1px solid rgba(30,142,126,.4);border-radius:5px;padding:8px 10px}
.data-bonus-head{font-family:"IBM Plex Mono",monospace;font-size:.66rem;font-weight:700;letter-spacing:.08em;color:var(--green);text-transform:uppercase;margin-bottom:5px}
.data-bonus-row{display:flex;justify-content:space-between;gap:10px;font-size:.8rem;color:var(--ink);line-height:1.6}
.data-bonus-row b{color:var(--green);font-family:"IBM Plex Mono",monospace;flex:none}
.chip-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.detail-count{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.9rem;color:var(--red);white-space:nowrap;flex:none}
.detail-head-right{display:flex;align-items:center;gap:10px;flex:none}
.detail-bar{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 6px}
.detail-custom{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.detail-custom-input{flex:1;min-width:140px;background:#fff;border:2px solid var(--rule);border-radius:4px;color:var(--ink);font-family:inherit;font-size:.9rem;padding:8px 12px}
.detail-custom-input:focus{outline:none;border-color:var(--cyan);box-shadow:inset 2px 2px 0 rgba(14,148,180,.1)}
.req{color:var(--red);font-size:.7rem;font-weight:700;margin-left:4px}
.bond-block{margin-top:18px}
.bond-block:first-child{margin-top:6px}
.sec-sub-head{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan-ink);margin:0 0 6px}
.sec-sub-head-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.review-check{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px 16px;margin:6px 0 16px}
.review-item{display:flex;align-items:center;gap:8px;font-size:.88rem;color:var(--ink-soft)}
.review-item.done{color:var(--ink)}
.review-item .req{margin-left:2px;color:var(--red);font-weight:700}
.review-mark{font-family:"IBM Plex Mono",monospace;font-weight:700;color:var(--ink-soft);flex:none;opacity:.55}
.review-item.done .review-mark{color:var(--green);opacity:1}
.review-note{font-size:.9rem;line-height:1.6;padding:11px 15px;border-radius:6px;margin-bottom:10px;background:var(--paper);border:2px solid var(--rule);color:var(--ink)}
.review-note.ok{border-color:var(--green);color:var(--green);background:rgba(30,142,126,.08)}
.review-note.warn{border-color:var(--red);color:var(--red);background:rgba(207,53,41,.06)}
.detail-desc{margin-top:12px;background:rgba(207,53,41,.05);border:2px solid var(--rule);border-left:4px solid var(--red);border-radius:0 6px 6px 0;padding:12px 14px;font-size:.9rem;line-height:1.65;color:var(--ink)}
.detail-desc b{color:var(--red)}
.data-note{font-size:.82rem;color:var(--ink-soft);line-height:1.6;margin-top:12px;text-align:left;border-top:2px dashed var(--rule);padding-top:10px}
.powers{display:flex;flex-direction:column;gap:14px}
.power{border-left:4px solid var(--gold);padding-left:12px}
.power-name{font-weight:700;color:var(--ink);font-size:1.1rem;margin-bottom:3px}
.power-desc{font-size:.9rem;color:var(--ink);line-height:1.65}
.talent-slot{margin-top:14px;padding-top:16px;border-top:2px dashed var(--rule)}
.subject-inline{margin:0 0 10px 20px;padding:14px;border-left:2px dashed var(--cyan);background:rgba(14,148,180,.05);border-radius:0 6px 6px 0}
.subject-inline .sec-title{font-size:1.1rem;color:var(--cyan-ink)}
.subject-inline .sec-head{margin-bottom:10px}
.talent-hint{margin-top:12px;font-size:.85rem;color:var(--ink-soft);font-style:italic}
.kw{background:linear-gradient(transparent 12%,rgba(255,210,63,.75) 12% 88%,transparent 88%);padding:0 3px;border-radius:2px;font-weight:700}
.die{padding:.05em .42em;border-radius:.28em;font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:.9em;color:#fff}
.die6{background:var(--green)}
.die1{background:var(--red)}

/* 預覽與輸出 */
.preview-wrap{position:sticky;top:24px;min-width:0}
.preview-label{font-family:"IBM Plex Mono",monospace;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:.72rem;color:var(--ink-soft);margin-bottom:10px}
.preview{background:#eef4f5;border:var(--line);border-radius:5px;box-shadow:var(--shadow);padding:18px;font-family:"IBM Plex Mono","Noto Sans TC",monospace;white-space:pre-wrap;word-break:break-word;color:#28506a;font-size:.88rem;line-height:1.8;max-height:74vh;overflow-y:auto}
.builder-actions{margin-top:18px;display:flex;gap:14px;flex-wrap:wrap}
.progress{margin-bottom:14px;margin-top:14px}
.progress-bar{height:8px;background:var(--rule);border:2px solid var(--ink);border-radius:5px;overflow:hidden}
.progress-bar span{display:block;height:100%;transition:width .2s ease}
.progress-text{margin-top:7px;font-family:"IBM Plex Mono",monospace;font-size:.82rem;color:var(--ink-soft)}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:var(--gold);font-weight:700;padding:12px 24px;border-radius:4px;border:2px solid var(--ink);box-shadow:4px 4px 0 rgba(24,26,32,.4);opacity:0;visibility:hidden;transition:opacity .25s,transform .3s,visibility .25s;z-index:90}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

/* 著陸頁與存檔 */
.landing-options{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:10px 0 70px;max-width:780px;margin:0 auto}
.land-card{display:flex;flex-direction:column;align-items:flex-start;gap:10px;text-align:left;font:inherit;background:var(--paper);color:var(--ink);border:var(--line);border-radius:8px;padding:32px 28px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s ease,box-shadow .14s ease;position:relative}
.land-icon{font-size:2rem;color:var(--red);line-height:1;transform:rotate(-5deg)}
.land-title{font-size:2.2rem}
.land-desc{font-size:.92rem;color:var(--ink-soft);line-height:1.6}
.land-cta{margin-top:8px;font-family:"IBM Plex Mono",monospace;letter-spacing:.12em;text-transform:uppercase;font-size:.8rem;color:var(--red);font-weight:700}
.land-card-disabled{opacity:.6;cursor:not-allowed;box-shadow:2px 2px 0 rgba(24,26,32,.5)}
.land-card-disabled .land-icon,.land-card-disabled .land-cta{color:var(--ink-soft)}
.land-badge{position:absolute;top:-12px;right:16px;background:var(--gold);border:2px solid var(--ink);color:var(--ink);font-family:"IBM Plex Mono",monospace;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:3px;letter-spacing:.04em;transform:rotate(3deg)}
.reg-back{padding:20px 0 0}
.saves-title{font-size:1.8rem;margin:10px 0 16px;color:var(--ink)}
.saves-list{display:flex;flex-direction:column;gap:12px;margin-bottom:30px}
.save-item{display:flex;justify-content:space-between;align-items:center;gap:14px;background:var(--paper);color:var(--ink);border:var(--line);border-radius:0 8px 8px 8px;padding:14px 18px;box-shadow:var(--shadow)}
.save-name{font-size:1.3rem;display:block;margin-bottom:2px}
.save-sub{display:block;font-size:.78rem;color:var(--ink-soft);font-family:"IBM Plex Mono",monospace;letter-spacing:.04em}
.save-btns{display:flex;gap:8px;flex:none}
.save-btns button{font-family:"IBM Plex Mono",monospace;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:8px 14px;border-radius:3px;cursor:pointer;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);transition:transform .1s,box-shadow .1s}
.save-btns button:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
.save-load{background:var(--paper);color:var(--ink)}
.save-load:hover{background:#fff}
.save-del{background:transparent;box-shadow:none;border-color:var(--ink-soft);color:var(--ink-soft)}
.save-del:hover{border-color:var(--red);color:var(--red)}

footer{text-align:center;color:var(--ink-soft);font-size:.8rem;padding:30px 0 50px}
.prof-talent-notice{background:var(--night);border:2px dashed var(--rule);border-radius:6px;padding:12px 16px;font-size:.95rem;font-weight:500;color:var(--ink);margin:0 0 16px;line-height:1.55}
.prof-talent-notice b{color:var(--ink)}

/* 手機底部動作列 */
.mobile-bar{display:none}
@media (max-width:980px){.gallery{grid-template-columns:repeat(2,1fr)}}
@media (max-width:780px){
  .builder-grid{grid-template-columns:1fr}.preview-wrap{position:static}
  .preview{max-height:none;overflow:visible}
  .btn{min-height:44px}
  .dice-btn{min-height:42px;padding:8px 14px}
  .pill{min-height:44px;padding:10px 18px}
  .save-btns button{min-height:44px}
  .mobile-bar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;align-items:center;gap:12px;background:rgba(246,242,232,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:2px solid var(--ink);padding:10px 16px calc(10px + env(safe-area-inset-bottom));box-shadow:0 -4px 12px rgba(24,26,32,.1)}
  .mb-progress{flex:1;font-family:"IBM Plex Mono",monospace;font-size:.82rem;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);min-width:0}
  .mb-progress .mb-done{color:var(--green)}
  .mb-actions{display:flex;gap:10px;flex:none}
  .mb-actions button{font-family:"IBM Plex Mono",monospace;font-weight:700;letter-spacing:.06em;font-size:.88rem;padding:0 18px;min-height:44px;border-radius:4px;cursor:pointer;border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink)}
  .mb-actions button:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
  .mb-export{background:var(--gold);color:var(--ink)}
  .mb-copy{background:var(--paper);color:var(--ink)}
  .screen-inner{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
}
@media (max-width:640px){.data-grid{grid-template-columns:1fr}}
@media (max-width:600px){.landing-options{grid-template-columns:1fr}.ov-top2{grid-template-columns:1fr;justify-items:center}.tier-grid,.src-grid{grid-template-columns:1fr}}
@media (max-width:560px){.gallery{grid-template-columns:1fr}.attr-row{flex-direction:column;align-items:stretch;gap:10px}.attr-stepper{justify-content:space-between}}
@media (max-width:480px){.pw-modal-stats{gap:10px 12px;font-size:.75rem}.pw-modal-head{padding:14px 16px 10px}.pw-modal-titlebar .modal-title{font-size:1.3rem}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<main id="home">
  <!-- 著陸頁：兩大入口 -->
  <div id="landing" class="wrap">
    <header class="masthead">
      <span class="eyebrow">超級英雄建檔工具</span>
      <h1 class="wordmark display"><span class="wm-part">打造你的</span><span class="wm-part">超級英雄</span></h1>
    </header>
    <div class="landing-options">
      <button class="land-card" id="landArchetype">
        <span class="land-icon">◆</span>
        <span class="land-title display">選擇範型</span>
        <span class="land-cta display">快速創建角色 →</span>
      </button>
      <button class="land-card" id="landCustom">
        <span class="land-badge">尚未完成</span>
        <span class="land-icon">✦</span>
        <span class="land-title display">自創英雄</span>
        <span class="land-cta display">打造原創英雄 →</span>
      </button>
    </div>
  </div>

  <!-- 範型列表 -->
  <div id="registry" class="wrap" style="display:none">
    <div class="reg-back"><button class="btn btn-ghost" onclick="showLanding()">← 返回</button></div>
    <header class="masthead">
      <span class="eyebrow">英雄範型列表</span>
      <h1 class="wordmark display"><span class="wm-part">選擇你的</span><span class="wm-part">英雄範型</span></h1>
      <p class="tagline">挑選 1 個範型開始建檔，匯出成可分享的文字檔。</p>
    </header>
    <section id="savesSection"></section>
    <section class="gallery" id="gallery"></section>
  </div>

</main>

  {

    intro:"你將超能力直接「穿」在身上，那是最尖端的戰鬥裝甲，搭配強悍的防禦系統、火力十足的武器，以及最先進的感測器。有人說你少了戰甲就一無是處，但你很清楚事實並非如此。穿上戰甲不會讓你自動變成英雄，每當你穿上它、啟動它的瞬間，決定要當英雄的人，始終是你。",
    attrs:{格鬥:5,敏捷:6,力量:6,理智:4,直覺:5,氣場:4},
    powerSource:{options:["動力裝甲","先進科技戰鬥服","附魔胸甲"]},
    powers:[
      {name:"轟擊",desc:"你可以朝遠處的對手投射、發射、拋擲或釋放傷害性攻擊。這是傷害 3、射程 0/3 的射擊攻擊。"},
      {name:"偵測",desc:"你會自動感應你所處區塊內是否有無形能量存在，包括磁場、輻射、靈能、暗影力場、星界能量和魔法。以 1 個快速動作，你可以進行`直覺`檢定來感應 3 個區塊內是否有這類能量存在。"},
      {name:"飛行",desc:"你可以使用 1 個快速動作或完整動作來飛行最多 2 個區塊。若你主動承受 1 點壓力，則可以飛行最多 4 個區塊。"},
      {name:"強力防護",desc:"你擁有某種可以減免物理傷害的防禦形式，讓你在抵抗任何攻擊時獲得`護甲` 3。"}
    ],
    professions:[
      {name:"權貴",desc:"你過著富足繁榮的生活，可能是企業家、慈善家、投資者、社交名流或信託基金受益人。",
       talents:[
        {name:"巧妙轉移",desc:"當你受到攻擊時，若你所處區塊內有其他盟友，你可以進行`氣場`檢定（無需動作）讓該盟友替你承受攻擊。你每次使用此天賦都會承受 1 點壓力。"},
        {name:"聲名遠播",desc:"你的`聲望` +3。"},
        {name:"意外之財",desc:"你的`資源` +2。此天賦可以多次選擇。"}
      ]},
      {name:"士兵",desc:"你是軍事部隊中的戰鬥人員，例如步兵、軍官、特種部隊、傭兵或民兵。",
       talents:[
        {name:"運籌帷幄",desc:"你可以使用快速動作進行`氣場`檢定來發號施令，而不是主要動作。"},
        {name:"無堅不摧",desc:"你可以強推任何`格鬥`檢定 2 次。第 2 次強推後，每出現 1 個 :invincible-1:，你受到 1 點壓力。"},
        {name:"戰術支援",desc:"在動作場景中，作為任何檢定的特技，你可以為你所處區塊或 1 個相鄰區塊內的 1 個盟友提供戰術支援。你每花費 1 個 :invincible-6:，盟友下次的屬性檢定就 +2 骰。若你額外擲出多個 :invincible-6:，你可以自由分配給多個盟友。"}
      ]},
      {name:"技術員",desc:"你在技術領域工作，例如工程師、技工、駭客、生產專家、分析師或系統管理員。",
       talents:[
        {name:"條分縷析",desc:"你可以對你研究至少數分鐘的對象或主題進行`理智`檢定。每擲出 1 個 :invincible-6:，你可以向 GM 詢問 1 個關於該對象或主題的問題。"},
        {name:"學識淵博（科技）",desc:"當你回想、尋找或理解特定主題的資訊時，`理智`檢定 +3 骰（科技：你能透過電腦科學、程式設計、人工智慧與機器人學來理解硬體、軟體與機械）。"},
        {name:"得力助手",desc:"當你協助他人時，對方的檢定會 +2 骰（而非 +1）。"}
      ]}

    freeTalents:[
      {name:"堅強防禦",desc:"當你受到攻擊時，你可以主動承受 1 點壓力來進行格擋或閃避，而不消耗該輪的動作額度。只要有足夠的`決心`，你就可以多次使用此天賦。"},
      {name:"堅定決心",desc:"你的`最大決心` +2。此天賦最多可以選擇 5 次。"},
      {name:"極速反應",desc:"抽先攻卡時，你可以抽 2 張，而非 1 張。選擇你想保留哪一張，然後將另一張洗回牌堆。若有多名角色擁有此天賦，依喜好的順序處理，但英雄先於 NPC。"},
      {name:"忠誠護衛",desc:"若你所處區塊內有其他角色受到攻擊，你可以使用反應動作替他承受攻擊。若是肉搏攻擊則進行`格鬥`檢定；若是射擊攻擊則進行`敏捷`檢定。若你檢定成功，你會成功替對方承受攻擊。"},
      {name:"學識淵博（科技）",desc:"當你回想、尋找或理解特定主題的資訊時，`理智`檢定 +3 骰（科技：你能透過電腦科學、程式設計、人工智慧與機器人學來理解硬體、軟體與機械）。"},
      {name:"快速開火",desc:"你可以使用快速動作進行 -2 骰的射擊攻擊，而不是主要動作。"}

    personalities:["樂觀","縝密","無情","淡定","矛盾","克制"],

      {name:"虛榮",desc:"只要有人誇獎、拍馬屁，你就樂意幫忙。"},
      {name:"多慮",desc:"你會反覆分析自己做的每個決定。"}
    ]

  {
    name:"靈能者", en:"The Psychic", role:"智囊",
    intro:"你只要動念，就能觸及超凡的心靈力量。當你集中意志時，「心想事成」就不只是口號，而是現實。你之所以成為超級英雄，就是想看看自己能辦到什麼事情。因為每多讀取一個想法、每多懸浮一件物體、每多投射一幅影像，你的極限就會被推得更遠，你的內心也會變得更強大。",
    attrs:{格鬥:3,敏捷:4,力量:2,理智:4,直覺:8,氣場:9},
    powerSource:{options:["精神頓悟","超進化心智","異界存在"]},
    powers:[
      {name:"抗性",desc:"你擁有某種防禦形式，可以抵抗影響心智的效果。當你受到會造成壓力的攻擊時，此異能會提供`護甲` 3；當你抵抗【震盪】、【心靈控制】和【心靈感應】時，你的檢定會 +3 骰。此異能不會幫你抵抗因為發動異能或強推屬性檢定而承受的壓力。"},
      {name:"幻象",desc:"以 1 個完整動作，你可以讓你所處區塊或 1 個相鄰區塊內的 1 個目標看見或聽見實際上不存在的事物，或對他隱藏原本可見的事物。幻象最大可達人類尺寸，而且只能影響 1 個目標。目標可以進行被動`直覺`檢定來揭穿幻象（無需動作，不能強推）。若檢定失敗，目標會認為該幻象真實存在。幻象會持續數分鐘，但任何命中幻象的攻擊都會揭露其虛假的本質，並解除幻象效果。此異能對巨獸無效。"},
      {name:"心靈控制",desc:"以 1 個完整動作，你可以嘗試控制所處區塊或 1 個相鄰區塊內的 1 個智慧生物。對目標進行`氣場`對抗檢定（目標無需動作）。若你獲勝，目標會立刻進行 1 個完整回合（即使他該輪已經行動過），並聽從你的指示執行 1 個完整動作和 1 個快速動作（或 2 個快速動作）。之後，目標會失去他的下個回合，而且在那之前無法執行反應動作。\n在戰鬥外，你可以控制目標的行動數分鐘。在此期間，每當你強迫目標執行他通常不會做的行為時，目標可以進行`氣場`檢定來嘗試擺脫控制。此異能對巨獸無效。"},
      {name:"念動力",desc:"你可以純粹用意念舉起並移動物體和人物，而不需要接觸對方。以 1 個完整動作，你可以移動並控制你所處區塊或 1 個相鄰區塊內的 1 個固態物體或角色，重量等級最高為 4（200 公斤），並將其移動最多 2 個區塊（包括垂直移動）。你可以將此異能的重量等級上限提升最多 2 級，但必須主動承受等量壓力。\n若對非自願的角色發動此異能，你必須進行`敏捷`檢定，而對方可以進行閃避（如同閃避射擊攻擊）。若成功，你可以將目標拋向並撞穿障礙物（如同肉搏攻擊的「擊退」特技），每次撞擊都會造成 3 點傷害（護甲可以減傷）。\n你也可以使用此異能進行傷害 3，射程 0/2 的射擊攻擊，前提是你所處區塊或相鄰區塊內有物體可以投擲。\n此異能也可以用來精確操控物體，如同使用雙手一樣，例如打開車門、用鎚子敲釘子，或從容器中取出物品。特別複雜的操作需要進行`敏捷`檢定，如同使用雙手一樣。"},
      {name:"心靈感應",desc:"你可以讀取他人的思想，也可以向他們投射思想。以 1 個快速動作，你可以讀取你所處區塊或 1 個相鄰區塊內 1 個智慧生物的表層思想，或向他投射簡短的心靈訊息。你們不需要共享語言。\n以 1 個完整動作並進行`直覺`檢定，你可以更深入探查，讀取更深層的思想、邏輯或記憶。若對手正在積極抵抗，則需要對抗對方的`氣場`檢定。\n你會自動感應你所處區塊內是否有智慧生物存在。以 1 個快速動作，你可以進行`直覺`檢定來感應 3 個區塊內是否有智慧生物存在。"}
    ],
    professions:[
      {name:"專家",desc:"你在特定領域或學科中擁有極高的造詣，例如歷史學家、經濟學家、武術大師、哲學家、魔術師，或狩獵大師。",

          {name:"自然科學",desc:"你理解生命與物質世界的科學，例如生物學、化學、天文學、遺傳學、物理學與地質學。"},

      {name:"局外人",desc:"你遠離家鄉而格格不入，可能是放逐者、流浪者、難民，或來自異世界的陌生人。",
       talents:[
        {name:"非凡魅力",desc:"你可以強推任何`氣場`檢定 2 次。第 2 次強推後，每出現 1 個 :invincible-1:，你受到 1 點壓力。"},
        {name:"獨行孤狼",desc:"你不需要參與社交場景，就可以在動作場景之間恢復`決心`。你休息數分鐘就能恢復等於`氣場`的`決心`，休息數小時就能恢復所有`決心`。不過你還是得描述一下你的「非社交場景」。"},

        {name:"學識淵博（自然科學）",desc:"當你回想、尋找或理解特定主題的資訊時，`理智`檢定 +3 骰（自然科學：你理解生命與物質世界的科學，例如生物學、化學、天文學、遺傳學、物理學與地質學）。"}

  {
    name:"塑形者", en:"The Shaper", role:"輔助",
    intro:"你能夠操控宇宙最原始的力量，就跟呼吸一樣輕鬆自然。你能隨心所欲塑造周遭環境，讓一切按照你的需求變化，因此幾乎沒有關卡能攔得住你。對你來說，挑戰只是能被你「調整」的阻礙，而所謂的極限，也不過等著被你的意志改寫。",
    attrs:{格鬥:4,敏捷:7,力量:3,理智:4,直覺:5,氣場:7},
    powerSource:{options:["生物工程","魔法精通","綠色護符"]},
    powers:[
      {name:"屏障",desc:"以 1 個快速動作（或作為反應動作），你可以為自己或你所處區塊內的 1 個目標創造 1 個防護屏障。該屏障具有`護甲` 3，可以跟隨你（或目標）移動，持續數分鐘、直到被突破，或被你解除為止。你最多可以同時維持 3 個屏障。"},

/* ===================== 工具 ===================== */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtHTML(s){
  return esc(s)
    .replace(/:invincible-6:/g,'<span class="die die6">6</span>')
    .replace(/:invincible-1:/g,'<span class="die die1">1</span>')
    .replace(/`([^`]+)`/g,'<span class="kw">$1</span>')
    .replace(/\n/g,'<br>');
}
function fmtTxt(s){return s.replace(/:invincible-6:/g,'［6］').replace(/:invincible-1:/g,'［1］').replace(/`([^`]+)`/g,'$1');}
function indent(s,pad){pad=pad||"  ";return s.split("\n").map(l=>pad+l).join("\n");}
function talentExport(t,subjIdx){
  let name=t.name, body=fmtTxt(t.desc);
  if(t.subjects){
    if(subjIdx!=null){ name+="（"+t.subjects[subjIdx].name+"）"; body+="\n• "+t.subjects[subjIdx].name+"："+fmtTxt(t.subjects[subjIdx].desc); }
    else name+="（尚未選擇主題）";
  }
  return {name,body};
}
function rand(n){return Math.floor(Math.random()*n);}
function pick2(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,2).sort((x,y)=>x-y);}
function tierColor(v){ if(v<=2)return"#d23b2f"; if(v<=4)return"#e8853a"; if(v<=6)return"#f2b705"; if(v<=8)return"#8fc23e"; return"#33c463"; }

/* 雷達圖：每根軸的尖端外側，由內而外 = 數字、名稱 */
function hexSVG(attrs,size){
  const cx=size/2,cy=size/2,R=size*0.24,numR=size*0.30,nameR=size*0.42;
  const pts=ATTR_ORDER.map((a,i)=>{const ang=(-90+i*60)*Math.PI/180;
    return{a,cos:Math.cos(ang),sin:Math.sin(ang),val:attrs[a]};});
  let grid="";[0.4,0.7,1].forEach(r=>{grid+=`<polygon class="hex-grid" points="${
    pts.map(p=>`${(cx+p.cos*R*r).toFixed(1)},${(cy+p.sin*R*r).toFixed(1)}`).join(" ")}"/>`;});
  let spokes="";pts.forEach(p=>{spokes+=`<line class="hex-spoke" x1="${cx}" y1="${cy}" x2="${
    (cx+p.cos*R).toFixed(1)}" y2="${(cy+p.sin*R).toFixed(1)}"/>`;});
  const shape=pts.map(p=>{const rr=(p.val/ATTR_MAX)*R;
    return`${(cx+p.cos*rr).toFixed(1)},${(cy+p.sin*rr).toFixed(1)}`;}).join(" ");
  let dots="";pts.forEach(p=>{const rr=(p.val/ATTR_MAX)*R;
    dots+=`<circle class="hex-dot" cx="${(cx+p.cos*rr).toFixed(1)}" cy="${
    (cy+p.sin*rr).toFixed(1)}" r="3"/>`;});
  let lab="";
  pts.forEach(p=>{
    let anc="middle"; if(p.cos>0.3)anc="start"; else if(p.cos<-0.3)anc="end";
    lab+=`<text class="hex-num" x="${(cx+p.cos*numR).toFixed(1)}" y="${(cy+p.sin*numR).toFixed(1)
      }" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.064).toFixed(1)}">${p.val}</text>`;
    lab+=`<text class="hex-name" x="${(cx+p.cos*nameR).toFixed(1)}" y="${(cy+p.sin*nameR).toFixed(1)
      }" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.05).toFixed(1)}">${p.a}</text>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img"
    aria-label="六項屬性雷達圖">${grid}${spokes}<polygon class="hex-shape" points="${shape}"/>${dots}${lab}</svg>`;
}

function attrWord(v){ return ATTR_DESCRIPTORS[v]||""; }
function resetCreatorAttrs(){ creator.attrs={}; CREATOR_ATTRS.forEach(a=>creator.attrs[a.name]=1); }
function ensureCreatorAttrs(){ if(!creator.attrs) resetCreatorAttrs(); }
function pointsTotal(){ return creator.tier!=null?TIERS[creator.tier].points:0; }
function powerSourceCost(){ return Math.max(0,(creator.powerSources?creator.powerSources.length:0)-1); } // 第 1 種免費，其餘每種 1 點
// ---- 異能欄位（容量）與花費 ----
function ensureCreatorSlots(){ if(creator.slots==null) creator.slots=baseFreeSlots(); }
function baseFreeSlots(){ return creator.tier!=null?TIERS[creator.tier].powers:0; }
function totalSlots(){ ensureCreatorSlots(); return Math.max(1,creator.slots); }
// 單一異能占用的「異能欄位數」：基礎=1；每提升 1 級、每個強化各 +1；每個限制折抵 -1（最低 1）
function powerContribution(p){ const extras=p.level+p.enh.length; return 1+Math.max(0,extras-p.lim.length); }
function contribIfLevel(p,lv){ const extras=lv+p.enh.length; return 1+Math.max(0,extras-p.lim.length); }
function contribIfEnhAdd(p){ const extras=p.level+p.enh.length+1; return 1+Math.max(0,extras-p.lim.length); }
function powersUsed(){ return creator.powers.reduce((s,p)=>s+powerContribution(p),0); }
function emptySlots(){ return totalSlots()-powersUsed(); }
// 免費／額外欄位拆分：超出免費額度的為額外欄位；異能優先占用免費欄位
function extraSlotsCount(){ return Math.max(0, totalSlots()-baseFreeSlots()); }
function freeSlotsCount(){ return totalSlots()-extraSlotsCount(); }
function freeSlotsUsed(){ return Math.min(powersUsed(), freeSlotsCount()); }
function extraSlotsUsed(){ return Math.max(0, powersUsed()-freeSlotsCount()); }
// 欄位相對免費額度的增減 → 點數：每多 1 個欄位(額外購買) 花 2 點；每少 1 個欄位(捨棄) 退 2 點
function powerPointDelta(){ return (totalSlots()-baseFreeSlots())*2; }
function maxLevelForTier(){ return creator.tier===3?2:1; } // 宇宙勇者可到超級(2)，其餘到強力(1)；終極(3)創角不可

function findPower(id){ return creator.powers.find(p=>p.id===id); }
function needSlot(msg){ showInfo("異能欄位不足", msg||"此操作需要 1 個空白異能欄位。請先騰出欄位，或在免費欄位用完後購買額外欄位。"); }
function addPower(id){ if(findPower(id))return; if(emptySlots()<1){ needSlot(); return; } creator.powers.push({id,level:0,enh:[],lim:[]}); renderCreator(); }
function removePower(id){ creator.powers=creator.powers.filter(p=>p.id!==id); renderCreator(); }
// 限制以物件儲存並綁定其換得的項目：{li, bind:{kind:'level'} | {kind:'enh', ei}}
function limEntry(p,li){ return p.lim.find(x=>x.li===li); }
function hasLim(p,li){ return p.lim.some(x=>x.li===li); }
function enhBoundLimIdx(p,ei){ return p.lim.findIndex(x=>x.bind&&x.bind.kind==="enh"&&x.bind.ei===ei); }
function levelBoundCount(p){ return p.lim.filter(x=>x.bind&&x.bind.kind==="level").length; }
function setPowerLevel(id,lvl){ const p=findPower(id); if(!p)return; if(lvl<0||lvl>maxLevelForTier()||lvl===p.level)return;
  if(lvl>p.level){ // 升級：需要容量
    if(powersUsed()-powerContribution(p)+contribIfLevel(p,lvl)>totalSlots()){ needSlot("提升等級需要 1 個空白異能欄位。"); return; }
    p.level=lvl;
  } else { // 降級：若被取消的等級是某個限制換來的，連帶取消該限制
    p.level=lvl;
    let lvlLims=p.lim.filter(x=>x.bind&&x.bind.kind==="level");
    while(lvlLims.length>p.level){ const last=lvlLims.pop(); const k=p.lim.indexOf(last); if(k>=0)p.lim.splice(k,1); }
  }
  afterPowerChange(); }
function togglePwEnh(id,ei){ const p=findPower(id); if(!p)return; const i=p.enh.indexOf(ei);
  if(i>=0){ // 移除強化：若此強化是某個限制換來的，連帶取消該限制
    p.enh.splice(i,1);
    const lk=enhBoundLimIdx(p,ei); if(lk>=0) p.lim.splice(lk,1);
    afterPowerChange(); return; }
  if(powersUsed()-powerContribution(p)+contribIfEnhAdd(p)>totalSlots()){ needSlot("新增強化需要 1 個空白異能欄位。"); return; }
  p.enh.push(ei); afterPowerChange(); }
// 限制：點選後跳出對話框，免費換取「升 1 級」或「1 個強化」；限制與其換得的項目雙向綁定（取消任一方，另一方同時取消）
function clickLimit(id,li){ const p=findPower(id); if(!p)return; const pw=POWERS[id];
  const entry=limEntry(p,li);
  if(entry){ // 取消限制 → 連帶取消其換得的升級或強化
    p.lim.splice(p.lim.indexOf(entry),1);
    if(entry.bind){ if(entry.bind.kind==="level"){ p.level=Math.max(0,p.level-1); } else if(entry.bind.kind==="enh"){ const ei=p.enh.indexOf(entry.bind.ei); if(ei>=0)p.enh.splice(ei,1); } }
    afterPowerChange(); return; }
  const canLevel=p.level<Math.min(maxLevelForTier(),powerOwnMaxLevel(pw)); // 沒有等級的異能不提供免費升級
  const availEnh=pw.enh.map((e,ei)=>({e,ei})).filter(x=>!p.enh.includes(x.ei));
  if(!canLevel&&availEnh.length===0){ showInfo("無可折抵項目","沒有可以免費換取的項目，可能已達等級上限且強化項目已全選。"); return; }
  const opts=[];
  if(canLevel) opts.push({label:`免費升級至「${POWER_LEVELS[p.level+1]}」`,cls:"btn-gold",onClick:()=>{ p.level++; p.lim.push({li,bind:{kind:"level"}}); afterPowerChange(); }});
  availEnh.forEach(x=>opts.push({label:`免費換強化：${x.e.name}`,onClick:()=>{ p.enh.push(x.ei); p.lim.push({li,bind:{kind:"enh",ei:x.ei}}); afterPowerChange(); }}));
  opts.push({label:"取消",cls:"btn-ghost",onClick:null});
  showChoice(`套用限制「${pw.lim[li].name}」`, `<p class="choice-desc">${fmtHTML(pw.lim[li].desc)}</p><p class="choice-q">此限制可免費換取以下其中 1 項：</p>`, opts);
}
// 欄位增減
function discardSlot(){ if(emptySlots()<1)return; if(totalSlots()<=1){ showInfo("至少保留 1 個欄位","你必須至少保留 1 個異能欄位。"); return; } creator.slots=totalSlots()-1; afterPowerChange(); }
function addSlot(){ const cur=totalSlots();
  if(pointsLeft()<2){ showInfo("創角點數不足","新增異能欄位需要 2 點創角點數，但你的點數不足。"); return; }
  creator.slots=cur+1; afterPowerChange(); }
function powerBuySlotHTML(){
  const restoring=totalSlots()<baseFreeSlots();
  const can = pointsLeft()>=2;
  const label = restoring ? "↩ 還原免費欄位（−2 點）" : "＋ 購買額外異能欄位（−2 點）";
  return `<button class="btn btn-sm btn-ink pw-buy-slot" data-add-slot="1"${can?"":" disabled"}>${label}</button>`;
}

function pointsSpent(){ ensureCreatorAttrs(); ensureCreatorSlots(); return CREATOR_ATTRS.reduce((s,a)=>s+creator.attrs[a.name],0)+powerSourceCost()+powerPointDelta()+talentPointCost()+weaknessPointDelta(); }
function pointsLeft(){ return pointsTotal()-pointsSpent(); }

function adjustAttr(name,delta){
  if(creator.tier==null) return;
  ensureCreatorAttrs();
  const cap=TIERS[creator.tier].attrCap, cur=creator.attrs[name];
  let nv=cur+delta;
  if(nv<1) nv=1; if(nv>cap) nv=cap;
  if(delta>0 && nv>cur && pointsLeft()<=0) return;
  creator.attrs[name]=nv; renderCreator();
}
function toggleSource(i){
  if(creator.tier==null) return;
  const arr=creator.powerSources, pos=arr.indexOf(i);
  if(pos>=0){ arr.splice(pos,1); }
  else { if(arr.length>=1 && pointsLeft()<1) return; arr.push(i); } // 額外來源需付 1 點
  renderCreator();
}
function rollSource(){
  if(creator.tier==null) return;
  const arr=creator.powerSources;
  const avail=POWER_SOURCES.map((s,i)=>i).filter(i=>!arr.includes(i));
  if(!avail.length){ showInfo("沒有可擲的來源","所有異能來源都已選取。"); return; }
  const doRoll=()=>{ arr.push(avail[rand(avail.length)]); renderCreator(); };
  if(arr.length===0){ doRoll(); return; }                 // 第 1 種免費，直接擲
  if(pointsLeft()<1){ showInfo("創角點數不足","第 2 種之後的異能來源每種需付 1 點創角點數，但你的點數不足。"); return; }
  showChoice("購買額外異能來源",
    `<p class="choice-desc">第 1 種異能來源免費，第 2 種之後每種都需要花費 1 點創角點數購買。</p><p class="choice-q">確定要隨機再抽 1 種來源嗎？</p>`,
    [{label:"隨機再抽 1 種（需付 1 點）",cls:"btn-gold",onClick:doRoll},{label:"取消",cls:"btn-ghost",onClick:null}]);
}

function tierCard(t,i,selected){
  const stat=(l,v)=>`<div class="tier-stat"><span class="tier-stat-num display">${v}</span><span class="tier-stat-label">${l}</span></div>`;
  return `<div class="card tier-card-paper${selected?" sel":""}" data-tier="${i}" role="button" tabindex="0" aria-pressed="${selected?"true":"false"}">
    <div class="card-top"><span class="card-en">${t.en}</span>${selected?'<span class="tier-sel-badge">✓ 已選擇</span>':''}</div>
    <h2 class="card-name display">${t.name}</h2>
    <div class="tier-stats">${stat("創角點數",t.points)}${stat("起始屬性上限",t.attrCap)}${stat("免費異能數量",t.powers)}${stat("起始聲望",t.fame)}</div>
    <div class="card-cta display">${selected?"已選擇此階級":"選擇此階級"}</div>
  </div>`;
}
function needTierHint(){ return `<p class="tier-hint">請先回到「決定階級」選擇英雄階級。</p>`; }

function renderTierStep(){
  return `<p class="step-intro">在遊戲正式開始前，跟 GM 一起討論決定英雄的階級。</p>
    <div class="tier-grid">${TIERS.map((t,i)=>tierCard(t,i,creator.tier===i)).join("")}</div>`;
}
function renderAttrStep(){
  if(creator.tier==null) return needTierHint();
  ensureCreatorAttrs();
  const cap=TIERS[creator.tier].attrCap, left=pointsLeft();
  const rows=CREATOR_ATTRS.map(a=>{
    const v=creator.attrs[a.name];
    return `<div class="attr-row">
      <div class="attr-info"><span class="attr-name">${a.name}</span><span class="attr-desc">${a.desc}</span></div>
      <div class="attr-stepper">
        <button class="step-btn" data-attr="${a.name}" data-delta="-1"${v<=1?" disabled":""} aria-label="${a.name}減少">−</button>
        <span class="attr-val display">${v}</span>
        <span class="attr-word">${attrWord(v)}</span>
        <button class="step-btn" data-attr="${a.name}" data-delta="1"${(v>=cap||left<=0)?" disabled":""} aria-label="${a.name}增加">＋</button>
      </div>
    </div>`;
  }).join("");
  return `<p class="step-intro">將創角點數 1:1 自由分配到各項屬性：每項最低為 1（須先花 6 點作為保底），最高不超過階級上限 <b>${cap}</b>。</p>
    <div class="attr-alloc">${rows}</div>`;
}
function renderPowerSourceStep(){
  if(creator.tier==null) return needTierHint();
  const arr=creator.powerSources;
  const cards=POWER_SOURCES.map((s,i)=>{
    const selPos=arr.indexOf(i), isSel=selPos>=0;
    const tag = isSel
      ? (selPos===0?`<span class="cost-pill cost-free">免費</span>`:`<span class="cost-pill cost-paid">已付 1 點</span>`)
      : (arr.length===0?`<span class="cost-pill cost-free">免費</span>`:`<span class="cost-pill cost-need">需付 1 點</span>`);
    const disabled = !isSel && arr.length>=1 && pointsLeft()<1;
    return `<div class="src-card${isSel?" sel":""}${disabled?" disabled":""}" data-source="${i}" role="button" tabindex="0" aria-pressed="${isSel?"true":"false"}">
      <div class="src-name">${s.name}${tag}</div><div class="src-desc">${s.desc}</div>
    </div>`;
  }).join("");
  const n=arr.length;
  const note = n>1 ? `<p class="src-note">擁有多種來源時，之後分配異能時須指定每個異能屬於哪一種來源。</p>` : "";
  const secHead=`<div class="sec-head"><div><span class="sec-title display">異能來源</span><span class="sec-hint">免費 1 種，第 2 種起每種需付 1 點</span></div><button class="dice-btn" data-source-roll="1">🎲 隨機</button></div>`;
  return `<p class="step-intro">英雄的每個異能都必須源自某種「異能來源」。你可以免費挑選 1 種異能來源（通常你只會有 1 種，所有異能都源自它），但每花費 1 點創角點數可以額外購買 1 種來源。</p>
    ${secHead}
    <div class="src-grid">${cards}</div>
    ${note}`;
}

function togglePowerDetail(id){ if(!creator.expandedPowers) creator.expandedPowers={}; creator.expandedPowers[id]=!creator.expandedPowers[id]; renderCreator(); }
function powerCard(p){
  const pw=POWERS[p.id], contrib=powerContribution(p);
  const open = !!(creator.expandedPowers && creator.expandedPowers[p.id]);
  const nm=(p.level>0?POWER_LEVELS[p.level]:"")+pw.name;
  const enNm=pw.en?((p.level>0?POWER_LEVELS_EN[p.level]+" ":"")+pw.en):"";
  const sumParts=[];
  if(p.enh.length) sumParts.push(`強化 ×${p.enh.length}`);
  if(p.lim.length) sumParts.push(`限制 ×${p.lim.length}`);
  const summary = sumParts.join("　");
  let detail="";
  if(open){
    const rows=[];
    if(p.level>0) rows.push(`<div class="pw-sum-row"><span class="pw-sum-k">等級</span><span class="pw-sum-v"><b>${POWER_LEVELS[p.level]}</b>：${fmtHTML(pw.levelDesc[POWER_LEVELS[p.level]]||"")}</span></div>`);
    p.enh.forEach(ei=>{ const e=pw.enh[ei]; if(e) rows.push(`<div class="pw-sum-row"><span class="pw-sum-k">強化</span><span class="pw-sum-v"><b>${e.name}</b>：${fmtHTML(e.desc)}</span></div>`); });
    p.lim.forEach(x=>{ const l=pw.lim[x.li]; if(l) rows.push(`<div class="pw-sum-row"><span class="pw-sum-k">限制</span><span class="pw-sum-v"><b>${l.name}</b>：${fmtHTML(l.desc)}</span></div>`); });
    detail=`<div class="pw-detail"><div class="pw-desc">${fmtHTML(pw.desc)}</div>${rows.length?`<div class="pw-sum">${rows.join("")}</div>`:""}</div>`;
  }
  return `<div class="pw-card added">
    <div class="pw-head pw-head-toggle" data-pw-detail="${p.id}" role="button" tabindex="0" aria-expanded="${open?"true":"false"}">
      <span class="pw-caret">${open?"▾":"▸"}</span>
      <span class="pw-name">${nm}${enNm?`<span class="pw-en">${enNm}</span>`:""}</span>
      <span class="pw-type-tag">${pw.type}</span><span class="pw-contrib-tag">占 ${contrib} 欄位</span>
      <span class="pw-card-acts"><button class="btn btn-sm" data-pw-edit="${p.id}">編輯異能</button><button class="btn btn-ghost btn-sm" data-pw-remove="${p.id}">移除</button></span></div>
    ${summary?`<div class="pw-cfg-sum">${summary}</div>`:""}
    ${detail}
  </div>`;
}
// 彈出視窗中的等級／強化／限制設定區塊
function powerOwnMaxLevel(pw){ if(!pw.levelDesc) return 0; let m=0; POWER_LEVELS.forEach((nm,i)=>{ if(pw.levelDesc[nm]!=null) m=Math.max(m,i); }); return m; }
function powerSrc(p){
  if(p.src!=null && creator.powerSources.includes(p.src)) return p.src;
  return creator.powerSources.length ? creator.powerSources[0] : null;
}
function setPowerSource(id,s){ const p=findPower(id); if(!p||!creator.powerSources.includes(s))return; p.src=s; afterPowerChange(); }
function powerConfigBlocks(p){
  const pw=POWERS[p.id], contrib=powerContribution(p), used=powersUsed(), total=totalSlots();
  const tierMax=maxLevelForTier(), ownMax=powerOwnMaxLevel(pw), maxLvl=Math.min(tierMax,ownMax);
  let srcBlock="";
  if(creator.powerSources.length){
    const cur=powerSrc(p);
    const btns=creator.powerSources.map(s=>`<button class="src-pick${s===cur?" cur":""}" data-pw-src="${p.id}:${s}">${POWER_SOURCES[s].name}</button>`).join("");
    srcBlock=`<div class="pw-block"><div class="pw-block-label">分配異能來源</div><div class="src-pick-row">${btns}</div></div>`;
  } else {
    srcBlock=`<div class="pw-block"><div class="pw-block-label">分配異能來源</div><div class="src-none-hint"><span>尚未選擇異能來源</span><button class="btn btn-sm btn-ink" data-goto-sources="1">前往選擇 →</button></div></div>`;
  }
  let levelBlock="";
  if(ownMax>0){
    const lvlBtns=POWER_LEVELS.map((nm,li)=>{
      if(li>=3) return "";                 // 終極創角一律不可選，不顯示按鈕以免誤會
      const cur=p.level===li; let dis=false, reason="";
      if(li>ownMax){ dis=true; reason="無此等級"; }
      else if(li>tierMax){ dis=true; reason="僅宇宙勇者"; }
      else if(li>p.level && used-contrib+contribIfLevel(p,li)>total){ dis=true; }
      return `<button class="lvl-btn${cur?" cur":""}${dis?" disabled":""}" data-pw-level="${p.id}:${li}"${dis?' aria-disabled="true"':''}>${nm}${reason?`<span class="lvl-na">${reason}</span>`:""}</button>`;
    }).join("");
    const lvlDescNow = p.level>0 ? `<div class="lvl-desc"><b>${POWER_LEVELS[p.level]}</b>：${fmtHTML(pw.levelDesc[POWER_LEVELS[p.level]]||"")}</div>` : "";
    levelBlock=`<div class="pw-block"><div class="pw-block-label">等級（每升 1 級占 1 欄位）</div><div class="lvl-row">${lvlBtns}</div>${lvlDescNow}</div>`;
  }
  const enhRows=pw.enh.map((e,ei)=>{
    const on=p.enh.includes(ei);
    const dis = !on && used-contrib+contribIfEnhAdd(p)>total;
    const bound = on && enhBoundLimIdx(p,ei)>=0;
    return `<div class="opt${on?" sel":""}${dis?" disabled":""}" ${dis?'aria-disabled="true"':'role="button" tabindex="0"'} data-pw-enh="${p.id}:${ei}"><span class="opt-mark"></span><div><span class="opt-name">${e.name}${bound?' <span class="lim-tag">限制折抵</span>':''}</span><span class="opt-desc">${fmtHTML(e.desc)}</span></div></div>`;
  }).join("");
  const limRows=pw.lim.map((l,li)=>{
    const entry=limEntry(p,li), on=!!entry;
    let tag="";
    if(on){ const b=entry.bind; tag = b ? (b.kind==="level" ? "已折抵（升級）" : `已折抵（強化：${pw.enh[b.ei]?pw.enh[b.ei].name:""}）`) : "已折抵"; }
    return `<div class="opt${on?" sel":""}" role="button" tabindex="0" data-pw-lim="${p.id}:${li}"><span class="opt-mark"></span><div><span class="opt-name">${l.name}${on?` <span class="lim-tag">${tag}</span>`:''}</span><span class="opt-desc">${fmtHTML(l.desc)}</span></div></div>`;
  }).join("");
  const enhBlock = pw.enh.length ? `<div class="pw-block"><div class="pw-block-label">強化（每項占 1 欄位）</div>${enhRows}</div>` : "";
  const limBlock = pw.lim.length ? `<div class="pw-block"><div class="pw-block-label">限制（可免費升級或換 1 個強化）</div>${limRows}</div>` : "";
  return `${srcBlock}${levelBlock}${enhBlock}${limBlock}`;
}
