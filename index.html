<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超級英雄建檔工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0e1326;--night-2:#161d38;--paper:#f4efe4;--ink:#191922;--ink-soft:#4a4a57;
  --red:#e5342b;--gold:#f2b705;--green:#2f9e54;--line:2px solid var(--ink);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--night);background-image:radial-gradient(circle at 20% -10%,#1d2647 0%,transparent 45%),radial-gradient(circle at 90% 0%,#241a3a 0%,transparent 40%);color:var(--paper);line-height:1.7;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}
.display{font-family:"Oswald","Noto Sans TC",sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* 報頭 */
.masthead{padding:54px 0 30px;text-align:center}
.eyebrow{display:inline-block;font-family:"Oswald",sans-serif;letter-spacing:.42em;font-size:.72rem;text-transform:uppercase;color:var(--gold);border:1px solid rgba(242,183,5,.5);padding:5px 14px 5px 18px;border-radius:2px;margin-bottom:20px}
.wordmark{font-weight:900;font-size:clamp(2.6rem,8vw,5rem);line-height:.95;letter-spacing:.04em}
.wordmark .wm-part{display:inline-block;white-space:nowrap}
.tagline{margin-top:16px;color:#b9bed1;font-size:clamp(.95rem,2.4vw,1.1rem);max-width:none}
.count-strip{margin-top:26px;display:inline-flex;align-items:center;gap:14px;font-family:"Oswald",sans-serif;font-size:.82rem;letter-spacing:.12em;color:#8d93ad}
.count-strip b{color:var(--paper);font-size:1.05rem}
.count-strip .ln{display:inline-block;width:34px;height:1px;background:#3b4263}

/* 卡片牆 */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:14px 0 70px}
.card{position:relative;background:var(--paper);color:var(--ink);border:var(--line);border-radius:4px;padding:22px 20px 20px;cursor:pointer;box-shadow:6px 6px 0 rgba(0,0,0,.55);transition:transform .14s ease,box-shadow .14s ease;outline:none;display:flex;flex-direction:column}
.card:focus-visible{transform:translate(-3px,-3px);box-shadow:10px 10px 0 var(--gold)}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:10px;min-height:20px}
.card-en{font-family:"Oswald",sans-serif;letter-spacing:.16em;text-transform:uppercase;font-size:.8rem;color:var(--red);font-weight:600}
.role-badge{font-family:"Oswald",sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--gold);padding:3px 9px;border-radius:2px;white-space:nowrap}
.card-name{font-weight:900;font-size:2rem;line-height:1.1;margin:6px 0 4px;letter-spacing:.02em}
.card-hex{display:flex;justify-content:center;margin:4px 0 10px}
.card-intro{font-size:.9rem;color:#3c3c47}
.card-cta{margin-top:16px;font-family:"Oswald",sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:600;display:flex;align-items:center;gap:6px}
.card-cta::after{content:"→";transition:transform .14s ease}

/* 雷達：數字＋名稱皆在六角尖端外側，沿軸由內而外 */
.hex-grid{stroke:#c9c0ad;stroke-width:1;fill:none}
.hex-spoke{stroke:#d6cdba;stroke-width:1}
.hex-shape{fill:rgba(229,52,43,.18);stroke:var(--red);stroke-width:2.5;stroke-linejoin:round}
.hex-dot{fill:var(--red)}
.hex-dot.peak{fill:var(--gold);stroke:var(--ink);stroke-width:1.2}
.hex-num{font-family:"Oswald",sans-serif;font-weight:700;fill:var(--ink)}
.hex-name{font-family:"Noto Sans TC",sans-serif;font-weight:700;fill:var(--ink-soft)}

/* 覆蓋頁 */
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;z-index:40;background:var(--night);background-image:radial-gradient(circle at 15% 0%,#1d2647 0%,transparent 50%),radial-gradient(circle at 95% 10%,#241a3a 0%,transparent 45%);overflow-y:auto}
.screen.on{display:block}
.screen-inner{max-width:1000px;margin:0 auto;padding:calc(26px + env(safe-area-inset-top)) 24px 90px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 24px;gap:12px;flex-wrap:wrap}
.btn{font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.82rem;font-weight:600;padding:11px 20px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .12s ease,background .12s ease,color .12s ease,border-color .12s ease;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:#c5cadd;border-color:#39406a}
.btn-ghost:hover{border-color:var(--paper);color:var(--paper)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:#dba504}
.btn-ink{background:var(--paper);color:var(--ink);border-color:var(--ink)}
.btn-ink:hover{background:#fff}

/* 建檔 */
.builder-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.builder-head .display{font-weight:900;font-size:clamp(1.8rem,5vw,2.6rem)}
.builder-name{color:var(--gold)}
.builder-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.builder-en{font-family:"Oswald",sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem;color:#b7bcd2}
.builder-role{font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.78rem;border:1px solid #3a4673;color:#b7bcd2;padding:5px 10px;border-radius:2px}
.builder-tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.builder-sub{color:#9aa0bd;margin-bottom:16px}
.builder-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:30px;align-items:start}
.builder-col{display:flex;flex-direction:column;gap:18px;min-width:0}
.bsec{background:#141b33;border:1.5px solid #262e54;border-radius:6px;padding:18px 18px 20px}
.sec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.sec-title{font-weight:900;font-size:1.15rem;color:var(--paper)}
.sec-hint{display:block;font-size:.75rem;color:#8d93ad;margin-top:2px;letter-spacing:.04em}
.dice-btn{flex:none;background:#1d2647;border:1.5px solid #3a4673;color:#cfd4e6;font-family:"Oswald",sans-serif;font-size:.74rem;letter-spacing:.06em;padding:6px 11px;border-radius:3px;cursor:pointer;transition:border-color .12s,color .12s}
.dice-btn:hover{border-color:var(--gold);color:var(--gold)}

/* 範型概覽 */
.ov-top{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:start;margin-bottom:18px}
.ov-art{width:120px}
.ov-intro{font-size:.98rem;color:#d7dbe8;line-height:1.7}
.ov-top2{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.ov-stats{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
.ov-hexbox{background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;padding:6px;display:flex;justify-content:center}
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.ov-stat{background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;padding:12px 10px;text-align:center}
.ov-stat-up{border-color:var(--green)}
.ov-stat-num{display:block;font-weight:900;font-size:1.7rem;color:var(--paper);line-height:1}
.ov-stat-up .ov-stat-num{color:var(--green)}
.ov-stat-label{display:block;margin-top:5px;font-family:"Oswald",sans-serif;letter-spacing:.08em;font-size:.72rem;color:#9aa0bd}
.ov-gauge{min-width:0}
.art{width:100%;aspect-ratio:4/5;border:var(--line);border-radius:4px;overflow:hidden;background:#0f1530;box-shadow:4px 4px 0 rgba(0,0,0,.5)}
.art img{width:100%;height:100%;object-fit:cover;display:block}
.art-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:3rem;color:#fff;background:linear-gradient(135deg,#e5342b,#7a1e8a)}

/* 屬性量表 */
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.stat-row:last-child{margin-bottom:0}
.stat-name{width:3.4em;font-weight:700;flex:none}
.stat-bar{flex:1;height:15px;background:#0c1124;border:1px solid #2d345c;border-radius:3px;overflow:hidden;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0 1.5px,transparent 1.5px 10%)}
.stat-fill{height:100%;border-radius:2px 0 0 2px;box-shadow:0 0 8px rgba(0,0,0,.25) inset}
.stat-num{width:2.1em;text-align:right;flex:none;font-family:"Oswald",sans-serif;font-weight:700;font-size:1.25rem}

/* 表單 / 選項 */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.74rem;color:#aeb3cc;margin-bottom:7px}
.field input,.field textarea{width:100%;background:#0f1530;border:1.5px solid #343c64;border-radius:3px;color:var(--paper);font-family:inherit;font-size:1rem;padding:11px 13px;line-height:1.6;transition:border-color .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--red)}
.field textarea{resize:vertical;min-height:96px}
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1.5px solid #2a3258;border-radius:5px;cursor:pointer;margin-bottom:9px;background:#0f1530;transition:border-color .12s,background .12s;outline:none}
.opt:last-child{margin-bottom:0}
.opt:hover{border-color:#46508a}
.opt:focus-visible{border-color:var(--gold)}
.opt.sel{border-color:var(--red);background:rgba(229,52,43,.10)}
.opt-mark{flex:none;width:18px;height:18px;border-radius:50%;border:2px solid #46508a;margin-top:3px;position:relative}
.opt.sel .opt-mark{border-color:var(--red)}
.opt.sel .opt-mark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--red)}
.opt-name{display:block;font-weight:700;color:var(--paper);margin-bottom:3px}
.opt-desc{display:block;font-size:.88rem;color:#b7bcd2;line-height:1.65}
.opt.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.opt.disabled:hover{border-color:#2a3258}
.opt-lock{display:block;font-size:.78rem;font-weight:600;color:var(--red);margin-bottom:3px}
.land-card{position:relative}
.land-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:var(--ink);font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.04em}
.wip-banner{background:rgba(242,183,5,.12);border:1.5px solid var(--gold);color:#f6d77a;border-radius:6px;padding:14px 16px;margin:0 0 22px;font-weight:600;line-height:1.65}
.step-intro{color:#b7bcd2;line-height:1.75;margin:6px 0 18px;font-size:.95rem}
.tier-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;padding:4px 0 6px}
.tier-card-paper{padding:20px 20px 18px}
.tier-card-paper .card-name{font-size:1.7rem;margin:4px 0 2px}
.tier-sel-badge{font-family:"Oswald",sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--green);color:#fff;padding:3px 9px;border-radius:2px;white-space:nowrap}
.tier-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0 4px}
.tier-stat{background:rgba(25,25,34,.05);border:1px solid rgba(25,25,34,.12);border-radius:4px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.tier-stat-num{font-size:1.4rem;color:var(--red);line-height:1;font-weight:900}
.tier-stat-label{font-size:.72rem;color:var(--ink-soft)}
@media(max-width:600px){.tier-grid{grid-template-columns:1fr}}
.tier-hint{color:#9aa0bd;font-style:italic;padding:6px 0}
.points-bar{display:inline-block;background:#0b1026;border:1.5px solid var(--gold);color:#f6d77a;border-radius:30px;padding:8px 18px;font-weight:700;margin-bottom:16px}
.points-bar b{color:var(--gold);font-size:1.15rem}
.points-sticky{position:sticky;top:0;z-index:30;padding:10px 0 8px;margin-bottom:6px;background:linear-gradient(var(--night) 70%,rgba(14,19,38,0));backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.points-sticky .points-bar{margin-bottom:0;box-shadow:0 6px 18px rgba(0,0,0,.45)}
.attr-alloc{display:flex;flex-direction:column;gap:10px}
.attr-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;padding:12px 16px}
.attr-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.attr-name{font-weight:800;color:var(--paper);font-size:1.05rem}
.attr-desc{font-size:.8rem;color:#9aa0bd;line-height:1.5}
.attr-stepper{display:flex;align-items:center;gap:10px;flex:none}
.step-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid #46508a;background:#0b1026;color:var(--paper);font-size:1.3rem;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:border-color .12s,background .12s}
.step-btn:hover:not(:disabled){border-color:var(--red)}
.step-btn:disabled{opacity:.3;cursor:not-allowed}
.attr-val{font-size:1.5rem;color:var(--gold);min-width:26px;text-align:center}
.attr-word{font-size:.85rem;color:#b7bcd2;min-width:38px;text-align:center}
.attr-legend{font-size:.8rem;color:#9aa0bd;line-height:1.8;margin-top:14px}
@media(max-width:560px){.attr-row{flex-direction:column;align-items:stretch;gap:10px}.attr-stepper{justify-content:space-between}}
.step-nav{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 20px}
.step-chip{min-width:42px;height:38px;padding:0 14px;border-radius:30px;border:1.5px solid #2a3258;background:#0f1530;color:#cfd4e6;font-family:inherit;font-weight:700;cursor:pointer;transition:border-color .12s,background .12s,color .12s}
.step-chip:hover{border-color:#46508a}
.step-chip.cur{background:var(--red);border-color:var(--red);color:#fff}
.step-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:26px;padding-top:18px;border-top:1px solid #232a4d}
.step-count{color:#9aa0bd;font-size:.9rem;white-space:nowrap}
.step-foot .btn[disabled]{opacity:.35;cursor:not-allowed}
.src-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.src-card{background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;padding:16px;cursor:pointer;transition:border-color .12s,background .12s;outline:none}
.src-card:hover{border-color:#46508a}
.src-card.sel{border-color:var(--red);background:rgba(229,52,43,.10)}
.src-card.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.src-name{font-weight:800;color:var(--paper);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.src-tag{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:20px}
.src-tag.free{background:var(--green);color:#04210f}
.src-tag.cost{background:var(--gold);color:var(--ink)}
.src-tag.paid{background:var(--red);color:#fff}
.src-desc{font-size:.86rem;color:#b7bcd2;line-height:1.6}
.src-summary{color:#d8dcec;margin-top:14px;line-height:1.7;font-weight:600}
.src-note{color:#9aa0bd;font-size:.85rem;margin-top:6px;line-height:1.6}
@media(max-width:600px){.src-grid{grid-template-columns:1fr}}
.btn-sm{padding:6px 14px;font-size:.85rem;min-height:0}
.pw-status{display:block;background:#0b1026;border-color:#46508a;color:#d8dcec;font-weight:600}
.pw-status b{color:var(--gold)}
.pw-type-sec{margin-bottom:22px}
.pw-type-head{font-weight:800;color:var(--gold);letter-spacing:.06em;border-bottom:1.5px solid #2a3258;padding-bottom:6px;margin-bottom:12px}
.pw-empty{color:#828aa8;font-style:italic;font-size:.88rem;padding:2px 0 6px}
.pw-card{background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;padding:16px;margin-bottom:12px}
.pw-card.added{border-color:var(--red)}
.pw-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pw-name{font-weight:800;color:var(--paper);font-size:1.12rem}
.pw-en{font-family:'Oswald',system-ui,sans-serif;font-weight:600;font-size:.74rem;letter-spacing:.04em;color:#8b91ad;margin-left:8px;text-transform:uppercase;vertical-align:middle}
.pw-type-tag{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:20px;background:#232a4d;color:#aeb4d0}
.pw-head .btn{margin-left:auto}
.pw-examples{font-size:.8rem;color:#8b91ad;margin:8px 0 4px}
.pw-desc{font-size:.9rem;color:#c7ccdf;line-height:1.65}
.pw-block{margin-top:14px}
.pw-block-label{font-size:.82rem;font-weight:700;color:#9aa0bd;margin-bottom:8px}
.lvl-row{display:flex;flex-wrap:wrap;gap:8px}
.lvl-btn{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px;padding:8px 12px;border-radius:6px;border:1.5px solid #2a3258;background:#0b1026;color:#cfd4e6;font-family:inherit;font-weight:700;cursor:pointer;transition:border-color .12s,background .12s,color .12s}
.lvl-btn:hover:not(.disabled){border-color:#46508a}
.lvl-btn.cur{background:var(--red);border-color:var(--red);color:#fff}
.lvl-btn.disabled{opacity:.4;cursor:not-allowed}
.lvl-na{font-size:.62rem;font-weight:600;opacity:.85}
.lvl-desc{margin-top:10px;font-size:.86rem;color:#c7ccdf;line-height:1.6;background:#0b1026;border:1px solid #232a4d;border-radius:5px;padding:8px 12px}
.pw-contrib{margin-top:14px;font-size:.9rem;color:#d8dcec;font-weight:600}
.pw-contrib b{color:var(--gold)}
.pw-contrib-tag{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:20px;background:#1a2440;color:#f2b705;border:1px solid #3a4673}
.lim-tag{font-size:.66rem;font-weight:700;padding:1px 7px;border-radius:20px;background:rgba(47,158,84,.18);color:var(--green);margin-left:6px}
.slot-list{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.slot-empty{border:1.5px dashed #3a4673;border-radius:6px;padding:14px 16px;background:#0c1228;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.slot-empty-head{font-weight:700;color:#9aa0bd;font-size:.95rem}
.slot-empty-acts{display:flex;gap:9px;flex-wrap:wrap}
.slot-add-row{margin-top:12px}
.store{margin-top:16px;border:1.5px solid var(--gold);border-radius:8px;background:#0b1026;overflow:hidden}
.store-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;background:rgba(242,183,5,.10);border-bottom:1px solid #2a3258;flex-wrap:wrap}
.store-title{font-weight:800;color:var(--gold);font-size:.95rem}
.store-sec{padding:6px 16px 12px}
.store-sec-head{font-size:.8rem;font-weight:700;color:#9aa0bd;margin:10px 0 6px}
.store-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border:1.5px solid #2a3258;border-radius:6px;margin-bottom:8px;background:#0f1530;cursor:pointer;transition:border-color .12s,background .12s}
.store-item:hover{border-color:#5b67a8;background:#131a38}
.store-item.taken{opacity:.55;border-style:dashed;cursor:not-allowed}
.store-item.taken:hover{border-color:#2a3258;background:#0f1530}
.cat-head{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:8px 0 8px;border:1.5px solid #2a3258;border-radius:6px;background:#11183244;cursor:pointer;user-select:none;transition:border-color .12s,background .12s}
.cat-head:hover{border-color:#5b67a8;background:#151d3a}
.cat-arrow{color:var(--gold);font-size:.85rem;width:14px;text-align:center}
.cat-name{font-weight:800;color:var(--paper);font-size:.95rem;flex:1}
.cat-count{font-size:.78rem;font-weight:700;color:#9aa0bd;background:#1a2440;border:1px solid #3a4673;border-radius:20px;padding:1px 10px}
.pw-search-wrap{margin-top:10px}
.pw-search{width:100%;background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;color:var(--paper);font-family:inherit;font-size:.92rem;padding:9px 12px}
.pw-search:focus{outline:none;border-color:var(--gold)}
.pw-search::placeholder{color:#7a8099}

<script>
/* =====================================================================
   範型資料（各欄位選填，有提供才顯示，可分批補資料）
     name / en / role / image / intro / attrs
     powerSource:{options:[...]}                         異能來源 → 選 1
     powers:[{name,desc}]                                異能（自動全得）
     professions:[{name,desc,talents:[{name,desc}]}]     職業 → 選 1，再選 1 天賦
     freeTalents:[{name,desc}]                           自選天賦 → 選 1
     personalities:["專注",...]                          個性 → 選 2
     motivations:[{name,desc}]                           動機 → 選 1
     flaws:[{name,desc}]                                 缺陷 → 選 1
   內文語法：`關鍵字`、:invincible-6:（成功6）、:invincible-1:（並發1）、【狀態】
   ===================================================================== */

const ATTR_ORDER=["格鬥","敏捷","力量","理智","直覺","氣場"];
const ATTR_MAX=10;

const ARCHETYPES=[
  {
    name:"烽火", en:"The Beacon", role:"領袖", image:"78.png",
    intro:"你相信英雄必須有所堅持，才能真正帶來改變。你是團隊的核心，他們願意追隨你到任何地方。有時你會覺得自己不夠格，但也正因如此，他們才那麼信任你。你明白：最強大的超能力其實是勇氣，而你能將勇氣感染給身邊的人。",
    attrs:{格鬥:6,敏捷:5,力量:6,理智:4,直覺:4,氣場:9},
    powerSource:{options:["實驗血清","專用裝備","軍事訓練"]},
    powers:[
      {name:"抗性",desc:"你擁有某種防禦形式，可以抵抗影響心智的效果。當你受到會造成壓力的攻擊時，此異能會提供`護甲` 3；當你抵抗【震盪】、【心靈控制】和【心靈感應】時，你的檢定會 +3 骰。此異能不會幫你抵抗因為發動異能或強推屬性檢定而承受的壓力。"},
      {name:"指引",desc:"以 1 個完整動作，你可以進行`氣場`檢定。每擲出 1 個 :invincible-6:，你可以鼓舞 1 名能與你溝通的其他英雄，讓他在你的回合中立刻執行 1 個由你選擇的免費完整動作或快速動作（不影響他自己的動作額度）。目標可以拒絕該動作，但不能改為執行其他動作。\n此外，以 1 個反應動作，你可以進行`氣場`檢定，讓另 1 名英雄格擋或閃避襲來的攻擊，而不花費他自己的動作。"},
      {name:"防護",desc:"你擁有某種可以減免物理傷害的防禦形式，讓你在抵抗任何攻擊時獲得`護甲` 2。"}
    ],
    professions:[
      {name:"冒險家",desc:"你渴望冒險的刺激與風險。這個職業包括極限運動員、探險家、遺跡獵人、戶外活動愛好者或全職超級英雄。",
       talents:[

  {
    name:"靈能者", en:"The Psychic", role:"智囊",

    powers:[

      {name:"幻象",desc:"以 1 個完整動作，你可以讓你所處區塊或 1 個相鄰區塊內的目標看見或聽見實際上不存在的事物，或隱藏原本可見的事物。幻象最大可達人類尺寸，而且只能影響 1 個目標。目標可以進行被動`直覺`檢定來揭穿幻象（無需動作，不能強推）。若檢定失敗，目標會認為該幻象真實存在。幻象會持續數分鐘，但任何命中幻象的攻擊都會揭露其虛假的本質，並解除幻象效果。此異能對巨獸無效。"},
      {name:"心靈控制",desc:"以 1 個完整動作，你可以嘗試控制所處區塊或 1 個相鄰區塊內的 1 個智慧生物。對目標進行`氣場`對抗檢定（目標無需動作）。若你獲勝，目標會立刻進行 1 個完整回合（即使他該輪已經行動過），並聽從你的指示執行 1 個完整動作和 1 個快速動作（或 2 個快速動作）。之後，目標會失去他的下個回合，而且在那之前無法執行反應動作。\n在戰鬥外，你可以控制目標的行動數分鐘。在此期間，每當你強迫目標執行他通常不會做的行為時，目標可以進行`氣場`檢定來嘗試擺脫控制。此異能對巨獸無效。"},
      {name:"念動力",desc:"你可以純粹用意念舉起並移動物體和人物，而不需要接觸對方。以 1 個完整動作，你可以移動並控制你所處區塊或 1 個相鄰區塊內的 1 個固態物體或角色，重量等級最高為 4（200 公斤），並將其移動最多 2 個區塊（包括垂直移動）。你可以將此異能的重量等級上限提升最多 2 級，但必須主動承受等量壓力。\n若對非自願的角色發動此異能，你必須進行`敏捷`檢定，而對方可以進行閃避（如同閃避射擊攻擊）。若成功，你可以將目標拋向並撞穿障礙物（如同肉搏攻擊的「擊退」特技），每次撞擊都會造成 3 點傷害（護甲可以減傷）。\n你也可以使用此異能進行傷害 3，射程 0/2 的射擊攻擊，前提是你所處區塊或相鄰區塊內有物體可以投擲。\n此異能也可以用來精確操控物體，如同使用雙手一樣，例如打開車門、用鎚子敲釘子，或從容器中取出物品。特別複雜的操作需要進行`敏捷`檢定，如同使用雙手一樣。"},
      {name:"心靈感應",desc:"你可以讀取他人的思想，也可以向他們投射思想。以 1 個快速動作，你可以讀取你所處區塊或 1 個相鄰區塊內 1 個智慧生物的表層思想，或向他投射簡短的心靈訊息。你們不需要共享語言。\n以 1 個完整動作並進行`直覺`檢定，你可以更深入探查，讀取更深層的思想、邏輯或記憶。若對手正在積極抵抗，則需要對抗對方的`氣場`檢定。\n你會自動感應你所處區塊內是否有智慧生物存在。以 1 個快速動作，你可以進行`直覺`檢定來感應 3 個區塊內是否有智慧生物存在。"}

/* ===================== 工具 ===================== */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtHTML(s){
  return esc(s)
    .replace(/:invincible-6:/g,'<span class="die die6">6</span>')
    .replace(/:invincible-1:/g,'<span class="die die1">1</span>')
    .replace(/`([^`]+)`/g,'<span class="kw">$1</span>')
    .replace(/\n/g,'<br>');
}
function fmtTxt(s){return s.replace(/:invincible-6:/g,'［6］').replace(/:invincible-1:/g,'［1］').replace(/`([^`]+)`/g,'$1');}
function indent(s,pad){pad=pad||"  ";return s.split("\n").map(l=>pad+l).join("\n");}
function talentExport(t,subjIdx){
  let name=t.name, body=fmtTxt(t.desc);
  if(t.subjects){
    if(subjIdx!=null){ name+="（"+t.subjects[subjIdx].name+"）"; body+="\n• "+t.subjects[subjIdx].name+"："+fmtTxt(t.subjects[subjIdx].desc); }
    else name+="（尚未選擇主題）";
  }
  return {name,body};
}
function rand(n){return Math.floor(Math.random()*n);}
function escapeHTML(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pick2(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,2).sort((x,y)=>x-y);}
function peakAttr(attrs){let b=ATTR_ORDER[0];ATTR_ORDER.forEach(a=>{if(attrs[a]>attrs[b])b=a;});return b;}
function tierColor(v){ if(v<=2)return"#d23b2f"; if(v<=4)return"#e8853a"; if(v<=6)return"#f2b705"; if(v<=8)return"#8fc23e"; return"#33c463"; }

/* 雷達圖：每根軸的尖端外側，由內而外 = 數字、名稱 */
function hexSVG(attrs,size){
  const cx=size/2,cy=size/2,R=size*0.24,numR=size*0.30,nameR=size*0.42;
  const pts=ATTR_ORDER.map((a,i)=>{const ang=(-90+i*60)*Math.PI/180;return{a,cos:Math.cos(ang),sin:Math.sin(ang),val:attrs[a]};});
  let grid="";[0.4,0.7,1].forEach(r=>{grid+=`<polygon class="hex-grid" points="${pts.map(p=>`${(cx+p.cos*R*r).toFixed(1)},${(cy+p.sin*R*r).toFixed(1)}`).join(" ")}"/>`;});
  let spokes="";pts.forEach(p=>{spokes+=`<line class="hex-spoke" x1="${cx}" y1="${cy}" x2="${(cx+p.cos*R).toFixed(1)}" y2="${(cy+p.sin*R).toFixed(1)}"/>`;});
  const shape=pts.map(p=>{const rr=(p.val/ATTR_MAX)*R;return`${(cx+p.cos*rr).toFixed(1)},${(cy+p.sin*rr).toFixed(1)}`;}).join(" ");
  let dots="";pts.forEach(p=>{const rr=(p.val/ATTR_MAX)*R;dots+=`<circle class="hex-dot" cx="${(cx+p.cos*rr).toFixed(1)}" cy="${(cy+p.sin*rr).toFixed(1)}" r="3"/>`;});
  let lab="";
  pts.forEach(p=>{
    let anc="middle"; if(p.cos>0.3)anc="start"; else if(p.cos<-0.3)anc="end";
    const nx=cx+p.cos*numR, ny=cy+p.sin*numR, mx=cx+p.cos*nameR, my=cy+p.sin*nameR;
    lab+=`<text class="hex-num" x="${nx.toFixed(1)}" y="${ny.toFixed(1)}" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.064).toFixed(1)}">${p.val}</text>`;
    lab+=`<text class="hex-name" x="${mx.toFixed(1)}" y="${my.toFixed(1)}" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.05).toFixed(1)}">${p.a}</text>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img" aria-label="六項屬性雷達圖">${grid}${spokes}<polygon class="hex-shape" points="${shape}"/>${dots}${lab}</svg>`;
}
function artHTML(arc){
  const ini=arc.name.charAt(0);
  if(arc.image) return `<div class="art"><img src="${esc(arc.image)}" alt="${esc(arc.name)} 角色圖" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="art-fallback" style="display:none">${ini}</div></div>`;
  return `<div class="art"><div class="art-fallback">${ini}</div></div>`;
}
function gaugeRows(arc){
  return ATTR_ORDER.map(a=>{const v=arc.attrs[a],pct=(v/ATTR_MAX)*100,c=tierColor(v);
    return `<div class="stat-row"><span class="stat-name">${a}</span><span class="stat-bar"><span class="stat-fill" style="width:${pct}%;background:${c}"></span></span><span class="stat-num" style="color:${c}">${v}</span></div>`;}).join("");
}

    desc:"你可以操控磁場來控制金屬。以 1 個完整動作，你可以移動並控制你所處區塊或 1 個相鄰區塊內的任何磁性金屬（例如鐵與鋼），重量等級最高為 4（200 公斤）。你可以將此異能的重量等級上限提升最多 2 級，但必須主動承受等量壓力。\n只要你所處區塊或相鄰區塊內有磁性金屬物體，你就可以使用此異能進行傷害 3、射程 0/2 的射擊攻擊。若你願意，你可以改為讓目標定身（而非造成傷害），讓他無法執行任何需要身體活動的動作，直到掙脫為止。掙脫需要進行`力量`檢定（完整動作）。\n若對抗由金屬構成（全部或部分）的對手，即使周圍沒有其他金屬，你也可以使用此異能進行攻擊。此外，你可以使用此異能格擋任何使用金屬的攻擊（包括射擊攻擊），而且你的反擊具有傷害 3。",
    levelDesc:{ "強力":"你可以控制重量等級最高為 6（1 噸）的金屬；此異能的攻擊具有傷害 4、射程 0/3。", "超級":"重量等級最高為 8（10 噸）；傷害 5、射程 0/4。", "終極":"重量等級最高為 10（100 噸）；傷害 6、射程 0/5。" },

  {
    name:"物質控制", en:"Matter Control", type:"控制類", examples:"次原子操控、天界神靈、質量波動裝置、原始魔法",
    desc:"你可以操控宇宙的基本物質。以 1 個完整動作，你可以控制所處區塊或 1 個相鄰區塊內的 1 個無生命物質，重量等級最高為 4（200 公斤），並將其在該區塊內移動或移至相鄰區塊。你可以將此異能的重量等級上限提升最多 2 級，但必須主動承受等量壓力。\n你可以使用此異能並利用你所處區塊或相鄰區塊內的物質進行傷害 3、射程 0/1 的射擊攻擊。你可以主動承受 1 點壓力，讓攻擊獲得範圍效果。你也可以摧毀物質來源所在的區塊，以獲得攻擊的獎勵骰，前提是你能控制的重量等級上限 ≧ 摧毀該區塊類型所需的最低`力量`。若該區塊已被摧毀，則無法進行此攻擊。\n此異能的用途很廣，但 GM 擁有最終決定權。",
    levelDesc:{ "強力":"你可以控制重量等級最高為 6（1 噸）的物質；此異能的攻擊具有傷害 4。", "超級":"重量等級最高為 8（10 噸）；傷害 5。", "終極":"重量等級最高為 10（100 噸）；傷害 6。" },

  {

  {
    name:"化解", en:"Nullification", type:"控制類", examples:"反制法術、微量輻射、消能槍、異能吸取",
    desc:"你可以使用此異能來消除或終止其他異能的效果。\n以 1 個快速動作（或作為反應動作），你可以進行`氣場`檢定來解除你所處區塊或 1 個相鄰區塊內的 1 個持續性異能效果，或在目標即將發動異能時化解該異能（若是後者，必須與對方進行`氣場`對抗檢定）。你只能化解基礎等級的異能，而且你必須在目標進行任何檢定前宣告發動此異能。若目標的異能在即將發動時被化解，目標會失去該動作額度。若化解的是常駐型的異能，該異能效果只會被暫時抑制到你下個回合開始。",
    levelDesc:{ "強力":"你可以化解基礎和強力等級的異能。", "超級":"你可以化解超級等級以下的異能。", "終極":"你可以化解終極等級以下的異能。" },

    lim:[]

    desc:"以 1 個完整動作，你可以控制並活化你所處區塊或 1 個相鄰區塊內的任何植物。你可以刺激植物快速生長，在 1 輪內創造茂盛的綠色植被。\n只要受影響的區塊內有植物存在，你就可以使用此異能進行傷害 3 的肉搏攻擊。此攻擊可以被格擋，但不能被反擊。若你使用此攻擊擒抱目標並成功，你不需要維持擒抱。目標會被定身，而且無法執行任何需要身體活動的動作（包括肉搏攻擊和射擊攻擊），直到掙脫為止。掙脫需要進行`力量`檢定（完整動作）。",

  {
    name:"法術", en:"Sorcery", type:"控制類", examples:"控制神祕實體、掌控祕術、超自然能量、奧術法寶",
    desc:"透過汲取強大的力量來源，你可以施放法術來創造各種效果。以 1 個完整動作，你可以進行`氣場`檢定來準備 1 道法術，該法術會複製由你選擇的任何其他異能效果。若`氣場`檢定成功，你可以主動承受 1 點壓力來使用該異能數分鐘，或直到你陷入崩潰為止。你同時只能複製 1 項異能。你只能複製異能的基礎等級效果（若該異能具有等級）。若`氣場`檢定失敗，你在數小時內無法再次嘗試複製相同的異能。",

  {
    name:"召喚", en:"Summoning", type:"控制類", examples:"野性呼喚、凝光構造體、召喚魔法、自動無人機",
    desc:"以 1 個完整動作，你可以召喚 3 個盟友來協助你，他們會立刻抵達你的所處區塊或 1 個相鄰區塊。你的盟友與你共享先攻順序，而且可以在剛登場的回合就行動。在預設情況下，你盟友的所有屬性皆為 4，`決心`為 6，在戰鬥中視為雜魚。每次發動此異能時，你可以選擇以下其中 1 種特性：\n• 萬用盟友：將 2 項不同的屬性各提升 2 點（記得`決心`也要相應增加）。\n• 強大盟友：你主動承受 1 點壓力，為盟友選擇 1 個基礎等級的攻擊類異能、防禦類異能、機動類異能，或 1 個天賦。\n• 更多盟友：你額外召喚 2 個盟友。\n被召喚的盟友會持續存在數分鐘、直到因傷害而崩潰、直到你崩潰，或直到你使用完整動作解散他們為止。只要場上還有被你召喚的盟友存在，你就不能再額外召喚新的盟友。被你召喚的盟友能夠獨立行動，也可以協助檢定，並跟你擁有某種連結，你能感知他們經歷的一切，反之亦然。",
    levelDesc:{ "強力":"召喚盟友時，你可以選擇 2 種特性，而不是 1 種。你可以重複選擇相同的特性（屬性和異能等級會累積提升）。", "超級":"你可以選擇 3 種特性。", "終極":"你可以選擇 4 種特性。" },

function attrWord(v){ return ATTR_DESCRIPTORS[v]||""; }
function resetCreatorAttrs(){ creator.attrs={}; CREATOR_ATTRS.forEach(a=>creator.attrs[a.name]=1); }
function ensureCreatorAttrs(){ if(!creator.attrs) resetCreatorAttrs(); }
function pointsTotal(){ return creator.tier!=null?TIERS[creator.tier].points:0; }
function powerSourceCost(){ return Math.max(0,(creator.powerSources?creator.powerSources.length:0)-1); } // 第 1 種免費，其餘每種 1 點
// ---- 異能欄位（容量）與花費 ----
function ensureCreatorSlots(){ if(creator.slots==null) creator.slots=baseFreeSlots(); }
function baseFreeSlots(){ return creator.tier!=null?TIERS[creator.tier].powers:0; }
function totalSlots(){ ensureCreatorSlots(); return Math.max(1,creator.slots); }
// 單一異能占用的「異能欄位數」：基礎=1；每提升 1 級、每個強化各 +1；每個限制折抵 -1（最低 1）
function powerContribution(p){ const extras=p.level+p.enh.length; return 1+Math.max(0,extras-p.lim.length); }
function contribIfLevel(p,lv){ const extras=lv+p.enh.length; return 1+Math.max(0,extras-p.lim.length); }
function contribIfEnhAdd(p){ const extras=p.level+p.enh.length+1; return 1+Math.max(0,extras-p.lim.length); }
function powersUsed(){ return creator.powers.reduce((s,p)=>s+powerContribution(p),0); }
function emptySlots(){ return totalSlots()-powersUsed(); }
// 免費／額外欄位拆分：超出免費額度的為額外欄位；異能優先占用免費欄位
function extraSlotsCount(){ return Math.max(0, totalSlots()-baseFreeSlots()); }
function freeSlotsCount(){ return totalSlots()-extraSlotsCount(); }
function freeSlotsUsed(){ return Math.min(powersUsed(), freeSlotsCount()); }
function extraSlotsUsed(){ return Math.max(0, powersUsed()-freeSlotsCount()); }
// 欄位相對免費額度的增減 → 點數：每多 1 個欄位(額外購買) 花 2 點；每少 1 個欄位(捨棄) 退 2 點
function powerPointDelta(){ return (totalSlots()-baseFreeSlots())*2; }
function maxLevelForTier(){ return creator.tier===3?2:1; } // 宇宙勇者可到超級(2)，其餘到強力(1)；終極(3)創角不可

function findPower(id){ return creator.powers.find(p=>p.id===id); }
function needSlot(msg){ showInfo("異能欄位不足", msg||"此操作需要 1 個空白異能欄位。請先騰出欄位，或在免費欄位用完後購買額外欄位。"); }
function addPower(id){ if(findPower(id))return; if(emptySlots()<1){ needSlot(); return; } creator.powers.push({id,level:0,enh:[],lim:[]}); renderCreator(); }
function removePower(id){ creator.powers=creator.powers.filter(p=>p.id!==id); renderCreator(); }
// 限制以物件儲存並綁定其換得的項目：{li, bind:{kind:'level'} | {kind:'enh', ei}}
function limEntry(p,li){ return p.lim.find(x=>x.li===li); }
function hasLim(p,li){ return p.lim.some(x=>x.li===li); }
function enhBoundLimIdx(p,ei){ return p.lim.findIndex(x=>x.bind&&x.bind.kind==="enh"&&x.bind.ei===ei); }
function levelBoundCount(p){ return p.lim.filter(x=>x.bind&&x.bind.kind==="level").length; }
function setPowerLevel(id,lvl){ const p=findPower(id); if(!p)return; if(lvl<0||lvl>maxLevelForTier()||lvl===p.level)return;
  if(lvl>p.level){ // 升級：需要容量
    if(powersUsed()-powerContribution(p)+contribIfLevel(p,lvl)>totalSlots()){ needSlot("提升等級需要 1 個空白異能欄位。"); return; }
    p.level=lvl;
  } else { // 降級：若被取消的等級是某個限制換來的，連帶取消該限制
    p.level=lvl;
    let lvlLims=p.lim.filter(x=>x.bind&&x.bind.kind==="level");
    while(lvlLims.length>p.level){ const last=lvlLims.pop(); const k=p.lim.indexOf(last); if(k>=0)p.lim.splice(k,1); }
  }
  afterPowerChange(); }
function togglePwEnh(id,ei){ const p=findPower(id); if(!p)return; const i=p.enh.indexOf(ei);
  if(i>=0){ // 移除強化：若此強化是某個限制換來的，連帶取消該限制
    p.enh.splice(i,1);
    const lk=enhBoundLimIdx(p,ei); if(lk>=0) p.lim.splice(lk,1);
    afterPowerChange(); return; }
  if(powersUsed()-powerContribution(p)+contribIfEnhAdd(p)>totalSlots()){ needSlot("新增強化需要 1 個空白異能欄位。"); return; }
  p.enh.push(ei); afterPowerChange(); }
// 限制：點選後跳出對話框，免費換取「升 1 級」或「1 個強化」；限制與其換得的項目雙向綁定（取消任一方，另一方同時取消）
function clickLimit(id,li){ const p=findPower(id); if(!p)return; const pw=POWERS[id];
  const entry=limEntry(p,li);
  if(entry){ // 取消限制 → 連帶取消其換得的升級或強化
    p.lim.splice(p.lim.indexOf(entry),1);
    if(entry.bind){ if(entry.bind.kind==="level"){ p.level=Math.max(0,p.level-1); } else if(entry.bind.kind==="enh"){ const ei=p.enh.indexOf(entry.bind.ei); if(ei>=0)p.enh.splice(ei,1); } }
    afterPowerChange(); return; }
  const canLevel=p.level<Math.min(maxLevelForTier(),powerOwnMaxLevel(pw)); // 沒有等級的異能不提供免費升級
  const availEnh=pw.enh.map((e,ei)=>({e,ei})).filter(x=>!p.enh.includes(x.ei));
  if(!canLevel&&availEnh.length===0){ showInfo("無可折抵項目","沒有可以免費換取的項目，可能已達等級上限或沒有等級，而且強化項目已全選。"); return; }
  const opts=[];
  if(canLevel) opts.push({label:`免費升級至「${POWER_LEVELS[p.level+1]}」`,cls:"btn-gold",onClick:()=>{ p.level++; p.lim.push({li,bind:{kind:"level"}}); afterPowerChange(); }});
  availEnh.forEach(x=>opts.push({label:`免費換強化：${x.e.name}`,onClick:()=>{ p.enh.push(x.ei); p.lim.push({li,bind:{kind:"enh",ei:x.ei}}); afterPowerChange(); }}));
  opts.push({label:"取消",cls:"btn-ghost",onClick:null});
  showChoice(`套用限制「${pw.lim[li].name}」`, `<p class="choice-desc">${fmtHTML(pw.lim[li].desc)}</p><p class="choice-q">此限制可免費換取以下其中 1 項：</p>`, opts);
}
// 欄位增減
function discardSlot(){ if(emptySlots()<1)return; if(totalSlots()<=1){ showInfo("至少保留 1 個欄位","你必須至少保留 1 個異能欄位。"); return; } creator.slots=totalSlots()-1; afterPowerChange(); }
function addSlot(){ const base=baseFreeSlots(), cur=totalSlots(); const restoring=cur<base;
  if(!restoring && emptySlots()>0) return; // 仍有空的免費欄位時不可購買額外
  if(pointsLeft()<2){ showInfo("創角點數不足","新增異能欄位需要 2 點創角點數，但你的點數不足。"); return; }
  creator.slots=cur+1; afterPowerChange(); }
function powerBuySlotHTML(){
  const base=baseFreeSlots(), total=totalSlots(), restoring=total<base;
  const can = pointsLeft()>=2 && (restoring || emptySlots()===0);
  const label = restoring ? "↩ 還原免費欄位（−2 點）" : "＋ 購買額外異能欄位（−2 點）";
  return `<button class="btn btn-sm pw-buy-slot" data-add-slot="1"${can?"":" disabled"}>${label}</button>`;
}

function pointsSpent(){ ensureCreatorAttrs(); ensureCreatorSlots(); return CREATOR_ATTRS.reduce((s,a)=>s+creator.attrs[a.name],0)+powerSourceCost()+powerPointDelta()+talentPointCost()+weaknessPointDelta(); }
function pointsLeft(){ return pointsTotal()-pointsSpent(); }

function adjustAttr(name,delta){
  if(creator.tier==null) return;
  ensureCreatorAttrs();
  const cap=TIERS[creator.tier].attrCap, cur=creator.attrs[name];
  let nv=cur+delta;
  if(nv<1) nv=1; if(nv>cap) nv=cap;
  if(delta>0 && nv>cur && pointsLeft()<=0) return;
  creator.attrs[name]=nv; renderCreator();
}
function toggleSource(i){
  if(creator.tier==null) return;
  const arr=creator.powerSources, pos=arr.indexOf(i);
  if(pos>=0){ arr.splice(pos,1); }
  else { if(arr.length>=1 && pointsLeft()<1) return; arr.push(i); } // 額外來源需付 1 點
  renderCreator();
}
function rollSource(){
  if(creator.tier==null) return;
  const arr=creator.powerSources;
  const avail=POWER_SOURCES.map((s,i)=>i).filter(i=>!arr.includes(i));
  if(!avail.length){ showInfo("沒有可擲的來源","所有異能來源都已選取。"); return; }
  const doRoll=()=>{ arr.push(avail[rand(avail.length)]); renderCreator(); };
  if(arr.length===0){ doRoll(); return; }                 // 第 1 種免費，直接擲
  if(pointsLeft()<1){ showInfo("創角點數不足","第 2 種之後的異能來源每種需付 1 點創角點數，但你的點數不足。"); return; }
  showChoice("購買額外異能來源",
    `<p class="choice-desc">第 1 種異能來源免費，第 2 種之後每種都需要花費 1 點創角點數購買。</p><p class="choice-q">確定要隨機再抽 1 種來源嗎？</p>`,
    [{label:"隨機再抽 1 種（需付 1 點）",cls:"btn-gold",onClick:doRoll},{label:"取消",cls:"btn-ghost",onClick:null}]);
}

/* ---- 步驟定義（可自由前後切換、不鎖定） ---- */
const CREATOR_STEPS=[
  {chip:"1",   label:"1. 決定階級",      render:renderTierStep},
  {chip:"2",   label:"2. 分配起始屬性",  render:renderAttrStep},
  {chip:"3-A", label:"3-A 選擇異能來源", render:renderPowerSourceStep},
  {chip:"3-B", label:"3-B 選擇異能",     render:renderPowerStep},
  {chip:"4",   label:"4. 選擇職業",      render:renderProfessionStep},
  {chip:"5",   label:"5. 選擇天賦",      render:renderTalentStep},
  {chip:"6",   label:"6. 選擇弱點（非強制）", render:renderWeaknessStep},
  {chip:"7",   label:"7. 計算數據",      render:renderDataStep}
];

function tierCard(t,i,selected){
  const stat=(l,v)=>`<div class="tier-stat"><span class="tier-stat-num display">${v}</span><span class="tier-stat-label">${l}</span></div>`;
  return `<div class="card tier-card-paper${selected?" sel":""}" data-tier="${i}" role="button" tabindex="0" aria-pressed="${selected?"true":"false"}">
    <div class="card-top"><span class="card-en">${t.en}</span>${selected?'<span class="tier-sel-badge">✓ 已選擇</span>':''}</div>
    <h2 class="card-name display">${t.name}</h2>
    <div class="tier-stats">${stat("創角點數",t.points)}${stat("起始屬性上限",t.attrCap)}${stat("免費異能數量",t.powers)}${stat("起始聲望",t.fame)}</div>
    <div class="card-cta display">${selected?"已選擇此階級":"選擇此階級"}</div>
  </div>`;
}
function needTierHint(){ return `<p class="tier-hint">請先回到「決定階級」選擇英雄階級。</p>`; }

function renderTierStep(){
  return `<p class="step-intro">在遊戲正式開始前，跟 GM 一起討論決定英雄的階級。通常整支團隊的英雄階級都會一樣。GM 會根據英雄階級來安排遊戲風格，以及英雄會遇到的挑戰。</p>
    <div class="tier-grid">${TIERS.map((t,i)=>tierCard(t,i,creator.tier===i)).join("")}</div>`;
}
function renderAttrStep(){
  if(creator.tier==null) return needTierHint();
  ensureCreatorAttrs();
  const cap=TIERS[creator.tier].attrCap, left=pointsLeft();
  const rows=CREATOR_ATTRS.map(a=>{
    const v=creator.attrs[a.name];
    return `<div class="attr-row">
      <div class="attr-info"><span class="attr-name">${a.name}</span><span class="attr-desc">${a.desc}</span></div>
      <div class="attr-stepper">
        <button class="step-btn" data-attr="${a.name}" data-delta="-1"${v<=1?" disabled":""} aria-label="${a.name}減少">−</button>
        <span class="attr-val display">${v}</span>
        <span class="attr-word">${attrWord(v)}</span>
        <button class="step-btn" data-attr="${a.name}" data-delta="1"${(v>=cap||left<=0)?" disabled":""} aria-label="${a.name}增加">＋</button>
      </div>
    </div>`;
  }).join("");
  return `<p class="step-intro">英雄擁有 6 項屬性，用來表示英雄的天生素質。每項屬性的數值範圍介於 1～12，普通人的屬性值為 2。將創角點數 1:1 自由分配到各項屬性：每項最低為 1（須先花 6 點作為保底），最高不超過此階級上限 <b>${cap}</b>。</p>
    <div class="attr-alloc">${rows}</div>`;
}
function renderPowerSourceStep(){
  if(creator.tier==null) return needTierHint();
  const arr=creator.powerSources;
  const cards=POWER_SOURCES.map((s,i)=>{
    const selPos=arr.indexOf(i), isSel=selPos>=0;
    const tag = isSel
      ? (selPos===0?`<span class="src-tag free">免費</span>`:`<span class="src-tag paid">已付 1 點</span>`)
      : (arr.length===0?`<span class="src-tag free">免費</span>`:`<span class="src-tag cost">需付 1 點</span>`);
    const disabled = !isSel && arr.length>=1 && pointsLeft()<1;
    return `<div class="src-card${isSel?" sel":""}${disabled?" disabled":""}" data-source="${i}" role="button" tabindex="0" aria-pressed="${isSel?"true":"false"}">
      <div class="src-name">${s.name}${tag}</div><div class="src-desc">${s.desc}</div>
    </div>`;
  }).join("");
  const n=arr.length, cost=powerSourceCost();
  const summary = n===0
    ? `尚未選擇來源，至少需選 1 種。`
    : `已選免費 1 種${cost>0?`、額外 ${cost} 種，共花費 ${cost} 點創角點數`:""}`;
  const note = n>1 ? `<p class="src-note">擁有多種來源時，之後分配異能時須指定每個異能屬於哪一種來源。</p>` : "";
  const secHead=`<div class="sec-head"><div><span class="sec-title display">異能來源</span><span class="sec-hint">免費 1 種，第 2 種起每種需付 1 點</span></div><button class="dice-btn" data-source-roll="1">🎲 隨機</button></div>`;

// 彈出視窗中的等級／強化／限制設定區塊
function powerOwnMaxLevel(pw){ if(!pw.levelDesc) return 0; let m=0; POWER_LEVELS.forEach((nm,i)=>{ if(pw.levelDesc[nm]!=null) m=Math.max(m,i); }); return m; }
function powerConfigBlocks(p){
  const pw=POWERS[p.id], contrib=powerContribution(p), used=powersUsed(), total=totalSlots();
  const tierMax=maxLevelForTier(), ownMax=powerOwnMaxLevel(pw), maxLvl=Math.min(tierMax,ownMax);
  let levelBlock="";
  if(ownMax>0){
    const lvlBtns=POWER_LEVELS.map((nm,li)=>{
      const cur=p.level===li; let dis=false, reason="";
      if(li>ownMax){ dis=true; reason="無此等級"; }
      else if(li>tierMax){ dis=true; reason=li===3?"創角不可選":"僅宇宙勇者"; }
      else if(li>p.level && used-contrib+contribIfLevel(p,li)>total){ dis=true; }
      return `<button class="lvl-btn${cur?" cur":""}${dis?" disabled":""}" data-pw-level="${p.id}:${li}"${dis?' aria-disabled="true"':''}>${nm}${reason?`<span class="lvl-na">${reason}</span>`:""}</button>`;
    }).join("");
    const lvlDescNow = p.level>0 ? `<div class="lvl-desc"><b>${POWER_LEVELS[p.level]}</b>：${fmtHTML(pw.levelDesc[POWER_LEVELS[p.level]]||"")}</div>` : "";
    levelBlock=`<div class="pw-block"><div class="pw-block-label">等級（每升 1 級占 1 欄位）</div><div class="lvl-row">${lvlBtns}</div>${lvlDescNow}</div>`;
  }
  const enhRows=pw.enh.map((e,ei)=>{
    const on=p.enh.includes(ei);
    const dis = !on && used-contrib+contribIfEnhAdd(p)>total;
    const bound = on && enhBoundLimIdx(p,ei)>=0;
    return `<div class="opt${on?" sel":""}${dis?" disabled":""}" ${dis?'aria-disabled="true"':'role="button" tabindex="0"'} data-pw-enh="${p.id}:${ei}"><span class="opt-mark"></span><div><span class="opt-name">${e.name}${bound?' <span class="lim-tag">限制折抵</span>':''}</span><span class="opt-desc">${fmtHTML(e.desc)}</span></div></div>`;
  }).join("");
  const limRows=pw.lim.map((l,li)=>{
    const entry=limEntry(p,li), on=!!entry;
    let tag="";
    if(on){ const b=entry.bind; tag = b ? (b.kind==="level" ? "已折抵（升級）" : `已折抵（強化：${pw.enh[b.ei]?pw.enh[b.ei].name:""}）`) : "已折抵"; }
    return `<div class="opt${on?" sel":""}" role="button" tabindex="0" data-pw-lim="${p.id}:${li}"><span class="opt-mark"></span><div><span class="opt-name">${l.name}${on?` <span class="lim-tag">${tag}</span>`:''}</span><span class="opt-desc">${fmtHTML(l.desc)}</span></div></div>`;
  }).join("");
  return `${levelBlock}
    <div class="pw-block"><div class="pw-block-label">強化（每項占 1 欄位）</div>${enhRows}</div>
    <div class="pw-block"><div class="pw-block-label">限制（免費；點選後選擇免費升級或免費換 1 個強化，兩者會綁定連動）</div>${limRows}</div>`;
}

const CREATOR_FREE_TALENTS=1; // 自選天賦免費額度（職業天賦另計於步驟 4）

function weaknessPointDelta(){ return -(creator.weaknesses?creator.weaknesses.length:0); } // 每個弱點 +1 創角點數（降低 spent）
function addWeakness(i){
  if(creator.weaknesses.length>=WEAKNESS_MAX){ showInfo("已達上限",`創角時最多只能選擇 ${WEAKNESS_MAX} 個弱點。`); return; }

function removeWeaknessAt(pos){
  if(pos<0||pos>=creator.weaknesses.length) return;

  creator.weaknesses.splice(pos,1); renderCreator();

function renderWeaknessStep(){

      +`</div>`;
  }
  const full=cnt>=WEAKNESS_MAX;

    else { btn=`<button class="btn btn-sm" data-weak-add="${i}">＋ 選擇${w.repeatable&&count>0?"（再選 1 次）":""}</button>`; }
    const tags=`${count>0?`<span class="src-tag sel">已選${w.repeatable&&count>1?` ×${count}`:""}</span>`:""}${w.repeatable?`<span class="src-tag free">可重複</span>`:""}`;
    return `<div class="weak-card${count>0?" on":""}"><div class="weak-head"><span class="weak-name">${w.name}${tags}</span>${btn}</div><div class="weak-desc">${fmtHTML(w.desc)}</div></div>`;
  }).join("");
  return intro+`<div class="points-bar">${status}</div>`+chosen+`<div class="weak-list">${rows}</div>`;
}
// 創角數據計算（沿用 statModsFromText 解析天賦／異能的數據加成）
function creatorStatMods(){
  const tot={health:0,resolve:0,melee:0};
  const addStat=s=>{if(!s)return;tot.health+=s.health||0;tot.resolve+=s.resolve||0;tot.melee+=s.melee||0;};
  const addEntry=o=>{if(!o)return;if(o.stat)addStat(o.stat);else addStat(statModsFromText(o.desc||""));};
  (creator.powers||[]).forEach(p=>{const pw=POWERS[p.id];if(pw&&pw.stat)addStat(pw.stat);});
  if(creator.profession!=null&&creator.professionTalent!=null) addEntry(CREATOR_PROFESSIONS[creator.profession].talents[creator.professionTalent]);
  (creator.talents||[]).forEach(t=>addEntry(CREATOR_TALENTS[t.id]));
  return tot;
}
function creatorDerived(){
  ensureCreatorAttrs(); const a=creator.attrs, ceil=Math.ceil, mod=creatorStatMods();
  return {
    health:ceil((a.格鬥+a.敏捷+a.力量)/2)+mod.health,
    resolve:ceil((a.理智+a.直覺+a.氣場)/2)+mod.resolve,
    melee:ceil(a.力量/2)+mod.melee,
    mod
  };
}
function renderDataStep(){

  return `<p class="step-intro">根據你分配的屬性，自動計算英雄的三項衍生數據。數值會隨屬性與所選天賦／異能即時更新。</p>
    <div class="data-grid">
      ${card("最大生命",d.health,`⌈(格鬥 ${a.格鬥} ＋ 敏捷 ${a.敏捷} ＋ 力量 ${a.力量}) ÷ 2⌉`,"承受「傷害」會減少生命。當生命歸零時，你會因傷害而崩潰。",d.mod.health)}
      ${card("最大決心",d.resolve,`⌈(理智 ${a.理智} ＋ 直覺 ${a.直覺} ＋ 氣場 ${a.氣場}) ÷ 2⌉`,"承受「壓力」會減少決心。當決心歸零時，你會因壓力而崩潰。",d.mod.resolve)}
      ${card("基礎肉搏傷害",d.melee,`⌈力量 ${a.力量} ÷ 2⌉`,"近身肉搏攻擊命中時造成的基礎傷害。",d.mod.melee)}
    </div>`;
}

function selectTier(ti){

function confirmTier(ti){
  showChoice("確認階級",
    `<p class="choice-desc">確定是「${TIERS[ti].name}」嗎？</p><p class="choice-q">確定後將直接進入下一步「分配起始屬性」。</p>`,
    [{label:"確定，進入下一步",cls:"btn-gold",onClick:()=>{ selectTier(ti); gotoStep(creator.step+1); }},
     {label:"取消",cls:"btn-ghost",onClick:null}]);

function wireCreator(){
  if(creatorWired) return; creatorWired=true;
  const body=document.getElementById("creatorBody");
  body.addEventListener("click",e=>{
    const nav=e.target.closest("[data-nav]");
    if(nav){ gotoStep(creator.step+(nav.dataset.nav==="next"?1:-1)); return; }
    const chip=e.target.closest("[data-step]");
    if(chip){ gotoStep(+chip.dataset.step); return; }
    const st=e.target.closest("[data-attr]");
    if(st){ adjustAttr(st.dataset.attr,+st.dataset.delta); return; }
    const srcRoll=e.target.closest("[data-source-roll]");
    if(srcRoll){ rollSource(); return; }
    const src=e.target.closest("[data-source]");
    if(src){ if(!src.classList.contains("disabled")) toggleSource(+src.dataset.source); return; }
    const slotAcq=e.target.closest("[data-slot-acquire]");
    if(slotAcq){ openPowerModalAdd(); return; }
    const slotDis=e.target.closest("[data-slot-discard]");
    if(slotDis){ if(!slotDis.disabled) discardSlot(); return; }
    const addSlotBtn=e.target.closest("[data-add-slot]");
    if(addSlotBtn){ if(!addSlotBtn.disabled) addSlot(); return; }
    const pwEdit=e.target.closest("[data-pw-edit]");
    if(pwEdit){ openPowerModalEdit(+pwEdit.dataset.pwEdit); return; }
    const pwRem=e.target.closest("[data-pw-remove]");
    if(pwRem){ removePower(+pwRem.dataset.pwRemove); return; }
    const prof=e.target.closest("[data-prof]");
    if(prof){ selectProfession(+prof.dataset.prof); return; }
    const profRoll=e.target.closest("[data-prof-roll]");
    if(profRoll){ const k=profRoll.dataset.profRoll; if(k==="talent")rollProfTalent(); else if(k==="subject")rollProfSubj(); else if(k==="bond")rollBond(); return; }
    const bondPick=e.target.closest("[data-bond-custom-pick]");
    if(bondPick){ chooseBondCustom(); return; }
    const ident=e.target.closest("[data-identity]");
    if(ident){ selectIdentity(ident.dataset.identity); return; }
    const weakAdd=e.target.closest("[data-weak-add]");
    if(weakAdd){ if(!weakAdd.disabled) addWeakness(+weakAdd.dataset.weakAdd); return; }
    const weakRem=e.target.closest("[data-weak-remove]");
    if(weakRem){ removeWeaknessAt(+weakRem.dataset.weakRemove); return; }
    const weakRemId=e.target.closest("[data-weak-remove-id]");
    if(weakRemId){ removeWeaknessId(+weakRemId.dataset.weakRemoveId); return; }
    const opt=e.target.closest("[data-group]");
    if(opt&&!opt.classList.contains("disabled")){
      const g=opt.dataset.group, idx=+opt.dataset.idx;
      if(g==="profTalent"){ selectProfTalent(idx); return; }
      if(g==="profSubj"){ selectProfSubj(idx); return; }
      if(g==="bond"){ selectBondPreset(idx); return; }
    }
    const talAdd=e.target.closest("[data-tal-add]");
    if(talAdd){ if(!talAdd.disabled) addTalentInstance(+talAdd.dataset.talAdd); return; }
    const talRem=e.target.closest("[data-tal-remove]");
    if(talRem){ if(!talRem.disabled) removeTalentInstance(+talRem.dataset.talRemove); return; }
    const talSubj=e.target.closest("[data-tal-subj]");
    if(talSubj){ if(!talSubj.disabled){ const [i,j]=talSubj.dataset.talSubj.split(":").map(Number); toggleTalentSubject(i,j); } return; }
    const tier=e.target.closest("[data-tier]");
    if(tier){ confirmTier(+tier.dataset.tier); return; }
  });
  body.addEventListener("keydown",e=>{
    if(e.key!=="Enter"&&e.key!==" ") return;
    const fwd=e.target.closest("[data-prof],[data-bond-custom-pick],[data-group]");
    if(fwd){ e.preventDefault(); fwd.click(); return; }
    const tier=e.target.closest("[data-tier]"), src=e.target.closest("[data-source]");
    if(tier){ e.preventDefault(); confirmTier(+tier.dataset.tier); }
    else if(src){ e.preventDefault(); if(!src.classList.contains("disabled")) toggleSource(+src.dataset.source); }
  });
  body.addEventListener("input",e=>{
    const bc=e.target.closest("[data-bond-custom]");
    if(bc){ creator.bondCustom=bc.value; }
  });
}

const REPEATABLE_TALENTS=["堅定決心","頑強生命"];
function talentRepeatable(name){ return REPEATABLE_TALENTS.includes(name)||name.indexOf("學識淵博")===0; }
// 回傳「另一來源已選、且不可重複」的天賦名稱（代表此來源不可再選同名天賦）
function blockedTalentName(group){
  const arc=ARCHETYPES[currentIndex];
  if(group==="freeTalent"){
    if(arc.professions&&sel.profession!=null&&sel.professionTalent!=null){
      const n=arc.professions[sel.profession].talents[sel.professionTalent].name;
      if(!talentRepeatable(n)) return n;
    }
  }else if(group==="professionTalent"){
    if(arc.freeTalents&&sel.freeTalent!=null){
      const n=arc.freeTalents[sel.freeTalent].name;
      if(!talentRepeatable(n)) return n;
    }
  }
  return null;
}
function isTalentBlocked(group,idx){
  const arc=ARCHETYPES[currentIndex];
  const blocked=blockedTalentName(group); if(blocked==null) return false;
  const list=group==="freeTalent"?arc.freeTalents:arc.professions[sel.profession].talents;
  return !!(list[idx]&&list[idx].name===blocked);
}
function rollTalent(list,blocked){
  const ok=[]; for(let i=0;i<list.length;i++) if(blocked==null||list[i].name!==blocked) ok.push(i);
  const pool=ok.length?ok:list.map((_,i)=>i);
  return pool[rand(pool.length)];
}
function talentList(group,subjGroup,talents,selIdx,selSubjIdx){
  const blocked=blockedTalentName(group);
  return talents.map((t,i)=>{
    const dis=blocked!=null&&t.name===blocked&&selIdx!==i;
    let html=optRow(group,i,t.name,t.desc,selIdx===i,dis,dis?"此天賦不可重複選取":"");
    if(selIdx===i&&t.subjects){
      html+=`<div class="subject-inline">${secHead("專精主題","1D"+t.subjects.length+" 或自選 1 個",subjGroup)}${t.subjects.map((s,j)=>optRow(subjGroup,j,s.name,s.desc,selSubjIdx===j)).join("")}</div>`;
    }
    return html;
  }).join("");
}

    <div class="field"><label>本名</label><input data-field="real" type="text" placeholder="例如：林子澄" value="${esc(sel.real)}"></div>
    <div class="field"><label>外觀</label><input data-field="look" type="text" placeholder="例如：褪色的紅色連帽外套，左眼有一道疤" value="${esc(sel.look)}"></div>
    <div class="field"><label>背景故事</label><textarea data-field="note" placeholder="角色的來歷、性格、與隊友的關係……都可以寫在這裡">${esc(sel.note)}</textarea></div>
  </section>`;

  const R=`<div class="preview-wrap"><div class="preview-label">文字檔預覽</div><pre class="preview" id="preview">${esc(buildText())}</pre>
    <div class="progress" id="progress">${progressHTML()}</div>
    <div class="builder-actions">
      <button class="btn btn-gold" onclick="downloadTxt()">匯出文字檔</button>
      <button class="btn btn-ink" onclick="copyTxt()">複製文字</button>
      <button class="btn btn-ghost" onclick="saveBuild()">儲存角色</button>
    </div></div>`;

  const intro=`<div class="builder-intro">
    <div class="builder-head"><span class="display">英雄建檔</span><span class="builder-name display">${arc.name}</span></div>
    <div class="builder-meta">${arc.en?`<span class="builder-en">${arc.en}</span>`:""}${arc.role?`<span class="builder-role">${arc.role}</span>`:""}</div>
    <p class="builder-sub">自選或擲骰決定各項選擇，完成後可匯出或複製文字檔。</p>
    <div class="builder-tools"><button class="btn btn-ghost" onclick="rollAll()">🎲 全部隨機</button><button class="btn btn-ghost" onclick="clearAll()">✕ 全部清除</button></div>
  </div>`;
  return `<div class="builder-grid"><div class="builder-col">${intro}${L}</div>${R}</div>`;
}

function wireBuilder(){
  if(builderWired) return; builderWired=true;
  const b=document.getElementById("builderBody");
  b.addEventListener("click",e=>{
    const d=e.target.closest("[data-dice]"); if(d){rollGroup(d.dataset.dice);return;}
    const o=e.target.closest("[data-group]"); if(o){chooseOption(o.dataset.group,+o.dataset.idx);return;}
  });
  b.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===" "){const o=e.target.closest("[data-group]");if(o&&o.tagName!=="BUTTON"){e.preventDefault();chooseOption(o.dataset.group,+o.dataset.idx);}}
  });
  b.addEventListener("input",e=>{const f=e.target.dataset.field;if(f){sel[f]=e.target.value;const pv=document.getElementById("preview");if(pv)pv.textContent=buildText();const pr=document.getElementById("progress");if(pr)pr.innerHTML=progressHTML();syncMobileBar();}});
}
function chooseOption(group,idx){
  if(group==="personalities"){
    const i=sel.personalities.indexOf(idx);
    if(i>=0) sel.personalities.splice(i,1);
    else{ if(sel.personalities.length>=2) sel.personalities.shift(); sel.personalities.push(idx); }
  }else if(group==="profession"){ sel.profession=idx; sel.professionTalent=null; sel.professionTalentSubject=null; }
  else if(group==="professionTalent"){ if(isTalentBlocked("professionTalent",idx)) return; sel.professionTalent=idx; sel.professionTalentSubject=null; }
  else if(group==="freeTalent"){ if(isTalentBlocked("freeTalent",idx)) return; sel.freeTalent=idx; sel.freeTalentSubject=null; }
  else sel[group]=idx;
  reRender();
}
function rollGroup(g){
  const arc=ARCHETYPES[currentIndex];
  if(g==="powerSource") sel.powerSource=rand(arc.powerSource.options.length);
  else if(g==="profession"){sel.profession=rand(arc.professions.length);sel.professionTalent=null;sel.professionTalentSubject=null;}
  else if(g==="professionTalent"){if(sel.profession==null)sel.profession=rand(arc.professions.length);sel.professionTalent=rollTalent(arc.professions[sel.profession].talents,blockedTalentName("professionTalent"));sel.professionTalentSubject=null;}
  else if(g==="professionTalentSubject"){const subs=arc.professions[sel.profession].talents[sel.professionTalent].subjects;sel.professionTalentSubject=rand(subs.length);}
  else if(g==="freeTalent"){sel.freeTalent=rollTalent(arc.freeTalents,blockedTalentName("freeTalent"));sel.freeTalentSubject=null;}
  else if(g==="freeTalentSubject"){const subs=arc.freeTalents[sel.freeTalent].subjects;sel.freeTalentSubject=rand(subs.length);}
  else if(g==="personalities") sel.personalities=pick2(arc.personalities.length);
  else if(g==="motivation") sel.motivation=rand(arc.motivations.length);
  else if(g==="flaw") sel.flaw=rand(arc.flaws.length);
  reRender();
}
function rollAll(){
  const arc=ARCHETYPES[currentIndex];
  if(arc.powerSource) sel.powerSource=rand(arc.powerSource.options.length);
  if(arc.professions){
    sel.profession=rand(arc.professions.length);
    const pf=arc.professions[sel.profession];
    sel.professionTalent=rand(pf.talents.length);
    const pt=pf.talents[sel.professionTalent];
    sel.professionTalentSubject=pt.subjects?rand(pt.subjects.length):null;
  }
  if(arc.freeTalents){
    sel.freeTalent=rollTalent(arc.freeTalents,blockedTalentName("freeTalent"));
    const ft=arc.freeTalents[sel.freeTalent];
    sel.freeTalentSubject=ft.subjects?rand(ft.subjects.length):null;
  }
  if(arc.personalities) sel.personalities=pick2(arc.personalities.length);
  if(arc.motivations) sel.motivation=rand(arc.motivations.length);
  if(arc.flaws) sel.flaw=rand(arc.flaws.length);
  reRender();
}
function reRender(){
  const sc=document.getElementById("builderScreen"),top=sc?sc.scrollTop:0;
  document.getElementById("builderBody").innerHTML=renderBuilderForm();
  if(sc) sc.scrollTop=top;
  syncMobileBar();
}
function clearAll(){sel=blankSel();sel.archIndex=currentIndex;reRender();}

/* ===================== 數據（衍生數值） ===================== */
// 解析單筆敘述中的數據加成（最大生命/最大決心/肉搏傷害 +N）
function statModsFromText(text){
  const m={health:0,resolve:0,melee:0};
  const grab=label=>{const re=new RegExp("`?"+label+"`?\\s*\\+\\s*(\\d+)","g");let mt,s=0;while((mt=re.exec(text)))s+=parseInt(mt[1],10);return s;};
  m.health=grab("最大生命");m.resolve=grab("最大決心");m.melee=grab("肉搏傷害");
  return m;
}
// 蒐集玩家所選天賦（職業天賦＋自選天賦）的數據加成
function collectStatMods(){
  const arc=ARCHETYPES[currentIndex],tot={health:0,resolve:0,melee:0};
  const addStat=s=>{if(!s)return;tot.health+=s.health||0;tot.resolve+=s.resolve||0;tot.melee+=s.melee||0;};
  const addEntry=o=>{if(!o)return;if(o.stat)addStat(o.stat);else addStat(statModsFromText(o.desc||""));};
  // 常駐異能：只採用明確標記的 stat（避免把「發散」「體型變化」等需發動或情境性的加成算進來）
  if(arc.powers) arc.powers.forEach(p=>{if(p.stat)addStat(p.stat);});
  // 所選天賦：有 stat 用 stat，否則解析敘述（例如「你的最大決心 +2」）
  if(arc.professions&&sel.profession!=null&&sel.professionTalent!=null) addEntry(arc.professions[sel.profession].talents[sel.professionTalent]);
  if(arc.freeTalents&&sel.freeTalent!=null) addEntry(arc.freeTalents[sel.freeTalent]);
  return tot;
}
// 計算三項數據（含天賦加成）
function derivedStats(){
  const a=ARCHETYPES[currentIndex].attrs,ceil=Math.ceil,mod=collectStatMods();
  return {
    health:ceil((a.格鬥+a.敏捷+a.力量)/2)+mod.health,
    resolve:ceil((a.理智+a.直覺+a.氣場)/2)+mod.resolve,
    melee:ceil(a.力量/2)+mod.melee,
    mod
  };
}

// 匯出用的數據文字
function buildStatsLine(){const d=derivedStats();return "生命 "+d.health+"　決心 "+d.resolve+"　肉搏傷害 "+d.melee;}

/* ===================== 匯出 ===================== */
function buildText(){
  const arc=ARCHETYPES[currentIndex];
  const hero=sel.hero.trim()||"（未命名英雄）";
  let o="";
  let head="範型："+arc.name+"\n";
  if(arc.role) head+="定位："+arc.role+"\n";
  head+="代號："+hero+"\n";
  if(sel.real.trim()) head+="本名："+sel.real.trim()+"\n";
  if(sel.look.trim()) head+="外觀："+sel.look.trim()+"\n";
  o+=head+"\n";
  o+="【簡介】\n"+arc.intro+"\n\n";
  o+="【屬性】"+ATTR_ORDER.map(a=>a+" "+arc.attrs[a]).join("　")+"\n\n";
  const ds=buildStatsLine();
  o+="【數據】"+ds+"\n\n";
  if(arc.powerSource) o+="【異能來源】"+(sel.powerSource!=null?arc.powerSource.options[sel.powerSource]:"（尚未選擇）")+"\n\n";
  if(arc.powers){o+="【異能】\n"+arc.powers.map(p=>"◆ "+p.name+"\n"+indent(fmtTxt(p.desc))).join("\n\n")+"\n\n";}
  if(arc.professions){
    if(sel.profession!=null){
      const pf=arc.professions[sel.profession];
      o+="【職業】"+pf.name+"\n"+indent(fmtTxt(pf.desc))+"\n";
      if(sel.professionTalent!=null){const te=talentExport(pf.talents[sel.professionTalent],sel.professionTalentSubject);o+="  ▸ 職業天賦："+te.name+"\n"+indent(te.body,"    ")+"\n";}
      else o+="  ▸ 職業天賦：（尚未選擇）\n";
    }else o+="【職業】（尚未選擇）\n";
    o+="\n";
  }
  if(arc.freeTalents){
    if(sel.freeTalent!=null){const te=talentExport(arc.freeTalents[sel.freeTalent],sel.freeTalentSubject);o+="【自選天賦】"+te.name+"\n"+indent(te.body)+"\n\n";}
    else o+="【自選天賦】（尚未選擇）\n\n";
  }
  if(arc.personalities){const ps=sel.personalities.map(i=>arc.personalities[i]);o+="【個性】"+(ps.length?ps.join("、"):"（尚未選擇）")+"\n\n";}
  if(arc.motivations){
    if(sel.motivation!=null){const m=arc.motivations[sel.motivation];o+="【動機】"+m.name+"\n"+indent(fmtTxt(m.desc))+"\n\n";}
    else o+="【動機】（尚未選擇）\n\n";
  }
  if(arc.flaws){
    if(sel.flaw!=null){const f=arc.flaws[sel.flaw];o+="【缺陷】"+f.name+"\n"+indent(fmtTxt(f.desc))+"\n\n";}
    else o+="【缺陷】（尚未選擇）\n\n";
  }
  if(sel.note.trim()) o+="【背景故事】\n"+sel.note.trim()+"\n";
  return o.trimEnd()+"\n";
}
/* ---- 完成度 ---- */
function completion(){
  const arc=ARCHETYPES[currentIndex];const items=[];
  items.push({label:"代號",done:!!sel.hero.trim()});
  if(arc.powerSource) items.push({label:"異能來源",done:sel.powerSource!=null});
  if(arc.professions){
    items.push({label:"職業",done:sel.profession!=null});
    items.push({label:"職業天賦",done:sel.professionTalent!=null});
    if(sel.profession!=null&&sel.professionTalent!=null&&arc.professions[sel.profession].talents[sel.professionTalent].subjects)
      items.push({label:"專精主題（職業天賦）",done:sel.professionTalentSubject!=null});
  }
  if(arc.freeTalents){
    items.push({label:"自選天賦",done:sel.freeTalent!=null});
    if(sel.freeTalent!=null&&arc.freeTalents[sel.freeTalent].subjects)
      items.push({label:"專精主題（自選天賦）",done:sel.freeTalentSubject!=null});
  }
  if(arc.personalities) items.push({label:"個性（2 項）",done:sel.personalities.length===2});
  if(arc.motivations) items.push({label:"動機",done:sel.motivation!=null});
  if(arc.flaws) items.push({label:"缺陷",done:sel.flaw!=null});
  return {done:items.filter(i=>i.done).length,total:items.length,missing:items.filter(i=>!i.done).map(i=>i.label)};
}
function progressHTML(){
  const c=completion(),pct=c.total?Math.round(c.done/c.total*100):100,ok=c.done===c.total;
  return `<div class="progress-bar"><span style="width:${pct}%;background:${ok?'var(--green)':'var(--gold)'}"></span></div><div class="progress-text">${ok?'✓ 必選項目都完成了':'已完成 '+c.done+' / '+c.total+' 項'}</div>`;
}
function mbProgressHTML(){const c=completion();return c.done===c.total?'<span class="mb-done">✓ 必選項目已完成</span>':'已完成 '+c.done+' / '+c.total+' 項';}
function syncMobileBar(){const m=document.getElementById("mbProgress");if(m)m.innerHTML=mbProgressHTML();}

/* ---- 匯出（含完成度提醒） ---- */
function guardExport(proceed){
  const c=completion();
  if(c.missing.length) showConfirm("還有以下項目尚未完成：\n"+c.missing.map(m=>"・"+m).join("\n"),proceed);
  else proceed();
}
function downloadTxt(){guardExport(doDownload);}
function doDownload(){
  const text=buildText(),arc=ARCHETYPES[currentIndex];
  const fname=((sel.hero.trim()||arc.name))+"_角色卡.txt";
  const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  showToast("已匯出 "+fname);
}
function copyTxt(){guardExport(doCopy);}
async function doCopy(){
  const text=buildText();
  try{await navigator.clipboard.writeText(text);showToast("已複製到剪貼簿");}
  catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("已複製到剪貼簿");}catch(_){showToast("複製失敗，請手動選取");}document.body.removeChild(ta);}
}

/* ---- 角色資料編碼（供存檔／讀取使用） ---- */
function buildPayload(){const arc=ARCHETYPES[currentIndex];return {a:arc.name,h:sel.hero,r:sel.real,l:sel.look,n:sel.note,ps:sel.powerSource,pf:sel.profession,pt:sel.professionTalent,pts:sel.professionTalentSubject,ft:sel.freeTalent,fts:sel.freeTalentSubject,pe:sel.personalities,mo:sel.motivation,fl:sel.flaw};}
function applyPayload(p){
  const idx=ARCHETYPES.findIndex(a=>a.name===p.a);if(idx<0)return false;
  currentIndex=idx;sel=blankSel();sel.archIndex=idx;
  sel.hero=p.h||"";sel.real=p.r||"";sel.look=p.l||"";sel.note=p.n||"";
  sel.powerSource=p.ps??null;sel.profession=p.pf??null;sel.professionTalent=p.pt??null;sel.professionTalentSubject=p.pts??null;
  sel.freeTalent=p.ft??null;sel.freeTalentSubject=p.fts??null;
  sel.personalities=Array.isArray(p.pe)?p.pe:[];sel.motivation=p.mo??null;sel.flaw=p.fl??null;
  return true;
}

/* ---- 本機存檔（localStorage；需下載檔案後在瀏覽器開啟才能用） ---- */
const STORE_KEY="heroBuilds_v1";
function storageAvailable(){try{const k="__t";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}}
function storageGet(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch(e){return [];}}
function storageSet(a){try{localStorage.setItem(STORE_KEY,JSON.stringify(a));return true;}catch(e){return false;}}
function saveBuild(){
  if(!storageAvailable()){showToast("此環境無法儲存，請下載檔案後在瀏覽器開啟");return;}
  const arc=ARCHETYPES[currentIndex],builds=storageGet();
  builds.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),ts:Date.now(),name:arc.name,hero:sel.hero.trim(),data:buildPayload()});
  storageSet(builds);showToast("已儲存角色");renderSaves();
}
function loadBuild(p){if(applyPayload(p))openBuilder();}
function renderSaves(){
  const el=document.getElementById("savesSection");if(!el)return;
  const builds=storageAvailable()?storageGet():[];
  if(!builds.length){el.innerHTML="";return;}
  el.innerHTML='<h2 class="saves-title display">我的存檔</h2><div class="saves-list">'+builds.map(b=>{
    const d=new Date(b.ts),date=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    return '<div class="save-item"><div class="save-meta"><span class="save-name display">'+esc(b.hero||"（未命名英雄）")+'</span><span class="save-sub">'+esc(b.name)+" · "+date+'</span></div><div class="save-btns"><button class="save-load" data-id="'+b.id+'">載入</button><button class="save-del" data-id="'+b.id+'">刪除</button></div></div>';
  }).join("")+'</div>';
}

/* ---- 完成度提醒對話框 ---- */
let _modalOk=null;
function showConfirm(msg,onOk){_modalOk=onOk;document.getElementById("modalBody").textContent=msg;document.getElementById("modal").classList.add("on");}
function hideModal(){document.getElementById("modal").classList.remove("on");_modalOk=null;}

let _choiceHandlers=[];
function showChoice(title,bodyHTML,options){
  document.getElementById("choiceTitle").textContent=title;
  document.getElementById("choiceBody").innerHTML=bodyHTML;
  _choiceHandlers=options.map(o=>o.onClick||null);
  document.getElementById("choiceActions").innerHTML=options.map((o,i)=>`<button class="btn ${o.cls||"btn-ghost"}" data-choice="${i}">${o.label}</button>`).join("");
  document.getElementById("choiceModal").classList.add("on");
}
function hideChoice(){document.getElementById("choiceModal").classList.remove("on");_choiceHandlers=[];}
function showInfo(title,msg){ showChoice(title,`<div class="choice-desc">${msg}</div>`,[{label:"知道了",cls:"btn-gold",onClick:null}]); }

/* ===================== 共用 ===================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{s.classList.remove("on");s.scrollTop=0;});
  document.getElementById(id).classList.add("on");window.scrollTo(0,0);
  document.documentElement.style.overflow="hidden";
}
function goHome(){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));document.documentElement.style.overflow="";window.scrollTo(0,0);}
function showLanding(){document.getElementById("landing").style.display="";document.getElementById("registry").style.display="none";window.scrollTo(0,0);}
function showRegistry(){document.getElementById("landing").style.display="none";document.getElementById("registry").style.display="";renderSaves();window.scrollTo(0,0);}
let toastTimer;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200);}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(document.getElementById("choiceModal").classList.contains("on")) hideChoice();
    else if(document.getElementById("powerModal").classList.contains("on")) closePowerModal();
    else if(document.getElementById("modal").classList.contains("on")) hideModal();
    else if(document.getElementById("builderScreen").classList.contains("on")||document.getElementById("creatorScreen").classList.contains("on")) goHome();
  }
});

document.getElementById("modalOk").addEventListener("click",()=>{const f=_modalOk;hideModal();if(f)f();});
document.getElementById("modalCancel").addEventListener("click",hideModal);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")hideModal();});
document.getElementById("choiceActions").addEventListener("click",e=>{const b=e.target.closest("[data-choice]");if(!b)return;const f=_choiceHandlers[+b.dataset.choice];hideChoice();if(f)f();});
document.getElementById("choiceModal").addEventListener("click",e=>{if(e.target.id==="choiceModal")hideChoice();});

document.getElementById("powerModal").addEventListener("click",e=>{
  if(e.target.id==="powerModal"){ closePowerModal(); return; }
  if(e.target.closest("[data-pw-modal-close]")){ closePowerModal(); return; }
  if(e.target.closest("[data-pw-modal-remove]")){ removePowerFromModal(); return; }
  const buy=e.target.closest("[data-add-slot]");
  if(buy){ if(!buy.disabled) addSlot(); return; }
  const cat=e.target.closest("[data-cat]");
  if(cat){ const t=cat.dataset.cat; creator.powerModal.collapsed[t]=(creator.powerModal.collapsed[t]===false); const inner=document.getElementById("pwModalListInner"); if(inner) inner.innerHTML=renderPowerListInner(); return; }
  const pick=e.target.closest("[data-pw-pick]");
  if(pick&&!pick.classList.contains("taken")){ pickPowerInModal(+pick.dataset.pwPick); return; }
  const lv=e.target.closest("[data-pw-level]");
  if(lv){ if(!lv.classList.contains("disabled")){ const [id,li]=lv.dataset.pwLevel.split(":").map(Number); setPowerLevel(id,li); } return; }
  const enh=e.target.closest("[data-pw-enh]");
  if(enh){ if(!enh.classList.contains("disabled")){ const [id,ei]=enh.dataset.pwEnh.split(":").map(Number); togglePwEnh(id,ei); } return; }
  const lim=e.target.closest("[data-pw-lim]");
  if(lim){ const [id,li]=lim.dataset.pwLim.split(":").map(Number); clickLimit(id,li); return; }
});
document.getElementById("powerModal").addEventListener("input",e=>{
  const se=e.target.closest("[data-pw-search]");
  if(se){ creator.powerModal.search=se.value; const inner=document.getElementById("pwModalListInner"); if(inner) inner.innerHTML=renderPowerListInner(); }
});
document.getElementById("powerModal").addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ") return;
  if(e.target.closest("[data-pw-search]")) return;          // 搜尋框照常輸入
  const t=e.target.closest("[data-cat],[data-pw-pick],[data-pw-enh],[data-pw-lim]");
  if(t&&!t.classList.contains("disabled")&&!t.classList.contains("taken")){ e.preventDefault(); t.click(); }
});
document.getElementById("savesSection").addEventListener("click",e=>{
  const load=e.target.closest(".save-load"),del=e.target.closest(".save-del");
  if(load){const b=storageGet().find(x=>x.id===load.dataset.id);if(b)loadBuild(b.data);}
  else if(del){storageSet(storageGet().filter(x=>x.id!==del.dataset.id));renderSaves();}
});
document.getElementById("landArchetype").addEventListener("click",showRegistry);
document.getElementById("landCustom").addEventListener("click",openCreator);
renderSaves();
</script>
</body>
