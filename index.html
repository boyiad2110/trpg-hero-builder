<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超級英雄建檔工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0e1326;--night-2:#161d38;--paper:#f4efe4;--ink:#191922;--ink-soft:#4a4a57;
  --red:#e5342b;--gold:#f2b705;--green:#2f9e54;--line:2px solid var(--ink);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--night);background-image:radial-gradient(circle at 20% -10%,#1d2647 0%,transparent 45%),radial-gradient(circle at 90% 0%,#241a3a 0%,transparent 40%);color:var(--paper);line-height:1.7;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}
.display{font-family:"Oswald","Noto Sans TC",sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* 報頭 */
.masthead{padding:54px 0 30px;text-align:center}
.eyebrow{display:inline-block;font-family:"Oswald",sans-serif;letter-spacing:.42em;font-size:.72rem;text-transform:uppercase;color:var(--gold);border:1px solid rgba(242,183,5,.5);padding:5px 14px 5px 18px;border-radius:2px;margin-bottom:20px}
.wordmark{font-weight:900;font-size:clamp(2.6rem,8vw,5rem);line-height:.95;letter-spacing:.04em}
.wordmark .wm-part{display:inline-block;white-space:nowrap}
.tagline{margin-top:16px;color:#b9bed1;font-size:clamp(.95rem,2.4vw,1.1rem);max-width:none}
.count-strip{margin-top:26px;display:inline-flex;align-items:center;gap:14px;font-family:"Oswald",sans-serif;font-size:.82rem;letter-spacing:.12em;color:#8d93ad}
.count-strip b{color:var(--paper);font-size:1.05rem}
.count-strip .ln{display:inline-block;width:34px;height:1px;background:#3b4263}

/* 卡片牆 */
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:14px 0 70px}
.card{position:relative;background:var(--paper);color:var(--ink);border:var(--line);border-radius:4px;padding:22px 20px 20px;cursor:pointer;box-shadow:6px 6px 0 rgba(0,0,0,.55);transition:transform .14s ease,box-shadow .14s ease;outline:none;display:flex;flex-direction:column}
.card:focus-visible{transform:translate(-3px,-3px);box-shadow:10px 10px 0 var(--gold)}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:10px;min-height:20px}
.card-en{font-family:"Oswald",sans-serif;letter-spacing:.16em;text-transform:uppercase;font-size:.8rem;color:var(--red);font-weight:600}
.role-badge{font-family:"Oswald",sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--gold);padding:3px 9px;border-radius:2px;white-space:nowrap}
.card-name{font-weight:900;font-size:2rem;line-height:1.1;margin:6px 0 4px;letter-spacing:.02em}
.card-hex{display:flex;justify-content:center;margin:4px 0 10px}
.card-intro{font-size:.9rem;color:#3c3c47}
.card-cta{margin-top:16px;font-family:"Oswald",sans-serif;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:600;display:flex;align-items:center;gap:6px}
.card-cta::after{content:"→";transition:transform .14s ease}

/* 雷達：數字＋名稱皆在六角尖端外側，沿軸由內而外 */
.hex-grid{stroke:#c9c0ad;stroke-width:1;fill:none}
.hex-spoke{stroke:#d6cdba;stroke-width:1}
.hex-shape{fill:rgba(229,52,43,.18);stroke:var(--red);stroke-width:2.5;stroke-linejoin:round}
.hex-dot{fill:var(--red)}
.hex-dot.peak{fill:var(--gold);stroke:var(--ink);stroke-width:1.2}
.hex-num{font-family:"Oswald",sans-serif;font-weight:700;fill:var(--ink)}
.hex-name{font-family:"Noto Sans TC",sans-serif;font-weight:700;fill:var(--ink-soft)}

/* 覆蓋頁 */
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;z-index:40;background:var(--night);background-image:radial-gradient(circle at 15% 0%,#1d2647 0%,transparent 50%),radial-gradient(circle at 95% 10%,#241a3a 0%,transparent 45%);overflow-y:auto}
.screen.on{display:block}
.screen-inner{max-width:1000px;margin:0 auto;padding:calc(26px + env(safe-area-inset-top)) 24px 90px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 24px;gap:12px;flex-wrap:wrap}
.btn{font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.82rem;font-weight:600;padding:11px 20px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .12s ease,background .12s ease,color .12s ease,border-color .12s ease;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:translateY(1px)}
.btn-ghost{background:transparent;color:#c5cadd;border-color:#39406a}
.btn-ghost:hover{border-color:var(--paper);color:var(--paper)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:#dba504}
.btn-ink{background:var(--paper);color:var(--ink);border-color:var(--ink)}
.btn-ink:hover{background:#fff}

/* 建檔 */
.builder-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.builder-head .display{font-weight:900;font-size:clamp(1.8rem,5vw,2.6rem)}
.builder-name{color:var(--gold)}
.builder-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.builder-en{font-family:"Oswald",sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem;color:#b7bcd2}
.builder-role{font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.78rem;border:1px solid #3a4673;color:#b7bcd2;padding:5px 10px;border-radius:2px}
.builder-tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.builder-sub{color:#9aa0bd;margin-bottom:16px}
.builder-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:30px;align-items:start}
.builder-col{display:flex;flex-direction:column;gap:18px;min-width:0}
.bsec{background:#141b33;border:1.5px solid #262e54;border-radius:6px;padding:18px 18px 20px}
.sec-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.sec-title{font-weight:900;font-size:1.15rem;color:var(--paper)}
.sec-hint{display:block;font-size:.75rem;color:#8d93ad;margin-top:2px;letter-spacing:.04em}
.dice-btn{flex:none;background:#1d2647;border:1.5px solid #3a4673;color:#cfd4e6;font-family:"Oswald",sans-serif;font-size:.74rem;letter-spacing:.06em;padding:6px 11px;border-radius:3px;cursor:pointer;transition:border-color .12s,color .12s}
.dice-btn:hover{border-color:var(--gold);color:var(--gold)}

/* 範型概覽 */
.ov-top{display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:start;margin-bottom:18px}
.ov-art{width:120px}
.ov-intro{font-size:.98rem;color:#d7dbe8;line-height:1.7}
.ov-top2{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.ov-stats{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center}
.ov-hexbox{background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;padding:6px;display:flex;justify-content:center}
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.ov-stat{background:#0f1530;border:1.5px solid #2a3258;border-radius:6px;padding:12px 10px;text-align:center}
.ov-stat-up{border-color:var(--green)}
.ov-stat-num{display:block;font-weight:900;font-size:1.7rem;color:var(--paper);line-height:1}
.ov-stat-up .ov-stat-num{color:var(--green)}
.ov-stat-label{display:block;margin-top:5px;font-family:"Oswald",sans-serif;letter-spacing:.08em;font-size:.72rem;color:#9aa0bd}
.ov-gauge{min-width:0}
.art{width:100%;aspect-ratio:4/5;border:var(--line);border-radius:4px;overflow:hidden;background:#0f1530;box-shadow:4px 4px 0 rgba(0,0,0,.5)}
.art img{width:100%;height:100%;object-fit:cover;display:block}
.art-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:3rem;color:#fff;background:linear-gradient(135deg,#e5342b,#7a1e8a)}

/* 屬性量表 */
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.stat-row:last-child{margin-bottom:0}
.stat-name{width:3.4em;font-weight:700;flex:none}
.stat-bar{flex:1;height:15px;background:#0c1124;border:1px solid #2d345c;border-radius:3px;overflow:hidden;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.10) 0 1.5px,transparent 1.5px 10%)}
.stat-fill{height:100%;border-radius:2px 0 0 2px;box-shadow:0 0 8px rgba(0,0,0,.25) inset}
.stat-num{width:2.1em;text-align:right;flex:none;font-family:"Oswald",sans-serif;font-weight:700;font-size:1.25rem}

/* 表單 / 選項 */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-family:"Oswald",sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.74rem;color:#aeb3cc;margin-bottom:7px}
.field input,.field textarea{width:100%;background:#0f1530;border:1.5px solid #343c64;border-radius:3px;color:var(--paper);font-family:inherit;font-size:1rem;padding:11px 13px;line-height:1.6;transition:border-color .12s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--red)}
.field textarea{resize:vertical;min-height:96px}
.opt{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1.5px solid #2a3258;border-radius:5px;cursor:pointer;margin-bottom:9px;background:#0f1530;transition:border-color .12s,background .12s;outline:none}
.opt:last-child{margin-bottom:0}
.opt:hover{border-color:#46508a}
.opt:focus-visible{border-color:var(--gold)}
.opt.sel{border-color:var(--red);background:rgba(229,52,43,.10)}
.opt-mark{flex:none;width:18px;height:18px;border-radius:50%;border:2px solid #46508a;margin-top:3px;position:relative}
.opt.sel .opt-mark{border-color:var(--red)}
.opt.sel .opt-mark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--red)}
.opt-name{display:block;font-weight:700;color:var(--paper);margin-bottom:3px}
.opt-desc{display:block;font-size:.88rem;color:#b7bcd2;line-height:1.65}
.opt-pills{display:flex;flex-wrap:wrap;gap:9px}
.pill{background:#0f1530;border:1.5px solid #2a3258;color:#cfd4e6;padding:8px 16px;border-radius:30px;cursor:pointer;font-family:inherit;font-size:.95rem;transition:background .12s,border-color .12s,color .12s}
.pill:hover{border-color:#46508a}
.pill.sel{background:var(--red);border-color:var(--red);color:#fff}
.mini-hint{margin-top:10px;font-size:.78rem;color:#8d93ad}
.powers{display:flex;flex-direction:column;gap:14px}
.power{border-left:3px solid var(--gold);padding-left:12px}
.power-name{font-weight:900;color:var(--gold);font-size:1.05rem;margin-bottom:3px}
.power-desc{font-size:.88rem;color:#b7bcd2;line-height:1.65}
.talent-slot{margin-top:14px;padding-top:16px;border-top:1px dashed #2e3768}
.subject-inline{margin:0 0 9px 18px;padding:12px 14px;border-left:2px dashed #46508a;background:rgba(70,80,138,.08);border-radius:0 6px 6px 0}
.subject-inline .sec-title{font-size:1rem}
.subject-inline .sec-head{margin-bottom:10px}
.talent-hint{margin-top:12px;font-size:.85rem;color:#7e84a3;font-style:italic}

/* 內文標記 */
.kw{background:#23305c;color:#cfe0ff;padding:1px 6px;border-radius:3px;font-size:.92em;font-weight:600}
.die{padding:.05em .42em;border-radius:.3em;font-family:"Oswald",sans-serif;font-weight:700;font-size:.92em;color:#fff}
.die6{background:var(--green)}
.die1{background:var(--red)}

/* 預覽 */
.preview-wrap{position:sticky;top:24px;min-width:0}
.preview-label{font-family:"Oswald",sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:.76rem;color:#9aa0bd;margin-bottom:10px}
.preview{background:#0a0e1d;border:1.5px solid #2d345c;border-radius:4px;padding:18px;font-family:"Oswald","Courier New",monospace;white-space:pre-wrap;word-break:break-word;color:#d7dbe8;font-size:.9rem;line-height:1.75;max-height:74vh;overflow-y:auto}
.builder-actions{margin-top:18px;display:flex;gap:14px;flex-wrap:wrap}

.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(12px);background:var(--gold);color:var(--ink);font-weight:700;padding:12px 24px;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .25s ease,transform .3s cubic-bezier(.2,1.3,.4,1),visibility .25s;z-index:90}
.toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

.progress{margin-bottom:14px}
.progress-bar{height:8px;background:#0c1124;border:1px solid #2d345c;border-radius:5px;overflow:hidden}
.progress-bar span{display:block;height:100%;transition:width .2s ease}
.progress-text{margin-top:7px;font-size:.82rem;color:#9aa0bd}

.saves-title{font-weight:900;font-size:1.4rem;margin:6px 0 14px;color:var(--paper)}
.saves-list{display:flex;flex-direction:column;gap:10px;margin-bottom:30px}
.save-item{display:flex;justify-content:space-between;align-items:center;gap:14px;background:var(--paper);color:var(--ink);border:var(--line);border-radius:4px;padding:12px 16px;box-shadow:4px 4px 0 rgba(0,0,0,.5)}
.save-name{font-weight:900;font-size:1.1rem;display:block}
.save-sub{display:block;font-size:.78rem;color:var(--ink-soft);font-family:"Oswald",sans-serif;letter-spacing:.04em;margin-top:2px}
.save-btns{display:flex;gap:8px;flex:none}
.save-btns button{font-family:"Oswald",sans-serif;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:8px 14px;border-radius:3px;cursor:pointer;border:2px solid var(--ink)}
.save-load{background:var(--red);color:#fff;border-color:var(--red)}
.save-load:hover{background:#c72a22}
.save-del{background:transparent;color:var(--ink-soft);border-color:#bcb3a0}
.save-del:hover{border-color:var(--ink);color:var(--ink)}

.modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(8,10,20,.72);align-items:center;justify-content:center;padding:24px}
.modal.on{display:flex}
.modal-box{background:#141b33;border:1.5px solid #3a4673;border-radius:8px;max-width:430px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-weight:900;font-size:1.3rem;color:var(--gold);margin-bottom:12px}
.modal-body{white-space:pre-line;color:#d7dbe8;font-size:.95rem;line-height:1.75;margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap}

.landing-options{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:10px 0 70px;max-width:780px;margin:0 auto}
.land-card{display:flex;flex-direction:column;align-items:flex-start;gap:10px;text-align:left;font:inherit;background:var(--paper);color:var(--ink);border:var(--line);border-radius:6px;padding:32px 28px;cursor:pointer;box-shadow:6px 6px 0 rgba(0,0,0,.55);transition:transform .14s ease,box-shadow .14s ease}
.land-icon{font-size:2rem;color:var(--red);line-height:1}
.land-title{font-weight:900;font-size:1.9rem}
.land-desc{font-size:.92rem;color:#3c3c47;line-height:1.6}
.land-cta{margin-top:8px;font-family:"Oswald",sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:.8rem;color:var(--red);font-weight:600}
.land-card-disabled{opacity:.5;cursor:not-allowed;box-shadow:4px 4px 0 rgba(0,0,0,.4)}
.land-card-disabled .land-icon,.land-card-disabled .land-cta{color:var(--ink-soft)}
.reg-back{padding:20px 0 0}

.draft-badge{font-family:"Oswald",sans-serif;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:#8a7e63;border:1px dashed #b3a888;padding:3px 8px;border-radius:2px;white-space:nowrap}
.draft-note{background:rgba(242,183,5,.12);border:1.5px solid rgba(242,183,5,.5);color:#f2d27a;border-radius:6px;padding:12px 16px;margin-bottom:18px;font-size:.9rem;line-height:1.6}
.tag-req{color:var(--red);font-size:.72em;margin-left:6px;font-family:"Oswald",sans-serif;letter-spacing:.06em}

@media (max-width:600px){.landing-options{grid-template-columns:1fr}}
footer{text-align:center;color:#5a6087;font-size:.8rem;padding:30px 0 50px}

@media (max-width:980px){.gallery{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){.gallery{grid-template-columns:1fr}}
@media (max-width:780px){.builder-grid{grid-template-columns:1fr}.preview-wrap{position:static}}
@media (max-width:600px){.ov-top2{grid-template-columns:1fr;justify-items:center}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}

/* 浮起 hover 僅在有滑鼠的裝置觸發，避免觸控點完卡住 */
@media (hover:hover){
  .card:hover{transform:translate(-3px,-3px);box-shadow:10px 10px 0 var(--red)}
  .card:hover .card-cta::after{transform:translateX(4px)}
  .land-card:hover:not(:disabled){transform:translate(-3px,-3px);box-shadow:10px 10px 0 var(--red)}
}

/* 手機底部動作列（常駐匯出/複製＋完成度），桌機隱藏 */
.mobile-bar{display:none}
.mb-progress{flex:1;font-family:"Oswald",sans-serif;font-size:.82rem;letter-spacing:.04em;color:#9aa0bd;min-width:0}
.mb-progress .mb-done{color:var(--green);font-weight:700}
.mb-actions{display:flex;gap:10px;flex:none}
.mb-actions button{font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:.06em;font-size:.88rem;padding:0 18px;min-height:44px;border-radius:4px;border:none;cursor:pointer}
.mb-export{background:var(--gold);color:var(--ink)}
.mb-copy{background:#1d2647;color:var(--paper);border:1.5px solid #3a4673}

@media (max-width:780px){
  .preview{max-height:none;overflow:visible}
  .btn{min-height:44px}
  .dice-btn{min-height:42px;padding:8px 14px}
  .pill{min-height:44px;padding:10px 18px}
  .save-btns button{min-height:44px}
  .mobile-bar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;align-items:center;gap:12px;background:rgba(14,19,38,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-top:1.5px solid #2d345c;padding:10px 16px calc(10px + env(safe-area-inset-bottom))}
  .screen-inner{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<main id="home">
  <!-- 著陸頁：兩大入口 -->
  <div id="landing" class="wrap">
    <header class="masthead">
      <span class="eyebrow">超級英雄建檔工具</span>
      <h1 class="wordmark display"><span class="wm-part">打造你的</span><span class="wm-part">超級英雄</span></h1>
    </header>
    <div class="landing-options">
      <button class="land-card" id="landArchetype">
        <span class="land-icon">◆</span>
        <span class="land-title display">選擇範型</span>
        <span class="land-cta display">快速創建角色 →</span>
      </button>
      <button class="land-card land-card-disabled" id="landCustom" disabled>
        <span class="land-icon">✦</span>
        <span class="land-title display">自創英雄</span>
        <span class="land-desc">打造原創英雄</span>
        <span class="land-cta display">敬請期待</span>
      </button>
    </div>
  </div>

  <!-- 範型列表 -->
  <div id="registry" class="wrap" style="display:none">
    <div class="reg-back"><button class="btn btn-ghost" onclick="showLanding()">← 返回</button></div>
    <header class="masthead">
      <span class="eyebrow">英雄範型列表</span>
      <h1 class="wordmark display"><span class="wm-part">選擇你的</span><span class="wm-part">英雄範型</span></h1>
      <p class="tagline">挑選 1 個範型開始建檔，匯出成可分享的文字檔。</p>
    </header>
    <section id="savesSection"></section>
    <section class="gallery" id="gallery"></section>
  </div>

</main>

<section class="screen" id="builderScreen">
  <div class="screen-inner">
    <div class="topbar"><button class="btn btn-ghost" onclick="goHome()">← 返回列表</button></div>
    <div id="builderBody"></div>
    <div class="mobile-bar">
      <div class="mb-progress" id="mbProgress"></div>
      <div class="mb-actions">
        <button class="mb-copy" onclick="copyTxt()">複製</button>
        <button class="mb-export" onclick="downloadTxt()">匯出</button>
      </div>

/* ===================== 工具 ===================== */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtHTML(s){
  return esc(s)
    .replace(/:invincible-6:/g,'<span class="die die6">6</span>')
    .replace(/:invincible-1:/g,'<span class="die die1">1</span>')
    .replace(/`([^`]+)`/g,'<span class="kw">$1</span>')
    .replace(/\n/g,'<br>');
}
function fmtTxt(s){return s.replace(/:invincible-6:/g,'［6］').replace(/:invincible-1:/g,'［1］').replace(/`([^`]+)`/g,'$1');}
function indent(s,pad){pad=pad||"  ";return s.split("\n").map(l=>pad+l).join("\n");}
function talentExport(t,subjIdx){
  let name=t.name, body=fmtTxt(t.desc);
  if(t.subjects){
    if(subjIdx!=null){ name+="（"+t.subjects[subjIdx].name+"）"; body+="\n• "+t.subjects[subjIdx].name+"："+fmtTxt(t.subjects[subjIdx].desc); }
    else name+="（尚未選擇主題）";
  }
  return {name,body};
}
function rand(n){return Math.floor(Math.random()*n);}
function pick2(n){const a=[...Array(n).keys()];for(let i=a.length-1;i>0;i--){const j=rand(i+1);[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,2).sort((x,y)=>x-y);}
function peakAttr(attrs){let b=ATTR_ORDER[0];ATTR_ORDER.forEach(a=>{if(attrs[a]>attrs[b])b=a;});return b;}
function tierColor(v){ if(v<=2)return"#d23b2f"; if(v<=4)return"#e8853a"; if(v<=6)return"#f2b705"; if(v<=8)return"#8fc23e"; return"#33c463"; }

/* 雷達圖：每根軸的尖端外側，由內而外 = 數字、名稱 */
function hexSVG(attrs,size){
  const cx=size/2,cy=size/2,R=size*0.24,numR=size*0.30,nameR=size*0.42;
  const pts=ATTR_ORDER.map((a,i)=>{const ang=(-90+i*60)*Math.PI/180;return{a,cos:Math.cos(ang),sin:Math.sin(ang),val:attrs[a]};});
  let grid="";[0.4,0.7,1].forEach(r=>{grid+=`<polygon class="hex-grid" points="${pts.map(p=>`${(cx+p.cos*R*r).toFixed(1)},${(cy+p.sin*R*r).toFixed(1)}`).join(" ")}"/>`;});
  let spokes="";pts.forEach(p=>{spokes+=`<line class="hex-spoke" x1="${cx}" y1="${cy}" x2="${(cx+p.cos*R).toFixed(1)}" y2="${(cy+p.sin*R).toFixed(1)}"/>`;});
  const shape=pts.map(p=>{const rr=(p.val/ATTR_MAX)*R;return`${(cx+p.cos*rr).toFixed(1)},${(cy+p.sin*rr).toFixed(1)}`;}).join(" ");
  let dots="";pts.forEach(p=>{const rr=(p.val/ATTR_MAX)*R;dots+=`<circle class="hex-dot" cx="${(cx+p.cos*rr).toFixed(1)}" cy="${(cy+p.sin*rr).toFixed(1)}" r="3"/>`;});
  let lab="";
  pts.forEach(p=>{
    let anc="middle"; if(p.cos>0.3)anc="start"; else if(p.cos<-0.3)anc="end";
    const nx=cx+p.cos*numR, ny=cy+p.sin*numR, mx=cx+p.cos*nameR, my=cy+p.sin*nameR;
    lab+=`<text class="hex-num" x="${nx.toFixed(1)}" y="${ny.toFixed(1)}" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.064).toFixed(1)}">${p.val}</text>`;
    lab+=`<text class="hex-name" x="${mx.toFixed(1)}" y="${my.toFixed(1)}" text-anchor="${anc}" dominant-baseline="central" font-size="${(size*0.05).toFixed(1)}">${p.a}</text>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img" aria-label="六項屬性雷達圖">${grid}${spokes}<polygon class="hex-shape" points="${shape}"/>${dots}${lab}</svg>`;
}
function artHTML(arc){
  const ini=arc.name.charAt(0);
  if(arc.image) return `<div class="art"><img src="${esc(arc.image)}" alt="${esc(arc.name)} 角色圖" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="art-fallback" style="display:none">${ini}</div></div>`;
  return `<div class="art"><div class="art-fallback">${ini}</div></div>`;
}
function gaugeRows(arc){
  return ATTR_ORDER.map(a=>{const v=arc.attrs[a],pct=(v/ATTR_MAX)*100,c=tierColor(v);
    return `<div class="stat-row"><span class="stat-name">${a}</span><span class="stat-bar"><span class="stat-fill" style="width:${pct}%;background:${c}"></span></span><span class="stat-num" style="color:${c}">${v}</span></div>`;}).join("");
}

ARCHETYPES.forEach((arc,i)=>{

  const open=()=>{currentIndex=i;openBuilder();};

}

function secHead(title,hint,dice){
  return `<div class="sec-head"><div><span class="sec-title display">${title}</span>${hint?`<span class="sec-hint">${hint}</span>`:""}</div>${dice?`<button class="dice-btn" data-dice="${dice}">🎲 隨機</button>`:""}</div>`;
}
function optRow(group,idx,name,desc,selected){
  return `<div class="opt${selected?" sel":""}" data-group="${group}" data-idx="${idx}" role="button" tabindex="0"><span class="opt-mark"></span><div><span class="opt-name">${name}</span>${desc?`<span class="opt-desc">${fmtHTML(desc)}</span>`:""}</div></div>`;
}
function pill(group,idx,label,selected){
  return `<button class="pill${selected?" sel":""}" data-group="${group}" data-idx="${idx}">${label}</button>`;
}
function talentList(group,subjGroup,talents,selIdx,selSubjIdx){
  return talents.map((t,i)=>{
    let html=optRow(group,i,t.name,t.desc,selIdx===i);
    if(selIdx===i&&t.subjects){
      html+=`<div class="subject-inline">${secHead("專精主題","1D"+t.subjects.length+" 或自選 1 個",subjGroup)}${t.subjects.map((s,j)=>optRow(subjGroup,j,s.name,s.desc,selSubjIdx===j)).join("")}</div>`;
    }
    return html;
  }).join("");
}

function renderBuilderForm(){
  const arc=ARCHETYPES[currentIndex];
  let L="";
  if(arc.draft) L+=`<div class="draft-note">⚠ 此範型的資料尚未確定，目前內容為暫定（沿用其他範型），僅供預覽參考。</div>`;
  // 範型概覽（簡介 + 雷達 + 數據）
  const _ds=derivedStats();
  const statItem=(label,val,bumped)=>`<div class="ov-stat${bumped?' ov-stat-up':''}"><span class="ov-stat-num display">${val}</span><span class="ov-stat-label">${label}</span></div>`;
  L+=`<section class="bsec">
    <div class="ov-top2"><p class="ov-intro">${arc.intro}</p><div class="ov-hexbox">${hexSVG(arc.attrs,240)}</div></div>
    <div class="ov-stats">${statItem("生命",_ds.health,_ds.mod.health>0)}${statItem("決心",_ds.resolve,_ds.mod.resolve>0)}${statItem("肉搏傷害",_ds.melee,_ds.mod.melee>0)}</div>
  </section>`;
  if(arc.powerSource) L+=`<section class="bsec">${secHead("異能來源","1D3 或自選 1 個","powerSource")}<div class="opt-pills">${arc.powerSource.options.map((o,i)=>pill("powerSource",i,o,sel.powerSource===i)).join("")}</div></section>`;
  if(arc.powers) L+=`<section class="bsec">${secHead("異能","你擁有以下所有異能")}<div class="powers">${arc.powers.map(p=>`<div class="power"><div class="power-name display">${p.name}</div><div class="power-desc">${fmtHTML(p.desc)}</div></div>`).join("")}</div></section>`;
  if(arc.professions){
    let b=`<section class="bsec">${secHead("職業","1D3 或自選 1 個","profession")}`;
    b+=arc.professions.map((pf,i)=>optRow("profession",i,pf.name,pf.desc,sel.profession===i)).join("");
    if(sel.profession!=null){
      const pf=arc.professions[sel.profession];
      b+=`<div class="talent-slot">${secHead("職業天賦（"+pf.name+"）","1D3 或自選 1 個","professionTalent")}${talentList("professionTalent","professionTalentSubject",pf.talents,sel.professionTalent,sel.professionTalentSubject)}</div>`;
    }else b+=`<div class="talent-hint">選好職業後，這裡會出現可挑選的職業天賦。</div>`;

  }
  if(arc.freeTalents) L+=`<section class="bsec">${secHead("自選天賦","1D6 或自選 1 個","freeTalent")}${talentList("freeTalent","freeTalentSubject",arc.freeTalents,sel.freeTalent,sel.freeTalentSubject)}</section>`;

  if(arc.motivations) L+=`<section class="bsec">${secHead("動機","1D3 或自選 1 個","motivation")}${arc.motivations.map((m,i)=>optRow("motivation",i,m.name,m.desc,sel.motivation===i)).join("")}</section>`;
  if(arc.flaws) L+=`<section class="bsec">${secHead("缺陷","1D3 或自選 1 個","flaw")}${arc.flaws.map((f,i)=>optRow("flaw",i,f.name,f.desc,sel.flaw===i)).join("")}</section>`;
  L+=`<section class="bsec">${secHead("補充細節")}
    <div class="field"><label>代號 <span class="tag-req">必填</span></label><input data-field="hero" type="text" placeholder="例如：晨星" value="${esc(sel.hero)}"></div>
    <div class="field"><label>本名</label><input data-field="real" type="text" placeholder="例如：林子澄" value="${esc(sel.real)}"></div>
    <div class="field"><label>外觀</label><input data-field="look" type="text" placeholder="例如：褪色的紅色連帽外套，左眼有一道疤" value="${esc(sel.look)}"></div>
    <div class="field"><label>背景故事</label><textarea data-field="note" placeholder="角色的來歷、性格、與隊友的關係……都可以寫在這裡">${esc(sel.note)}</textarea></div>
  </section>`;

  const R=`<div class="preview-wrap"><div class="preview-label">文字檔預覽</div><pre class="preview" id="preview">${esc(buildText())}</pre>
    <div class="progress" id="progress">${progressHTML()}</div>

      <button class="btn btn-gold" onclick="downloadTxt()">匯出文字檔</button>

  return `<div class="builder-grid"><div class="builder-col">${intro}${L}</div>${R}</div>`;

function wireBuilder(){
  if(builderWired) return; builderWired=true;
  const b=document.getElementById("builderBody");
  b.addEventListener("click",e=>{
    const d=e.target.closest("[data-dice]"); if(d){rollGroup(d.dataset.dice);return;}
    const o=e.target.closest("[data-group]"); if(o){chooseOption(o.dataset.group,+o.dataset.idx);return;}
  });
  b.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===" "){const o=e.target.closest("[data-group]");if(o&&o.tagName!=="BUTTON"){e.preventDefault();chooseOption(o.dataset.group,+o.dataset.idx);}}
  });
  b.addEventListener("input",e=>{const f=e.target.dataset.field;if(f){sel[f]=e.target.value;const pv=document.getElementById("preview");if(pv)pv.textContent=buildText();const pr=document.getElementById("progress");if(pr)pr.innerHTML=progressHTML();syncMobileBar();}});
}
function chooseOption(group,idx){
  if(group==="personalities"){
    const i=sel.personalities.indexOf(idx);
    if(i>=0) sel.personalities.splice(i,1);
    else{ if(sel.personalities.length>=2) sel.personalities.shift(); sel.personalities.push(idx); }
  }else if(group==="profession"){ sel.profession=idx; sel.professionTalent=null; sel.professionTalentSubject=null; }
  else if(group==="professionTalent"){ sel.professionTalent=idx; sel.professionTalentSubject=null; }
  else if(group==="freeTalent"){ sel.freeTalent=idx; sel.freeTalentSubject=null; }
  else sel[group]=idx;
  reRender();
}
function rollGroup(g){
  const arc=ARCHETYPES[currentIndex];
  if(g==="powerSource") sel.powerSource=rand(arc.powerSource.options.length);
  else if(g==="profession"){sel.profession=rand(arc.professions.length);sel.professionTalent=null;sel.professionTalentSubject=null;}
  else if(g==="professionTalent"){if(sel.profession==null)sel.profession=rand(arc.professions.length);sel.professionTalent=rand(arc.professions[sel.profession].talents.length);sel.professionTalentSubject=null;}
  else if(g==="professionTalentSubject"){const subs=arc.professions[sel.profession].talents[sel.professionTalent].subjects;sel.professionTalentSubject=rand(subs.length);}
  else if(g==="freeTalent"){sel.freeTalent=rand(arc.freeTalents.length);sel.freeTalentSubject=null;}
  else if(g==="freeTalentSubject"){const subs=arc.freeTalents[sel.freeTalent].subjects;sel.freeTalentSubject=rand(subs.length);}
  else if(g==="personalities") sel.personalities=pick2(arc.personalities.length);
  else if(g==="motivation") sel.motivation=rand(arc.motivations.length);
  else if(g==="flaw") sel.flaw=rand(arc.flaws.length);
  reRender();
}
function rollAll(){
  const arc=ARCHETYPES[currentIndex];
  if(arc.powerSource) sel.powerSource=rand(arc.powerSource.options.length);
  if(arc.professions){
    sel.profession=rand(arc.professions.length);
    const pf=arc.professions[sel.profession];
    sel.professionTalent=rand(pf.talents.length);
    const pt=pf.talents[sel.professionTalent];
    sel.professionTalentSubject=pt.subjects?rand(pt.subjects.length):null;
  }
  if(arc.freeTalents){
    sel.freeTalent=rand(arc.freeTalents.length);
    const ft=arc.freeTalents[sel.freeTalent];
    sel.freeTalentSubject=ft.subjects?rand(ft.subjects.length):null;
  }
  if(arc.personalities) sel.personalities=pick2(arc.personalities.length);
  if(arc.motivations) sel.motivation=rand(arc.motivations.length);
  if(arc.flaws) sel.flaw=rand(arc.flaws.length);
  reRender();
}
function reRender(){
  const sc=document.getElementById("builderScreen"),top=sc?sc.scrollTop:0;
  document.getElementById("builderBody").innerHTML=renderBuilderForm();
  if(sc) sc.scrollTop=top;
  syncMobileBar();
}
function clearAll(){sel=blankSel();sel.archIndex=currentIndex;reRender();}

/* ===================== 數據（衍生數值） ===================== */
// 解析單筆敘述中的數據加成（最大生命/最大決心/肉搏傷害 +N）
function statModsFromText(text){
  const m={health:0,resolve:0,melee:0};
  const grab=label=>{const re=new RegExp("`?"+label+"`?\\s*\\+\\s*(\\d+)","g");let mt,s=0;while((mt=re.exec(text)))s+=parseInt(mt[1],10);return s;};
  m.health=grab("最大生命");m.resolve=grab("最大決心");m.melee=grab("肉搏傷害");
  return m;
}
// 蒐集玩家所選天賦（職業天賦＋自選天賦）的數據加成
function collectStatMods(){
  const arc=ARCHETYPES[currentIndex],tot={health:0,resolve:0,melee:0};
  const add=t=>{if(!t)return;const m=statModsFromText(t.desc||"");tot.health+=m.health;tot.resolve+=m.resolve;tot.melee+=m.melee;};
  if(arc.professions&&sel.profession!=null&&sel.professionTalent!=null) add(arc.professions[sel.profession].talents[sel.professionTalent]);
  if(arc.freeTalents&&sel.freeTalent!=null) add(arc.freeTalents[sel.freeTalent]);
  return tot;
}
// 計算三項數據（含天賦加成）
function derivedStats(){
  const a=ARCHETYPES[currentIndex].attrs,ceil=Math.ceil,mod=collectStatMods();
  return {
    health:ceil((a.格鬥+a.敏捷+a.力量)/2)+mod.health,
    resolve:ceil((a.理智+a.直覺+a.氣場)/2)+mod.resolve,
    melee:ceil(a.力量/2)+mod.melee,
    mod
  };
}

// 匯出用的數據文字
function buildStatsLine(){const d=derivedStats();return "生命 "+d.health+"　決心 "+d.resolve+"　肉搏傷害 "+d.melee;}

/* ===================== 匯出 ===================== */
function buildText(){
  const arc=ARCHETYPES[currentIndex];
  const hero=sel.hero.trim()||"（未命名英雄）";
  let o="";
  let head="範型："+arc.name+"\n";
  if(arc.role) head+="定位："+arc.role+"\n";
  head+="代號："+hero+"\n";
  if(sel.real.trim()) head+="本名："+sel.real.trim()+"\n";
  if(sel.look.trim()) head+="外觀："+sel.look.trim()+"\n";
  o+=head+"\n";
  o+="【簡介】\n"+arc.intro+"\n\n";
  o+="【屬性】"+ATTR_ORDER.map(a=>a+" "+arc.attrs[a]).join("　")+"\n\n";
  const ds=buildStatsLine();
  o+="【數據】"+ds+"\n\n";
  if(arc.powerSource) o+="【異能來源】"+(sel.powerSource!=null?arc.powerSource.options[sel.powerSource]:"（尚未選擇）")+"\n\n";
  if(arc.powers){o+="【異能】\n"+arc.powers.map(p=>"◆ "+p.name+"\n"+indent(fmtTxt(p.desc))).join("\n\n")+"\n\n";}
  if(arc.professions){
    if(sel.profession!=null){
      const pf=arc.professions[sel.profession];
      o+="【職業】"+pf.name+"\n"+indent(fmtTxt(pf.desc))+"\n";
      if(sel.professionTalent!=null){const te=talentExport(pf.talents[sel.professionTalent],sel.professionTalentSubject);o+="  ▸ 職業天賦："+te.name+"\n"+indent(te.body,"    ")+"\n";}
      else o+="  ▸ 職業天賦：（尚未選擇）\n";
    }else o+="【職業】（尚未選擇）\n";
    o+="\n";
  }
  if(arc.freeTalents){
    if(sel.freeTalent!=null){const te=talentExport(arc.freeTalents[sel.freeTalent],sel.freeTalentSubject);o+="【自選天賦】"+te.name+"\n"+indent(te.body)+"\n\n";}
    else o+="【自選天賦】（尚未選擇）\n\n";
  }
  if(arc.personalities){const ps=sel.personalities.map(i=>arc.personalities[i]);o+="【個性】"+(ps.length?ps.join("、"):"（尚未選擇）")+"\n\n";}
  if(arc.motivations){
    if(sel.motivation!=null){const m=arc.motivations[sel.motivation];o+="【動機】"+m.name+"\n"+indent(fmtTxt(m.desc))+"\n\n";}
    else o+="【動機】（尚未選擇）\n\n";
  }
  if(arc.flaws){
    if(sel.flaw!=null){const f=arc.flaws[sel.flaw];o+="【缺陷】"+f.name+"\n"+indent(fmtTxt(f.desc))+"\n\n";}
    else o+="【缺陷】（尚未選擇）\n\n";
  }
  if(sel.note.trim()) o+="【背景故事】\n"+sel.note.trim()+"\n";
  return o.trimEnd()+"\n";
}
/* ---- 完成度 ---- */
function completion(){
  const arc=ARCHETYPES[currentIndex];const items=[];
  items.push({label:"代號",done:!!sel.hero.trim()});
  if(arc.powerSource) items.push({label:"異能來源",done:sel.powerSource!=null});
  if(arc.professions){
    items.push({label:"職業",done:sel.profession!=null});
    items.push({label:"職業天賦",done:sel.professionTalent!=null});
    if(sel.profession!=null&&sel.professionTalent!=null&&arc.professions[sel.profession].talents[sel.professionTalent].subjects)
      items.push({label:"專精主題（職業天賦）",done:sel.professionTalentSubject!=null});
  }
  if(arc.freeTalents){
    items.push({label:"自選天賦",done:sel.freeTalent!=null});
    if(sel.freeTalent!=null&&arc.freeTalents[sel.freeTalent].subjects)
      items.push({label:"專精主題（自選天賦）",done:sel.freeTalentSubject!=null});
  }
  if(arc.personalities) items.push({label:"個性（2 項）",done:sel.personalities.length===2});
  if(arc.motivations) items.push({label:"動機",done:sel.motivation!=null});
  if(arc.flaws) items.push({label:"缺陷",done:sel.flaw!=null});
  return {done:items.filter(i=>i.done).length,total:items.length,missing:items.filter(i=>!i.done).map(i=>i.label)};
}
function progressHTML(){
  const c=completion(),pct=c.total?Math.round(c.done/c.total*100):100,ok=c.done===c.total;
  return `<div class="progress-bar"><span style="width:${pct}%;background:${ok?'var(--green)':'var(--gold)'}"></span></div><div class="progress-text">${ok?'✓ 必選項目都完成了':'已完成 '+c.done+' / '+c.total+' 項'}</div>`;
}
function mbProgressHTML(){const c=completion();return c.done===c.total?'<span class="mb-done">✓ 必選項目已完成</span>':'已完成 '+c.done+' / '+c.total+' 項';}
function syncMobileBar(){const m=document.getElementById("mbProgress");if(m)m.innerHTML=mbProgressHTML();}

/* ---- 匯出（含完成度提醒） ---- */
function guardExport(proceed){
  const c=completion();
  if(c.missing.length) showConfirm("還有以下項目尚未完成：\n"+c.missing.map(m=>"・"+m).join("\n"),proceed);
  else proceed();
}
function downloadTxt(){guardExport(doDownload);}
function doDownload(){
  const text=buildText(),arc=ARCHETYPES[currentIndex];
  const fname=((sel.hero.trim()||arc.name))+"_角色卡.txt";
  const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  showToast("已匯出 "+fname);
}
function copyTxt(){guardExport(doCopy);}
async function doCopy(){
  const text=buildText();
  try{await navigator.clipboard.writeText(text);showToast("已複製到剪貼簿");}
  catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("已複製到剪貼簿");}catch(_){showToast("複製失敗，請手動選取");}document.body.removeChild(ta);}
}

/* ---- 角色資料編碼（供存檔／讀取使用） ---- */
function buildPayload(){const arc=ARCHETYPES[currentIndex];return {a:arc.name,h:sel.hero,r:sel.real,l:sel.look,n:sel.note,ps:sel.powerSource,pf:sel.profession,pt:sel.professionTalent,pts:sel.professionTalentSubject,ft:sel.freeTalent,fts:sel.freeTalentSubject,pe:sel.personalities,mo:sel.motivation,fl:sel.flaw};}
function applyPayload(p){
  const idx=ARCHETYPES.findIndex(a=>a.name===p.a);if(idx<0)return false;
  currentIndex=idx;sel=blankSel();sel.archIndex=idx;
  sel.hero=p.h||"";sel.real=p.r||"";sel.look=p.l||"";sel.note=p.n||"";
  sel.powerSource=p.ps??null;sel.profession=p.pf??null;sel.professionTalent=p.pt??null;sel.professionTalentSubject=p.pts??null;
  sel.freeTalent=p.ft??null;sel.freeTalentSubject=p.fts??null;
  sel.personalities=Array.isArray(p.pe)?p.pe:[];sel.motivation=p.mo??null;sel.flaw=p.fl??null;
  return true;
}

/* ---- 本機存檔（localStorage；需下載檔案後在瀏覽器開啟才能用） ---- */
const STORE_KEY="heroBuilds_v1";
function storageAvailable(){try{const k="__t";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}}
function storageGet(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch(e){return [];}}
function storageSet(a){try{localStorage.setItem(STORE_KEY,JSON.stringify(a));return true;}catch(e){return false;}}
function saveBuild(){
  if(!storageAvailable()){showToast("此環境無法儲存，請下載檔案後在瀏覽器開啟");return;}
  const arc=ARCHETYPES[currentIndex],builds=storageGet();
  builds.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),ts:Date.now(),name:arc.name,hero:sel.hero.trim(),data:buildPayload()});
  storageSet(builds);showToast("已儲存角色");renderSaves();
}
function loadBuild(p){if(applyPayload(p))openBuilder();}
function renderSaves(){
  const el=document.getElementById("savesSection");if(!el)return;
  const builds=storageAvailable()?storageGet():[];
  if(!builds.length){el.innerHTML="";return;}
  el.innerHTML='<h2 class="saves-title display">我的存檔</h2><div class="saves-list">'+builds.map(b=>{
    const d=new Date(b.ts),date=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    return '<div class="save-item"><div class="save-meta"><span class="save-name display">'+esc(b.hero||"（未命名英雄）")+'</span><span class="save-sub">'+esc(b.name)+" · "+date+'</span></div><div class="save-btns"><button class="save-load" data-id="'+b.id+'">載入</button><button class="save-del" data-id="'+b.id+'">刪除</button></div></div>';
  }).join("")+'</div>';
}

/* ---- 完成度提醒對話框 ---- */
let _modalOk=null;
function showConfirm(msg,onOk){_modalOk=onOk;document.getElementById("modalBody").textContent=msg;document.getElementById("modal").classList.add("on");}
function hideModal(){document.getElementById("modal").classList.remove("on");_modalOk=null;}

/* ===================== 共用 ===================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{s.classList.remove("on");s.scrollTop=0;});
  document.getElementById(id).classList.add("on");window.scrollTo(0,0);
  document.documentElement.style.overflow="hidden";
}
function goHome(){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));document.documentElement.style.overflow="";window.scrollTo(0,0);}
function showLanding(){document.getElementById("landing").style.display="";document.getElementById("registry").style.display="none";window.scrollTo(0,0);}
function showRegistry(){document.getElementById("landing").style.display="none";document.getElementById("registry").style.display="";renderSaves();window.scrollTo(0,0);}
let toastTimer;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200);}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(document.getElementById("modal").classList.contains("on")) hideModal();
    else if(document.getElementById("builderScreen").classList.contains("on")) goHome();
  }
});

document.getElementById("modalOk").addEventListener("click",()=>{const f=_modalOk;hideModal();if(f)f();});
document.getElementById("modalCancel").addEventListener("click",hideModal);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")hideModal();});
document.getElementById("savesSection").addEventListener("click",e=>{
  const load=e.target.closest(".save-load"),del=e.target.closest(".save-del");
  if(load){const b=storageGet().find(x=>x.id===load.dataset.id);if(b)loadBuild(b.data);}
  else if(del){storageSet(storageGet().filter(x=>x.id!==del.dataset.id));renderSaves();}
});
document.getElementById("landArchetype").addEventListener("click",showRegistry);
renderSaves();
</script>
