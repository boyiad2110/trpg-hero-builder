function openPowerModalAdd(){ if(emptySlots()<1){ needSlot(); return; } creator.powerModal={editPid:null}; renderCreator(); }
function openPowerModalEdit(id){ if(!findPower(id))return; creator.powerModal={editPid:id}; renderCreator(); }
function closePowerModal(){ creator.powerModal=null; renderCreator(); }
function scrollSelectedPowerIntoView(){
  const list=document.querySelector(".pw-modal-list");
  const sel=document.querySelector("#pwModalListInner .store-item.sel");
  if(!list||!sel) return;
  const doScroll=()=>{ const l=list.getBoundingClientRect(), s=sel.getBoundingClientRect(); list.scrollTop += (s.top-l.top)-8; };
  if(window.requestAnimationFrame) requestAnimationFrame(doScroll); else doScroll();
}
function pickPowerInModal(id){
  const m=creator.powerModal; if(!m) return;
  if(m.editPid===id){ creator.powers=creator.powers.filter(p=>p.id!==id); m.editPid=null; afterPowerChange(); return; } // 再點一次 → 取消選擇
  if(m.editPid!=null) creator.powers=creator.powers.filter(p=>p.id!==m.editPid); // 換異能：先移除舊的
  if(findPower(id)) return;            // 已在其他欄位（清單會停用，保險）
  if(emptySlots()<1){ needSlot(); return; }
  creator.powers.push({id,level:0,enh:[],lim:[],src:(creator.powerSources.length?creator.powerSources[0]:null)});
  m.editPid=id; afterPowerChange(); scrollSelectedPowerIntoView(); // 選取後把該異能捲到清單頂端，從開頭看起
}
function removePowerFromModal(){ const m=creator.powerModal; if(!m)return; if(m.editPid!=null) creator.powers=creator.powers.filter(p=>p.id!==m.editPid); m.editPid=null; afterPowerChange(); }
function powerModalStatsHTML(){ return `<span>點數 <b>${pointsLeft()}</b>/${pointsTotal()}</span><span>免費欄位 <b>${freeSlotsUsed()}</b>/${freeSlotsCount()}</span><span>額外欄位 <b>${extraSlotsUsed()}</b>/${extraSlotsCount()}</span>`; }
function refreshPowerModal(){ const inner=document.getElementById("pwModalListInner"); if(inner) inner.innerHTML=renderPowerListInner(); const st=document.getElementById("pwModalStats"); if(st) st.innerHTML=powerModalStatsHTML(); const buy=document.getElementById("pwBuySlotWrap"); if(buy) buy.innerHTML=powerBuySlotHTML(); }
function afterPowerChange(){ if(creator.powerModal) refreshPowerModal(); else renderCreator(); } // 開窗時只局部更新，畫面不跳頂
function matchPower(pw,q){
  const hay=[pw.name,pw.examples,pw.desc].concat((pw.enh||[]).map(e=>e.name+e.desc),(pw.lim||[]).map(l=>l.name+l.desc)).join(" ").toLowerCase();
  return hay.indexOf(q)>=0;
}
function powerListItem(pw,id){
  const m=creator.powerModal, sel=m.editPid===id, inst=findPower(id), owned=!sel&&!!inst;
  const nm=(inst&&inst.level>0?POWER_LEVELS[inst.level]:"")+pw.name;
  const enNm=pw.en?((inst&&inst.level>0?POWER_LEVELS_EN[inst.level]+" ":"")+pw.en):"";
  const head=`<div class="store-item${sel?" sel":""}${owned?" taken":""}" ${owned?'aria-disabled="true"':`data-pw-pick="${id}" role="button" tabindex="0"`}>
    <div class="store-info"><span class="store-name">${nm}${enNm?`<span class="pw-en">${enNm}</span>`:""}</span><span class="store-ex">範例：${pw.examples}</span></div>
    ${owned?'<span class="store-ex">已選擇</span>':''}
  </div>`;
  if(!sel) return head;
  const p=inst;
  return head+`<div class="pw-inline-config">
    <div class="pw-inline-top"><span class="pw-contrib-tag">占 ${powerContribution(p)} 欄位</span></div>
    <div class="pw-desc">${fmtHTML(pw.desc)}</div>
    ${powerConfigBlocks(p)}
  </div>`;
}
function renderPowerListInner(){
  const m=creator.powerModal; if(!m) return "";
  const q=(m.search||"").trim().toLowerCase();
  const editCat = m.editPid!=null ? POWERS[m.editPid].type : null;
  const secs=POWER_TYPES.map(tp=>{
    const all=POWERS.map((pw,id)=>({pw,id})).filter(x=>x.pw.type===tp);
    const items = q ? all.filter(x=>matchPower(x.pw,q)) : all;
    if(q && !items.length) return "";                       // 搜尋時隱藏沒有符合項目的分類
    const forceOpen = q!=="" || editCat===tp;               // 搜尋中、或正在編輯該分類異能 → 強制展開
    const collapsed = forceOpen ? false : (m.collapsed[tp] !== false); // 預設摺疊，僅在使用者展開(=false)時打開
    const header=`<div class="cat-head" data-cat="${tp}" role="button" tabindex="0"><span class="cat-arrow">${collapsed?"▸":"▾"}</span><span class="cat-name">${tp}</span><span class="cat-count">${q?items.length:all.length}</span></div>`;
    let body="";
    if(!collapsed) body = items.length ? items.map(x=>powerListItem(x.pw,x.id)).join("") : `<p class="pw-empty">${q?"查無符合的異能。":"此類型的異能陸續收錄中。"}</p>`;
    return `<div class="cat-sec${collapsed?" collapsed":""}">${header}${body}</div>`;
  }).join("");
  return secs || `<p class="pw-empty">查無符合的異能。</p>`;
}
function renderPowerModal(){
  const m=creator.powerModal; if(!m) return "";
  if(!m.collapsed) m.collapsed={};
  if(m.search==null) m.search="";
  const used=powersUsed(), total=totalSlots();
  const head=`<div class="pw-modal-head">
    <div class="pw-modal-titlebar"><h3 class="modal-title display">${m.editPid!=null?"編輯異能":"異能選單"}</h3><span id="pwBuySlotWrap">${powerBuySlotHTML()}</span></div>
    <div class="pw-modal-stats" id="pwModalStats">${powerModalStatsHTML()}</div>
    <div class="pw-search-wrap"><input class="pw-search" data-pw-search value="${esc(m.search)}" placeholder="🔍 搜尋異能名稱、範例或效果…" autocomplete="off"></div>
  </div>`;
  const list=`<div class="pw-modal-list"><div class="store-title">異能清單（共 96 個，目前收錄 ${POWERS.length} 個）</div><div id="pwModalListInner">${renderPowerListInner()}</div></div>`;
  const footer=`<div class="modal-actions pw-modal-foot"><button class="btn btn-gold" data-pw-modal-close="1">確定異能</button></div>`;
  return head+list+footer;
}
function syncPowerModal(){
  const el=document.getElementById("powerModal"); if(!el) return;
  if(creator.powerModal){ document.getElementById("powerModalContent").innerHTML=renderPowerModal(); el.classList.add("on"); }
  else el.classList.remove("on");
}

function renderPowerStep(){
  if(creator.tier==null) return needTierHint();
  ensureCreatorSlots();
  const base=baseFreeSlots(), total=totalSlots(), used=powersUsed(), empty=emptySlots(), maxLvl=maxLevelForTier();

  let powerCards="";
  if(creator.powerSources.length>=1){
    const groups=creator.powerSources.map(s=>({s,list:creator.powers.filter(p=>powerSrc(p)===s)})).filter(g=>g.list.length);
    powerCards=groups.map(g=>`<div class="src-group"><div class="src-group-head">異能來源：${POWER_SOURCES[g.s].name}<span class="src-group-count">${g.list.length}</span></div>${g.list.map(p=>powerCard(p)).join("")}</div>`).join("");
  } else {
    powerCards=creator.powers.map(p=>powerCard(p)).join("");
  }
  let emptyCards="";
  for(let s=0;s<empty;s++){
    emptyCards+=`<div class="slot-empty">
      <div class="slot-empty-head">空白異能欄位</div>
      <div class="slot-empty-acts">
        <button class="btn btn-sm" data-slot-acquire="1">獲得異能</button>
        <button class="btn btn-ghost btn-sm" data-slot-discard="1"${total<=1?" disabled":""}>✕ 捨棄此欄位（+2 點）</button>
      </div>
    </div>`;
  }
  let addBtn="";
  if(total<base) addBtn=`<button class="btn btn-ink pw-buy-slot" data-add-slot="1"${pointsLeft()<2?" disabled":""}>↩ 還原 1 個免費欄位（−2 點）</button>`;
  else addBtn=`<button class="btn btn-ink pw-buy-slot" data-add-slot="1"${pointsLeft()<2?" disabled":""}>＋ 購買額外異能欄位（−2 點）</button>`;

  return `<p class="step-intro">本階級提供 <b>${base}</b> 個免費異能欄位：點選「獲得異能」會彈出異能清單供你挑選，「捨棄欄位」可以換取創角點數（每捨棄 1 個欄位換 2 點，但至少保留 1 個欄位）。</p>
    <ul class="step-intro-list"><li><b>購買欄位：</b>提升等級或選擇強化項目會占用更多欄位。免費欄位用完後，可花 2 點購買額外欄位。</li><li><b>限制折抵：</b>點選限制項目可以選擇免費升級或換取 1 個強化。</li></ul>
    <div class="slot-list">${powerCards}${emptyCards}</div>
    ${addBtn?`<div class="slot-add-row">${addBtn}</div>`:""}`;
}
function profSecHead(title,hint,rollKind){
  return `<div class="sec-head"><div><span class="sec-title display">${title}</span>${hint?`<span class="sec-hint">${hint}</span>`:""}</div>${rollKind?`<button class="dice-btn" data-prof-roll="${rollKind}">🎲 隨機</button>`:""}</div>`;
}
function profTalentObjs(p){ return (p&&p.talents?p.talents:[]).map(n=>CREATOR_TALENTS.find(t=>t.name===n)).filter(Boolean); }
function refreshProfModal(){
  const cont=document.getElementById("profModalContent"); if(!cont) return;
  const old=cont.querySelector(".prof-modal-body"); const st=old?old.scrollTop:0;
  cont.innerHTML=renderProfModal();
  const nw=cont.querySelector(".prof-modal-body"); if(nw) nw.scrollTop=st;
}
function afterProfChange(){ if(creator.profModalOpen&&creator.step===4&&document.getElementById("profModal")&&document.getElementById("profModal").classList.contains("on")) refreshProfModal(); else renderCreator(); }
function selectProfession(i){ if(creator.profession!==i){ creator.profession=i; creator.professionTalent=null; creator.professionTalentSubject=null; creator.bondMode=null; creator.bondIdx=null; creator.bondCustom=""; } creator.profModalOpen=true; renderCreator(); }
function closeProfModal(){ creator.profModalOpen=false; renderCreator(); }
function selectProfTalent(i){ creator.professionTalent=i; creator.professionTalentSubject=null; afterProfChange(); }
function selectProfSubj(i){ creator.professionTalentSubject=i; afterProfChange(); }
function selectBondPreset(i){ creator.bondMode="preset"; creator.bondIdx=i; afterProfChange(); }
function chooseBondCustom(){ creator.bondMode="custom"; creator.bondIdx=null; afterProfChange(); }
function selectIdentity(v){ creator.identity=v; renderCreator(); }
function rollProfTalent(){ const p=CREATOR_PROFESSIONS[creator.profession]; if(!p)return; const tals=profTalentObjs(p); creator.professionTalent=rand(tals.length); const t=tals[creator.professionTalent]; creator.professionTalentSubject=t&&t.subjects?rand(t.subjects.length):null; afterProfChange(); }
function rollProfSubj(){ const p=CREATOR_PROFESSIONS[creator.profession]; if(!p||creator.professionTalent==null)return; const t=profTalentObjs(p)[creator.professionTalent]; if(!t||!t.subjects)return; creator.professionTalentSubject=rand(t.subjects.length); afterProfChange(); }
function rollBond(){ const p=CREATOR_PROFESSIONS[creator.profession]; if(!p)return; creator.bondMode="preset"; creator.bondIdx=rand(p.bonds.length); afterProfChange(); }

function professionCard(p,i,sel){
  return `<div class="card tier-card-paper prof-card${sel?" sel":""}" data-prof="${i}" role="button" tabindex="0" aria-pressed="${sel?"true":"false"}">
    <div class="card-top"><span class="card-en">${p.en}</span>${sel?'<span class="tier-sel-badge">已選擇</span>':''}</div>
    <h2 class="card-name display">${p.name}</h2>
    <p class="prof-card-desc">${p.desc}</p>
    <div class="card-cta display">${sel?"檢視 / 重新設定":"選擇此職業"}</div>
  </div>`;
}
function renderProfessionStep(){
  const intro=`<p class="step-intro">職業代表你的背景、平民生活或日常工作。選擇 1 個職業，並決定你的真實身分要保密還是公開。每個職業會提供：免費職業天賦、起始資源值、NPC 關鍵羈絆，以及社交場景靈感。</p>`;
  const idRow=`<div class="bsec-sub"><div class="sec-head"><div><span class="sec-title display">真實身分</span></div></div>
    <div class="opt-pills">
      <button class="pill${creator.identity==="secret"?" sel":""}" data-identity="secret">保密</button>
      <button class="pill${creator.identity==="public"?" sel":""}" data-identity="public">公開</button>
    </div></div>`;
  const profCards=CREATOR_PROFESSIONS.map((p,i)=>professionCard(p,i,creator.profession===i)).join("");
  const picker=`<div class="bsec-sub"><div class="sec-head"><div><span class="sec-title display">選擇職業</span><span class="sec-hint">點選職業卡進行後續設定</span></div></div><div class="tier-grid">${profCards}</div></div>`;
  return intro+idRow+picker;
}
function renderProfModal(){
  const p=CREATOR_PROFESSIONS[creator.profession]; if(!p) return "";
  const tals=profTalentObjs(p);
  const talHTML=tals.map((t,i)=>{
    let h=optRow("profTalent",i,t.name,t.desc,creator.professionTalent===i);
    if(creator.professionTalent===i&&t.subjects){
      h+=`<div class="subject-inline">${profSecHead("專精主題","1D"+t.subjects.length+" 或自選 1 個","subject")}${t.subjects.map((s,j)=>optRow("profSubj",j,s.name,s.desc,creator.professionTalentSubject===j)).join("")}</div>`;
    }
    return h;
  }).join("");
  const bondHTML=p.bonds.map((b,i)=>optRow("bond",i,b.name,b.desc,creator.bondMode==="preset"&&creator.bondIdx===i)).join("")
    +`<div class="opt${creator.bondMode==="custom"?" sel":""}" data-bond-custom-pick="1" role="button" tabindex="0"><span class="opt-mark"></span><div><span class="opt-name">自創關鍵羈絆</span><span class="opt-desc">自行描述 1 段與職業有關的重要人際關係。</span></div></div>`
    +(creator.bondMode==="custom"?`<textarea class="bond-input" data-bond-custom="1" rows="2" placeholder="描述你的關鍵羈絆（例如：栽培你的恩師，總在關鍵時刻給你指引…）">${esc(creator.bondCustom)}</textarea>`:"");
  const sceneHTML=`<ul class="scene-list">${p.scenes.map(s=>`<li>${s}</li>`).join("")}</ul>`;
  const head=`<div class="pw-modal-head"><div class="pw-modal-titlebar"><h3 class="modal-title display">職業：${p.name}${p.en?`<span class="pw-en">${p.en}</span>`:""}</h3><span class="resource-badge">資源 ${p.resource}</span></div><p class="prof-desc">${p.desc}</p></div>`;
  const body=`<div class="pw-modal-list prof-modal-body">
    <div class="bsec-sub">${profSecHead("職業天賦（必選）","1D"+tals.length+" 或自選 1 個（免費）","talent")}${talHTML}</div>
    <div class="bsec-sub">${profSecHead("關鍵羈絆（NPC）","1D"+p.bonds.length+"、自選或自創","bond")}${bondHTML}</div>
    <div class="bsec-sub"><div class="sec-head"><div><span class="sec-title display">社交場景靈感</span></div></div>${sceneHTML}</div>
  </div>`;
  const talentObj = creator.professionTalent!=null ? tals[creator.professionTalent] : null;
  const talentDone = !!talentObj && (!talentObj.subjects || creator.professionTalentSubject!=null);
  const done = talentDone;
  const missing = !talentDone?"職業天賦":"";
  const footer=`<div class="modal-actions pw-modal-foot">${done?"":`<span class="prof-done-hint">尚未選擇：${missing}</span>`}<button class="btn btn-gold prof-done-btn" data-prof-modal-close="1"${done?"":" disabled"}>完成</button></div>`;
  return head+body+footer;
}
function syncProfModal(){
  const el=document.getElementById("profModal"); if(!el) return;
  if(creator.profModalOpen && creator.step===4 && creator.profession!=null){ document.getElementById("profModalContent").innerHTML=renderProfModal(); el.classList.add("on"); }
  else el.classList.remove("on");
}
const CREATOR_FREE_TALENTS=1; // 自選天賦免費額度（職業天賦另計於步驟 4）
function talentPointCost(){ return Math.max(0,(creator.talents?creator.talents.length:0)-CREATOR_FREE_TALENTS); }
function talentMaxCount(i){ return CREATOR_TALENTS[i].max||1; }
function profTalentBonus(i){ const t=CREATOR_TALENTS[i]; return (professionTalentName()===t.name && !t.subjects && (t.max||1)>1) ? 1 : 0; }
function countTalent(i){ return creator.talents.filter(t=>t.id===i).length; }
function hasTalentSubject(i,subj){ return creator.talents.some(t=>t.id===i&&t.subject===subj); }
function professionTalentName(){ if(creator.profession==null||creator.professionTalent==null) return null; return CREATOR_PROFESSIONS[creator.profession].talents[creator.professionTalent]||null; }
function isCreatorTalentBlocked(i){ const t=CREATOR_TALENTS[i], pn=professionTalentName(); return pn!=null && t.name===pn && !talentRepeatable(t.name); }
// 學識淵博：若職業天賦也是學識淵博，其主題不可在此重複選取
function isLoreSubjectBlocked(subj){ return professionTalentName()==="學識淵博" && creator.professionTalentSubject===subj; }
function addTalentInstance(i,subject){
  subject = (subject===undefined?null:subject);
  if(isCreatorTalentBlocked(i)) return;
  const t=CREATOR_TALENTS[i], max=talentMaxCount(i), bonus=profTalentBonus(i);
  if(countTalent(i)+bonus>=max){ showInfo("已達上限",`「${t.name}」最多可選擇 ${max} 次${bonus?`（已含步驟 4 職業天賦 ${bonus} 次）`:""}。`); return; }
  if(t.subjects){ if(subject==null) return; if(isLoreSubjectBlocked(subject)) return; if(hasTalentSubject(i,subject)) return; }
  if(creator.talents.length>=CREATOR_FREE_TALENTS && pointsLeft()<1){ showInfo("創角點數不足","2 個免費天賦（職業天賦＋自選天賦）已用完，再多選 1 個天賦需要 1 點創角點數，但你的點數不足。"); return; }
  creator.talents.push({id:i,subject}); renderCreator();
}
function removeTalentInstance(i,subject){
  subject = (subject===undefined?null:subject);
  for(let k=0;k<creator.talents.length;k++){ const t=creator.talents[k]; if(t.id===i && (subject==null||t.subject===subject)){ creator.talents.splice(k,1); renderCreator(); return; } }
}
function toggleTalentSubject(i,subj){ if(hasTalentSubject(i,subj)) removeTalentInstance(i,subj); else addTalentInstance(i,subj); }
function talentCostTag(i){
  const freeN=CREATOR_FREE_TALENTS, count=countTalent(i);
  if(count===0){ return creator.talents.length<freeN ? `<span class="cost-pill cost-free">免費</span>` : `<span class="cost-pill cost-need">需付 1 點</span>`; }
  let paidCount=0; creator.talents.forEach((t,k)=>{ if(t.id===i && k>=freeN) paidCount++; });
  return paidCount>0 ? `<span class="cost-pill cost-paid">已付 ${paidCount} 點</span>` : `<span class="cost-pill cost-free">免費</span>`;
}
function talentCard(i){
  const t=CREATOR_TALENTS[i], count=countTalent(i), max=talentMaxCount(i), hasSub=!!t.subjects, blocked=isCreatorTalentBlocked(i);
  const bonus=profTalentBonus(i), total=count+bonus;
  let tags="";
  if(blocked){ tags=""; }
  else {
    tags+=talentCostTag(i);
    if(max>1) tags+=`<span class="src-tag free">${isFinite(max)?`可選 ${max} 次`:"可重複"}</span>`;
    if(total>0&&(max>1||hasSub)) tags+=`<span class="src-tag sel">已選 ${total} 次</span>`;
  }
  let control="";
  if(blocked){ control=`<span class="tal-lock">🔒 已作為職業天賦取得，天賦不可重複</span>`; }
  else if(hasSub){
    control=`<div class="tal-subj-row">${t.subjects.map((s,j)=>{
      const on=hasTalentSubject(i,j), sb=isLoreSubjectBlocked(j);
      return `<button class="tal-chip${on?" on":""}${sb?" blocked":""}" data-tal-subj="${i}:${j}"${sb?" disabled":""}>${s.name}${on?" ✓":""}</button>`;
    }).join("")}</div>`;
  }
  else if(max>1){
    control=`<div class="tal-stepper"><button class="btn btn-ghost btn-sm" data-tal-remove="${i}"${count<=0?" disabled":""}>−</button><span class="tal-count display">${total}</span><button class="btn btn-sm" data-tal-add="${i}"${total>=max?" disabled":""}>＋ 選擇</button></div>`;
  }
  else {
    control = count>0 ? `<button class="btn btn-ghost btn-sm" data-tal-remove="${i}">✓ 已選（移除）</button>`
                      : `<button class="btn btn-sm" data-tal-add="${i}">＋ 選擇</button>`;
  }
  const bonusNote = bonus>0 ? `<div class="talent-hint">其中 ${bonus} 次來自步驟 4 的職業天賦（免費）；此天賦最多 ${max} 次，還可再選 ${Math.max(0,max-total)} 次。</div>` : "";
  return `<div class="weak-card${total>0?" on":""}"><div class="weak-head"><span class="weak-name">${t.name}${tags}</span>${hasSub?"":control}</div><div class="weak-desc">${fmtHTML(t.desc)}</div>${hasSub?control:""}${bonusNote}</div>`;
}
function renderTalentStep(){
  const pn=professionTalentName();
  const profLine = pn ? `已獲得職業天賦：<b>${pn}</b>（步驟 4），視為 2 個免費天賦中的 1 個。` : `尚未於步驟 4 選擇職業天賦──那會是你 2 個免費天賦中的第 1 個。`;
  const rows=CREATOR_TALENTS.map((t,i)=>talentCard(i)).join("");
  return `<p class="step-intro">創角時可免費獲得 2 個天賦：1 個職業天賦 + 1 個自選天賦。之後，每花費 1 點創角點數可以額外購買 1 個天賦。</p>
    <div class="prof-talent-notice">${profLine}</div>
    <div class="talent-list">${rows}</div>`;
}
function weaknessPointDelta(){ return -(creator.weaknesses?creator.weaknesses.length:0); } // 每個弱點 +1 創角點數（降低 spent）
function addWeakness(i){
  if(creator.weaknesses.length>=WEAKNESS_MAX){ showInfo("已達上限",`創角時最多只能選擇 ${WEAKNESS_MAX} 個弱點。`); return; }
  if(!WEAKNESSES[i].repeatable && creator.weaknesses.includes(i)) return;
  creator.weaknesses.push(i); renderCreator();
}
function removeWeaknessAt(pos){
  if(pos<0||pos>=creator.weaknesses.length) return;
  if(pointsLeft()<1){ showInfo("點數不足，無法移除","移除此弱點會少 1 點創角點數，但你已花用該點數。請先調整屬性、異能或天賦，再移除弱點。"); return; }
  creator.weaknesses.splice(pos,1); renderCreator();
}
function removeWeaknessId(i){ const pos=creator.weaknesses.indexOf(i); if(pos>=0) removeWeaknessAt(pos); }
function renderWeaknessStep(){
  const cnt=creator.weaknesses.length;
  const intro=`<p class="step-intro">不一定要選擇弱點，但每選 1 個弱點可以額外獲得 1 點創角點數。創角時最多選擇 <b>${WEAKNESS_MAX}</b> 個弱點。</p>`;
  const full=cnt>=WEAKNESS_MAX;
  const rows=WEAKNESSES.map((w,i)=>{
    const count=creator.weaknesses.filter(x=>x===i).length;
    let btn;
    if(count>0&&!w.repeatable){ btn=`<button class="btn btn-ghost btn-sm" data-weak-remove-id="${i}">✓ 已選（移除）</button>`; }
    else if(full){ btn=`<button class="btn btn-sm" disabled>已達上限</button>`; }
    else { btn=`<button class="btn btn-sm" data-weak-add="${i}">＋ 選擇${w.repeatable&&count>0?"（再選 1 次）":""}</button>`; }
    const tags=`${count>0?`<span class="src-tag sel">已選${w.repeatable&&count>1?` ×${count}`:""}</span>`:""}${w.repeatable?`<span class="src-tag free">可重複</span>`:""}`;
    return `<div class="weak-card${count>0?" on":""}"><div class="weak-head"><span class="weak-name">${w.name}${tags}</span>${btn}</div><div class="weak-desc">${fmtHTML(w.desc)}</div></div>`;
  }).join("");
  return intro+`<div class="weak-list">${rows}</div>`;
}
// 創角數據計算（沿用 statModsFromText 解析天賦／異能的數據加成）
function creatorStatBreakdown(){
  const out={health:[],resolve:[],melee:[]};
  const add=(stat,src)=>{ if(!stat)return; ["health","resolve","melee"].forEach(k=>{ if(stat[k]) out[k].push({source:src,amount:stat[k]}); }); };
  (creator.powers||[]).forEach(p=>{const pw=POWERS[p.id]; if(pw&&pw.stat){const mult=(p.level||0)+1; const sc={}; for(const k in pw.stat)sc[k]=pw.stat[k]*mult; const lvl=p.level>0?POWER_LEVELS[p.level]:""; add(sc,`${lvl}${pw.name}（異能）`);}});
  if(creator.profession!=null&&creator.professionTalent!=null){ const pn=CREATOR_PROFESSIONS[creator.profession].talents[creator.professionTalent]; const t=CREATOR_TALENTS.find(x=>x.name===pn); if(t) add(t.stat||statModsFromText(t.desc||""),`${t.name}（職業天賦）`); }
  (creator.talents||[]).forEach(t=>{ const T=CREATOR_TALENTS[t.id]; if(T) add(T.stat||statModsFromText(T.desc||""),`${T.name}（天賦）`); });
  return out;
}
function creatorStatMods(){
  const bd=creatorStatBreakdown(), tot={health:0,resolve:0,melee:0};
  ["health","resolve","melee"].forEach(k=>bd[k].forEach(e=>tot[k]+=e.amount));
  return tot;
}
function creatorDerived(){
  ensureCreatorAttrs(); const a=creator.attrs, ceil=Math.ceil, mod=creatorStatMods();
  return {
    health:ceil((a.格鬥+a.敏捷+a.力量)/2)+mod.health,
    resolve:ceil((a.理智+a.直覺+a.氣場)/2)+mod.resolve,
    melee:ceil(a.力量/2)+mod.melee,
    mod
  };
}
function renderDataStep(){
  if(creator.tier==null) return needTierHint();
  ensureCreatorAttrs();
  const a=creator.attrs, d=creatorDerived(), bd=creatorStatBreakdown();
  const aggregate=(items)=>{ const m=new Map(); items.forEach(e=>{ const cur=m.get(e.source)||{amount:0,count:0}; cur.amount+=e.amount; cur.count++; m.set(e.source,cur); }); return [...m.entries()].map(([source,v])=>({source,amount:v.amount,count:v.count})); };
  const bonusHTML=(items)=>{ const agg=aggregate(items); if(!agg.length) return ""; return `<div class="data-bonus"><div class="data-bonus-head">加成來源</div>${agg.map(e=>`<div class="data-bonus-row"><span>${e.source}${e.count>1?` ×${e.count}`:""}</span><b>+${e.amount}</b></div>`).join("")}</div>`; };
  const card=(label,val,formula,note,items)=>`<div class="data-card"><div class="data-val display">${val}</div><div class="data-label">${label}</div><div class="data-formula">${formula}</div>${bonusHTML(items)}<div class="data-note">${note}</div></div>`;
  return `<p class="step-intro">根據你分配的屬性，自動計算英雄的三項衍生數據。數值會隨屬性與所選天賦／異能即時更新。</p>
    <div class="data-grid">
      ${card("最大生命",d.health,`⌈(格鬥 ${a.格鬥} ＋ 敏捷 ${a.敏捷} ＋ 力量 ${a.力量}) ÷ 2⌉`,"承受「傷害」會減少生命。當生命歸零時，你會因傷害而崩潰。",bd.health)}
      ${card("最大決心",d.resolve,`⌈(理智 ${a.理智} ＋ 直覺 ${a.直覺} ＋ 氣場 ${a.氣場}) ÷ 2⌉`,"承受「壓力」會減少決心。當決心歸零時，你會因壓力而崩潰。",bd.resolve)}
      ${card("基礎肉搏傷害",d.melee,`⌈力量 ${a.力量} ÷ 2⌉`,"近身肉搏攻擊命中時造成的基礎傷害。",bd.melee)}
    </div>`;
}
function togglePersona(p){
  const arr=creator.personalities||(creator.personalities=[]);

}
function addCustomPersona(v){ v=(v||"").trim(); if(!v)return; const arr=creator.personalities||(creator.personalities=[]); if(arr.includes(v))return; if(arr.length>=2){ showInfo("已達上限","個性最多選擇 2 項，請先取消 1 項再選。"); return; } arr.push(v); renderCreator(); }

function selectFlaw(i){ creator.flaw = (creator.flaw===i? null : i); renderCreator(); }

function setCustomFlaw(v){ v=(v||"").trim(); creator.flaw = v||null; renderCreator(); }
function rollPersonalities(){ const p=[]; while(p.length<2){ const r=rand(CREATOR_PERSONALITIES.length); if(!p.includes(r)) p.push(r); } creator.personalities=p.map(i=>CREATOR_PERSONALITIES[i]); }

  else if(kind==="motivation") creator.motivation=rand(CREATOR_MOTIVATIONS.length);

}
function rollAllDetails(){ rollPersonalities(); creator.motivation=rand(CREATOR_MOTIVATIONS.length); creator.flaw=rand(CREATOR_FLAWS.length); renderCreator(); }

      +`<div class="opt${creator.bondMode==="custom"?" sel":""}" data-npc-bond-custom="1" role="button" tabindex="0"><span class="opt-mark"></span><div><span class="opt-name">自創 NPC 關鍵羈絆</span><span class="opt-desc">自行描述 1 段與職業或日常生活有關的重要 NPC 關係。</span></div></div>`

}
function buildCreatorText(){
  const codename=(creator.codename||"").trim()||"（未命名英雄）";
  const tier=creator.tier!=null?TIERS[creator.tier]:null;
  const prof=creator.profession!=null?CREATOR_PROFESSIONS[creator.profession]:null;
  ensureCreatorAttrs();
  let o="超級英雄註冊資料\n";
  o+="代號："+codename+"\n";
  o+="本名："+((creator.realName||"").trim()||"（尚未填寫）")+"\n";
  if(tier) o+="階級："+tier.name+"（"+tier.en+"）\n";
  o+="真實身分："+(creator.identity==="secret"?"保密":creator.identity==="public"?"公開":"（尚未選擇）")+"\n";
  if((creator.appearance||"").trim()) o+="外觀："+creator.appearance.trim()+"\n";
  o+="\n";
  o+="【屬性】"+ATTR_ORDER.map(a=>a+" "+creator.attrs[a]).join("　")+"\n\n";
  const d=creatorDerived();
  o+="【數據】生命 "+d.health+"　決心 "+d.resolve+"　肉搏傷害 "+d.melee+(prof?"　資源 "+prof.resource:"")+"\n\n";
  o+="【異能來源】"+(creator.powerSources.length?creator.powerSources.map(s=>POWER_SOURCES[s].name).join("、"):"（尚未選擇）")+"\n\n";
  o+="【異能】\n";
  if(creator.powers.length){
    o+=creator.powers.map(p=>{
      const pw=POWERS[p.id], nm=(p.level>0?POWER_LEVELS[p.level]:"")+pw.name;
      const src=creator.powerSources.length>1?"（來源："+POWER_SOURCES[powerSrc(p)].name+"）":"";
      let s="◆ "+nm+src+"\n"+indent(fmtTxt(pw.desc));
      if(p.level>0&&pw.levelDesc){const k=POWER_LEVELS[p.level];if(pw.levelDesc[k])s+="\n"+indent("〔"+k+"〕"+fmtTxt(pw.levelDesc[k]),"    ");}
      p.enh.forEach(ei=>{if(pw.enh[ei])s+="\n"+indent("＋強化・"+pw.enh[ei].name+"："+fmtTxt(pw.enh[ei].desc),"    ");});
      p.lim.forEach(li=>{if(pw.lim[li])s+="\n"+indent("－限制・"+pw.lim[li].name+"："+fmtTxt(pw.lim[li].desc),"    ");});
      return s;
    }).join("\n\n")+"\n\n";
  } else o+="（尚未選擇）\n\n";
  if(prof){
    o+="【職業】"+prof.name+"（"+prof.en+"）　資源 "+prof.resource+"\n"+indent(fmtTxt(prof.desc))+"\n";
    const ptName=professionTalentName();
    if(ptName){
      const t=CREATOR_TALENTS.find(x=>x.name===ptName);
      let te=ptName;
      if(t&&t.subjects&&creator.professionTalentSubject!=null) te+="（"+t.subjects[creator.professionTalentSubject].name+"）";
      o+="  ▸ 職業天賦："+te+"\n"+(t?indent(fmtTxt(t.desc),"    ")+"\n":"");
    } else o+="  ▸ 職業天賦：（尚未選擇）\n";
  } else o+="【職業】（尚未選擇）\n";
  o+="\n";
  o+="【自選天賦】\n";
  if(creator.talents.length){
    const ids=[...new Set(creator.talents.map(t=>t.id))];
    o+=ids.map(id=>{
      const T=CREATOR_TALENTS[id], insts=creator.talents.filter(t=>t.id===id);
      let head;
      if(T.subjects){ head="◆ "+T.name+"（"+insts.map(t=>T.subjects[t.subject]?T.subjects[t.subject].name:"?").join("、")+"）"; }
      else head="◆ "+T.name+(insts.length>1?" ×"+insts.length:"");
      return head+"\n"+indent(fmtTxt(T.desc));
    }).join("\n\n")+"\n\n";
  } else o+="（未選，非必填）\n\n";
  o+="【弱點】";
  if(creator.weaknesses.length){ o+="\n"+creator.weaknesses.map(i=>"◆ "+WEAKNESSES[i].name+"\n"+indent(fmtTxt(WEAKNESSES[i].desc))).join("\n")+"\n\n"; }
  else o+="（未選，非必填）\n\n";
  o+="【個性】"+((creator.personalities||[]).length?creator.personalities.join("、"):"（尚未選擇）")+"\n";
  const motTxt = typeof creator.motivation==="string" ? creator.motivation+"（自創）" : (creator.motivation!=null?CREATOR_MOTIVATIONS[creator.motivation].name+"："+CREATOR_MOTIVATIONS[creator.motivation].desc:"（尚未選擇）");
  o+="【動機】"+motTxt+"\n";
  const flTxt = typeof creator.flaw==="string" ? creator.flaw+"（自創）" : (creator.flaw!=null?CREATOR_FLAWS[creator.flaw].name+"："+CREATOR_FLAWS[creator.flaw].desc:"（尚未選擇）");
  o+="【缺陷】"+flTxt+"\n\n";
  o+="【關鍵羈絆】\n";
  o+="  ・PC："+((creator.pcBond||"").trim()||"（未填）")+"\n";
  let npc;
  if(creator.bondMode==="preset"&&creator.bondIdx!=null&&prof) npc=prof.bonds[creator.bondIdx].name+"："+prof.bonds[creator.bondIdx].desc;
  else if(creator.bondMode==="custom") npc=(creator.bondCustom||"").trim()||"（自創，未填）";
  else npc="（未選）";
  o+="  ・NPC："+npc+"\n";
  return o.trimEnd()+"\n";
}
function creatorCompletion(){
  const prof=creator.profession!=null?CREATOR_PROFESSIONS[creator.profession]:null;
  const pt=(prof&&creator.professionTalent!=null)?profTalentObjs(prof)[creator.professionTalent]:null;
  const items=[
    {label:"階級",done:creator.tier!=null,required:true},
    {label:"異能來源",done:creator.powerSources.length>0,required:true},
    {label:"異能",done:creator.powers.length>0,required:true},
    {label:"職業",done:creator.profession!=null,required:true},
    {label:"職業天賦",done:creator.professionTalent!=null&&(!pt||!pt.subjects||creator.professionTalentSubject!=null),required:true},
    {label:"自選天賦",done:creator.talents.length>0,required:false},
    {label:"弱點",done:creator.weaknesses.length>0,required:false},
    {label:"個性（2 項）",done:(creator.personalities||[]).length===2,required:false},
    {label:"動機",done:creator.motivation!=null,required:false},
    {label:"缺陷",done:creator.flaw!=null,required:false},
    {label:"真實姓名",done:!!(creator.realName||"").trim(),required:true},
    {label:"英雄代號",done:!!(creator.codename||"").trim(),required:true},
    {label:"關鍵羈絆（至少 1 個）",done:!!(creator.pcBond||"").trim()||creator.bondMode!=null,required:false}
  ];
  return {items, requiredMissing:items.filter(i=>i.required&&!i.done).map(i=>i.label), recMissing:items.filter(i=>!i.required&&!i.done).map(i=>i.label)};
}
function renderReviewStep(){
  const c=creatorCompletion();
  const checklist=c.items.map(i=>`<div class="review-item${i.done?" done":""}"><span class="review-mark">${i.done?"✓":"•"}</span><span>${i.label}${i.required?'<span class="req">*</span>':""}</span></div>`).join("");
  const note=c.requiredMissing.length===0?`<div class="review-note ok">✓ 必填項目都完成了，可以匯出角色卡。</div>`:`<div class="review-note warn">尚有必填項目未完成：${c.requiredMissing.join("、")}</div>`;
  const text=buildCreatorText();
  return `<p class="step-intro">檢查以下彙整資料。確認無誤後，可匯出文字檔或複製，分享給其他玩家或 GM。</p>

    ${note}
    <div class="preview-label">角色卡預覽</div>
    <pre class="preview">${esc(text)}</pre>
    <div class="builder-actions"><button class="btn btn-gold" onclick="downloadCreatorTxt()">匯出文字檔</button><button class="btn btn-ink" onclick="copyCreatorTxt()">複製文字</button></div>`;
}
function guardCreatorExport(proceed){
  const c=creatorCompletion();
  if(c.requiredMissing.length) showConfirm("還有必填項目尚未完成：\n"+c.requiredMissing.map(m=>"・"+m).join("\n")+"\n\n仍要匯出嗎？",proceed);
  else proceed();
}
function downloadCreatorTxt(){ guardCreatorExport(()=>{ const text=buildCreatorText(); const fname=((creator.codename||"").trim()||"英雄")+"_角色卡.txt"; const blob=new Blob([text],{type:"text/plain;charset=utf-8"}); const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(a.href),1000);showToast("已匯出 "+fname); }); }
function copyCreatorTxt(){ guardCreatorExport(async()=>{ const text=buildCreatorText(); try{await navigator.clipboard.writeText(text);showToast("已複製到剪貼簿");}catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("已複製到剪貼簿");}catch(_){showToast("複製失敗，請手動選取");}document.body.removeChild(ta);} }); }
function stepCountHTML(){
  if(creator.tier==null) return "";
  const st=creator.step;
  if(st===2){ // 3-A 異能來源
    const n=creator.powerSources.length, extra=Math.max(0,n-1), cost=powerSourceCost();
    return `免費 <b>${Math.min(n,1)}</b>/1　額外 <b>${extra}</b>　共花費 <b>${cost}</b> 點`;
  }
  if(st===3){ // 3-B 異能欄位
    return `免費欄位 <b>${freeSlotsUsed()}</b>/${freeSlotsCount()}　額外欄位 <b>${extraSlotsUsed()}</b>/${extraSlotsCount()}`;
  }
  if(st===5){ // 5 天賦
    const chosen=creator.talents.length, free=Math.min(chosen,CREATOR_FREE_TALENTS), paid=Math.max(0,chosen-CREATOR_FREE_TALENTS);
    return `免費 <b>${free}</b>/${CREATOR_FREE_TALENTS}　額外 <b>${paid}</b>　共花費 <b>${paid}</b> 點`;
  }
  if(st===6){ // 6 弱點（每個 +1 點）
    const cnt=creator.weaknesses.length;
    return `弱點 <b>${cnt}</b>/${WEAKNESS_MAX}　共獲得 <b>${cnt}</b> 點`;
  }
  if(st===8){ // 8 補充細節
    const pn=(creator.personalities||[]).length;
    return `個性 <b>${pn}</b>/2　動機 <b>${creator.motivation!=null?1:0}</b>/1　缺陷 <b>${creator.flaw!=null?1:0}</b>/1`;
  }
  if(st===9){ // 9 命名英雄（必填：姓名＋代號）
    const n=((creator.realName||"").trim()?1:0)+((creator.codename||"").trim()?1:0);
    return `必填 <b>${n}</b>/2`;
  }
  return "";
}

function gotoStep(i){
  if(i<0||i>=CREATOR_STEPS.length) return;

}
function selectTier(ti){

function confirmTier(ti){

function wireCreator(){
  if(creatorWired) return; creatorWired=true;
  const body=document.getElementById("creatorBody");
  body.addEventListener("click",e=>{
    const nav=e.target.closest("[data-nav]");
    if(nav){ gotoStep(creator.step+(nav.dataset.nav==="next"?1:-1)); return; }
    const chip=e.target.closest("[data-step]");
    if(chip){ gotoStep(+chip.dataset.step); return; }
    const st=e.target.closest("[data-attr]");
    if(st){ adjustAttr(st.dataset.attr,+st.dataset.delta); return; }
    const srcRoll=e.target.closest("[data-source-roll]");
    if(srcRoll){ rollSource(); return; }
    const src=e.target.closest("[data-source]");
    if(src){ if(!src.classList.contains("disabled")) toggleSource(+src.dataset.source); return; }
    const slotAcq=e.target.closest("[data-slot-acquire]");
    if(slotAcq){ openPowerModalAdd(); return; }
    const slotDis=e.target.closest("[data-slot-discard]");
    if(slotDis){ if(!slotDis.disabled) discardSlot(); return; }
    const addSlotBtn=e.target.closest("[data-add-slot]");
    if(addSlotBtn){ if(!addSlotBtn.disabled) addSlot(); return; }
    const pwEdit=e.target.closest("[data-pw-edit]");
    if(pwEdit){ openPowerModalEdit(+pwEdit.dataset.pwEdit); return; }
    const pwRem=e.target.closest("[data-pw-remove]");
    if(pwRem){ removePower(+pwRem.dataset.pwRemove); return; }
    const pwDetail=e.target.closest("[data-pw-detail]");
    if(pwDetail){ togglePowerDetail(+pwDetail.dataset.pwDetail); return; }
    const prof=e.target.closest("[data-prof]");
    if(prof){ selectProfession(+prof.dataset.prof); return; }
    const profRoll=e.target.closest("[data-prof-roll]");
    if(profRoll){ const k=profRoll.dataset.profRoll; if(k==="talent")rollProfTalent(); else if(k==="subject")rollProfSubj(); else if(k==="bond")rollBond(); return; }
    const bondPick=e.target.closest("[data-bond-custom-pick]");
    if(bondPick){ chooseBondCustom(); return; }
    const ident=e.target.closest("[data-identity]");
    if(ident){ selectIdentity(ident.dataset.identity); return; }
    const weakAdd=e.target.closest("[data-weak-add]");
    if(weakAdd){ if(!weakAdd.disabled) addWeakness(+weakAdd.dataset.weakAdd); return; }
    const weakRem=e.target.closest("[data-weak-remove]");
    if(weakRem){ removeWeaknessAt(+weakRem.dataset.weakRemove); return; }
    const weakRemId=e.target.closest("[data-weak-remove-id]");
    if(weakRemId){ removeWeaknessId(+weakRemId.dataset.weakRemoveId); return; }
    const opt=e.target.closest("[data-group]");
    if(opt&&!opt.classList.contains("disabled")){
      const g=opt.dataset.group, idx=+opt.dataset.idx;
      if(g==="profTalent"){ selectProfTalent(idx); return; }
      if(g==="profSubj"){ selectProfSubj(idx); return; }
      if(g==="bond"){ selectBondPreset(idx); return; }
    }
    const talAdd=e.target.closest("[data-tal-add]");
    if(talAdd){ if(!talAdd.disabled) addTalentInstance(+talAdd.dataset.talAdd); return; }
    const talRem=e.target.closest("[data-tal-remove]");
    if(talRem){ if(!talRem.disabled) removeTalentInstance(+talRem.dataset.talRemove); return; }
    const talSubj=e.target.closest("[data-tal-subj]");
    if(talSubj){ if(!talSubj.disabled){ const [i,j]=talSubj.dataset.talSubj.split(":").map(Number); toggleTalentSubject(i,j); } return; }
    const persona=e.target.closest("[data-persona]");
    if(persona){ if(!persona.disabled) togglePersona(persona.dataset.persona); return; }
    const motiv=e.target.closest("[data-motivation]");
    if(motiv){ selectMotivation(+motiv.dataset.motivation); return; }
    const flaw=e.target.closest("[data-flaw]");
    if(flaw){ selectFlaw(+flaw.dataset.flaw); return; }
    const dRoll=e.target.closest("[data-detail-roll]");
    if(dRoll){ detailRoll(dRoll.dataset.detailRoll); return; }
    if(e.target.closest("[data-detail-rollall]")){ rollAllDetails(); return; }
    if(e.target.closest("[data-detail-clear]")){ clearAllDetails(); return; }
    if(e.target.closest("[data-persona-add]")){ const inp=body.querySelector("[data-persona-custom]"); if(inp) addCustomPersona(inp.value); return; }
    if(e.target.closest("[data-motivation-add]")){ const inp=body.querySelector("[data-motivation-custom]"); if(inp) setCustomMotivation(inp.value); return; }
    if(e.target.closest("[data-flaw-add]")){ const inp=body.querySelector("[data-flaw-custom]"); if(inp) setCustomFlaw(inp.value); return; }
    const npcBond=e.target.closest("[data-npc-bond]");
    if(npcBond){ selectBondPreset(+npcBond.dataset.npcBond); return; }
    if(e.target.closest("[data-npc-bond-custom]")){ chooseBondCustom(); return; }
    if(e.target.closest("[data-npc-bond-roll]")){ rollBond(); return; }
    const tier=e.target.closest("[data-tier]");
    if(tier){ confirmTier(+tier.dataset.tier); return; }
  });
  body.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      const pc=e.target.closest("[data-persona-custom]"); if(pc){ e.preventDefault(); addCustomPersona(pc.value); return; }
      const mc=e.target.closest("[data-motivation-custom]"); if(mc){ e.preventDefault(); setCustomMotivation(mc.value); return; }
      const fc=e.target.closest("[data-flaw-custom]"); if(fc){ e.preventDefault(); setCustomFlaw(fc.value); return; }
    }
    if(e.key!=="Enter"&&e.key!==" ") return;
    const fwd=e.target.closest("[data-prof],[data-bond-custom-pick],[data-group]");
    if(fwd){ e.preventDefault(); fwd.click(); return; }
    const tier=e.target.closest("[data-tier]"), src=e.target.closest("[data-source]");
    if(tier){ e.preventDefault(); confirmTier(+tier.dataset.tier); }
    else if(src){ e.preventDefault(); if(!src.classList.contains("disabled")) toggleSource(+src.dataset.source); }
  });
  body.addEventListener("input",e=>{
    const bc=e.target.closest("[data-bond-custom]");
    if(bc){ creator.bondCustom=bc.value; return; }
    const rn=e.target.closest("[data-real-name]"); if(rn){ creator.realName=rn.value; return; }
    const cn=e.target.closest("[data-codename]"); if(cn){ creator.codename=cn.value; return; }
    const ap=e.target.closest("[data-appearance]"); if(ap){ creator.appearance=ap.value; return; }
    const pb=e.target.closest("[data-pc-bond]"); if(pb){ creator.pcBond=pb.value; return; }
  });
}

function optRow(group,idx,name,desc,selected,disabled,note){

const REPEATABLE_TALENTS=["堅定決心","頑強生命"];
function talentRepeatable(name){ return REPEATABLE_TALENTS.includes(name)||name.indexOf("學識淵博")===0; }
// 回傳「另一來源已選、且不可重複」的天賦名稱（代表此來源不可再選同名天賦）
function blockedTalentName(group){
  const arc=ARCHETYPES[currentIndex];
  if(group==="freeTalent"){
    if(arc.professions&&sel.profession!=null&&sel.professionTalent!=null){
      const n=arc.professions[sel.profession].talents[sel.professionTalent].name;
      if(!talentRepeatable(n)) return n;
    }
  }else if(group==="professionTalent"){
    if(arc.freeTalents&&sel.freeTalent!=null){
      const n=arc.freeTalents[sel.freeTalent].name;
      if(!talentRepeatable(n)) return n;
    }
  }
  return null;
}
function isTalentBlocked(group,idx){
  const arc=ARCHETYPES[currentIndex];
  const blocked=blockedTalentName(group); if(blocked==null) return false;
  const list=group==="freeTalent"?arc.freeTalents:arc.professions[sel.profession].talents;
  return !!(list[idx]&&list[idx].name===blocked);
}
function rollTalent(list,blocked){
  const ok=[]; for(let i=0;i<list.length;i++) if(blocked==null||list[i].name!==blocked) ok.push(i);
  const pool=ok.length?ok:list.map((_,i)=>i);
  return pool[rand(pool.length)];
}
function talentList(group,subjGroup,talents,selIdx,selSubjIdx){
  const blocked=blockedTalentName(group);
  return talents.map((t,i)=>{
    const dis=blocked!=null&&t.name===blocked&&selIdx!==i;
    let html=optRow(group,i,t.name,t.desc,selIdx===i,dis,dis?"此天賦不可重複選取":"");
    if(selIdx===i&&t.subjects){
      html+=`<div class="subject-inline">${secHead("專精主題","1D"+t.subjects.length+" 或自選 1 個",subjGroup)}${t.subjects.map((s,j)=>optRow(subjGroup,j,s.name,s.desc,selSubjIdx===j)).join("")}</div>`;
    }
    return html;
  }).join("");
}

function chooseOption(group,idx){
  if(group==="personalities"){
    const i=sel.personalities.indexOf(idx);
    if(i>=0) sel.personalities.splice(i,1);
    else{ if(sel.personalities.length>=2) sel.personalities.shift(); sel.personalities.push(idx); }
  }else if(group==="profession"){ sel.profession=idx; sel.professionTalent=null; sel.professionTalentSubject=null; }
  else if(group==="professionTalent"){ if(isTalentBlocked("professionTalent",idx)) return; sel.professionTalent=idx; sel.professionTalentSubject=null; }
  else if(group==="freeTalent"){ if(isTalentBlocked("freeTalent",idx)) return; sel.freeTalent=idx; sel.freeTalentSubject=null; }
  else sel[group]=idx;
  reRender();
}
function rollGroup(g){
  const arc=ARCHETYPES[currentIndex];
  if(g==="powerSource") sel.powerSource=rand(arc.powerSource.options.length);
  else if(g==="profession"){sel.profession=rand(arc.professions.length);sel.professionTalent=null;sel.professionTalentSubject=null;}
  else if(g==="professionTalent"){if(sel.profession==null)sel.profession=rand(arc.professions.length);sel.professionTalent=rollTalent(arc.professions[sel.profession].talents,blockedTalentName("professionTalent"));sel.professionTalentSubject=null;}
  else if(g==="professionTalentSubject"){const subs=arc.professions[sel.profession].talents[sel.professionTalent].subjects;sel.professionTalentSubject=rand(subs.length);}
  else if(g==="freeTalent"){sel.freeTalent=rollTalent(arc.freeTalents,blockedTalentName("freeTalent"));sel.freeTalentSubject=null;}
  else if(g==="freeTalentSubject"){const subs=arc.freeTalents[sel.freeTalent].subjects;sel.freeTalentSubject=rand(subs.length);}
  else if(g==="personalities") sel.personalities=pick2(arc.personalities.length);
  else if(g==="motivation") sel.motivation=rand(arc.motivations.length);
  else if(g==="flaw") sel.flaw=rand(arc.flaws.length);
  reRender();
}
function rollAll(){
  const arc=ARCHETYPES[currentIndex];
  if(arc.powerSource) sel.powerSource=rand(arc.powerSource.options.length);
  if(arc.professions){
    sel.profession=rand(arc.professions.length);
    const pf=arc.professions[sel.profession];
    sel.professionTalent=rand(pf.talents.length);
    const pt=pf.talents[sel.professionTalent];
    sel.professionTalentSubject=pt.subjects?rand(pt.subjects.length):null;
  }
  if(arc.freeTalents){
    sel.freeTalent=rollTalent(arc.freeTalents,blockedTalentName("freeTalent"));
    const ft=arc.freeTalents[sel.freeTalent];
    sel.freeTalentSubject=ft.subjects?rand(ft.subjects.length):null;
  }
  if(arc.personalities) sel.personalities=pick2(arc.personalities.length);
  if(arc.motivations) sel.motivation=rand(arc.motivations.length);
  if(arc.flaws) sel.flaw=rand(arc.flaws.length);
  reRender();
}
function reRender(){
  const sc=document.getElementById("builderScreen"),top=sc?sc.scrollTop:0;
  document.getElementById("builderBody").innerHTML=renderBuilderForm();
  if(sc) sc.scrollTop=top;
  syncMobileBar();
}
function clearAll(){sel=blankSel();sel.archIndex=currentIndex;reRender();}

/* ===================== 數據（衍生數值） ===================== */
// 解析單筆敘述中的數據加成（最大生命/最大決心/肉搏傷害 +N）
function statModsFromText(text){
  const m={health:0,resolve:0,melee:0};
  const grab=label=>{const re=new RegExp("`?"+label+"`?\\s*\\+\\s*(\\d+)","g");let mt,s=0;while((mt=re.exec(text)))s+=parseInt(mt[1],10);return s;};
  m.health=grab("最大生命");m.resolve=grab("最大決心");m.melee=grab("肉搏傷害");
  return m;
}
// 蒐集玩家所選天賦（職業天賦＋自選天賦）的數據加成
function collectStatMods(){
  const arc=ARCHETYPES[currentIndex],tot={health:0,resolve:0,melee:0};
  const addStat=s=>{if(!s)return;tot.health+=s.health||0;tot.resolve+=s.resolve||0;tot.melee+=s.melee||0;};
  const addEntry=o=>{if(!o)return;if(o.stat)addStat(o.stat);else addStat(statModsFromText(o.desc||""));};
  // 常駐異能：只採用明確標記的 stat（避免把「發散」「體型變化」等需發動或情境性的加成算進來）
  if(arc.powers) arc.powers.forEach(p=>{if(p.stat)addStat(p.stat);});
  // 所選天賦：有 stat 用 stat，否則解析敘述（例如「你的最大決心 +2」）
  if(arc.professions&&sel.profession!=null&&sel.professionTalent!=null) addEntry(arc.professions[sel.profession].talents[sel.professionTalent]);
  if(arc.freeTalents&&sel.freeTalent!=null) addEntry(arc.freeTalents[sel.freeTalent]);
  return tot;
}
// 計算三項數據（含天賦加成）
function derivedStats(){
  const a=ARCHETYPES[currentIndex].attrs,ceil=Math.ceil,mod=collectStatMods();
  return {
    health:ceil((a.格鬥+a.敏捷+a.力量)/2)+mod.health,
    resolve:ceil((a.理智+a.直覺+a.氣場)/2)+mod.resolve,
    melee:ceil(a.力量/2)+mod.melee,
    mod
  };
}

// 匯出用的數據文字
function buildStatsLine(){const d=derivedStats();return "生命 "+d.health+"　決心 "+d.resolve+"　肉搏傷害 "+d.melee;}

/* ===================== 匯出 ===================== */
function buildText(){
  const arc=ARCHETYPES[currentIndex];
  const hero=sel.hero.trim()||"（未命名英雄）";
  let o="";
  let head="範型："+arc.name+"\n";
  if(arc.role) head+="定位："+arc.role+"\n";
  head+="代號："+hero+"\n";
  if(sel.real.trim()) head+="本名："+sel.real.trim()+"\n";
  if(sel.look.trim()) head+="外觀："+sel.look.trim()+"\n";
  o+=head+"\n";
  o+="【簡介】\n"+arc.intro+"\n\n";
  o+="【屬性】"+ATTR_ORDER.map(a=>a+" "+arc.attrs[a]).join("　")+"\n\n";
  const ds=buildStatsLine();
  o+="【數據】"+ds+"\n\n";
  if(arc.powerSource) o+="【異能來源】"+(sel.powerSource!=null?arc.powerSource.options[sel.powerSource]:"（尚未選擇）")+"\n\n";
  if(arc.powers){o+="【異能】\n"+arc.powers.map(p=>"◆ "+p.name+"\n"+indent(fmtTxt(p.desc))).join("\n\n")+"\n\n";}
  if(arc.professions){
    if(sel.profession!=null){
      const pf=arc.professions[sel.profession];
      o+="【職業】"+pf.name+"\n"+indent(fmtTxt(pf.desc))+"\n";
      if(sel.professionTalent!=null){const te=talentExport(pf.talents[sel.professionTalent],sel.professionTalentSubject);o+="  ▸ 職業天賦："+te.name+"\n"+indent(te.body,"    ")+"\n";}
      else o+="  ▸ 職業天賦：（尚未選擇）\n";
    }else o+="【職業】（尚未選擇）\n";
    o+="\n";
  }
  if(arc.freeTalents){
    if(sel.freeTalent!=null){const te=talentExport(arc.freeTalents[sel.freeTalent],sel.freeTalentSubject);o+="【自選天賦】"+te.name+"\n"+indent(te.body)+"\n\n";}
    else o+="【自選天賦】（尚未選擇）\n\n";
  }
  if(arc.personalities){const ps=sel.personalities.map(i=>arc.personalities[i]);o+="【個性】"+(ps.length?ps.join("、"):"（尚未選擇）")+"\n\n";}
  if(arc.motivations){
    if(sel.motivation!=null){const m=arc.motivations[sel.motivation];o+="【動機】"+m.name+"\n"+indent(fmtTxt(m.desc))+"\n\n";}
    else o+="【動機】（尚未選擇）\n\n";
  }
  if(arc.flaws){
    if(sel.flaw!=null){const f=arc.flaws[sel.flaw];o+="【缺陷】"+f.name+"\n"+indent(fmtTxt(f.desc))+"\n\n";}
    else o+="【缺陷】（尚未選擇）\n\n";
  }
  if(sel.note.trim()) o+="【背景故事】\n"+sel.note.trim()+"\n";
  return o.trimEnd()+"\n";
}
/* ---- 完成度 ---- */
function completion(){
  const arc=ARCHETYPES[currentIndex];const items=[];
  items.push({label:"代號",done:!!sel.hero.trim()});
  if(arc.powerSource) items.push({label:"異能來源",done:sel.powerSource!=null});
  if(arc.professions){
    items.push({label:"職業",done:sel.profession!=null});
    items.push({label:"職業天賦",done:sel.professionTalent!=null});
    if(sel.profession!=null&&sel.professionTalent!=null&&arc.professions[sel.profession].talents[sel.professionTalent].subjects)
      items.push({label:"專精主題（職業天賦）",done:sel.professionTalentSubject!=null});
  }
  if(arc.freeTalents){
    items.push({label:"自選天賦",done:sel.freeTalent!=null});
    if(sel.freeTalent!=null&&arc.freeTalents[sel.freeTalent].subjects)
      items.push({label:"專精主題（自選天賦）",done:sel.freeTalentSubject!=null});
  }
  if(arc.personalities) items.push({label:"個性（2 項）",done:sel.personalities.length===2});
  if(arc.motivations) items.push({label:"動機",done:sel.motivation!=null});
  if(arc.flaws) items.push({label:"缺陷",done:sel.flaw!=null});
  return {done:items.filter(i=>i.done).length,total:items.length,missing:items.filter(i=>!i.done).map(i=>i.label)};
}
function progressHTML(){
  const c=completion(),pct=c.total?Math.round(c.done/c.total*100):100,ok=c.done===c.total;
  return `<div class="progress-bar"><span style="width:${pct}%;background:${ok?'var(--green)':'var(--gold)'}"></span></div><div class="progress-text">${ok?'✓ 必選項目都完成了':'已完成 '+c.done+' / '+c.total+' 項'}</div>`;
}
function mbProgressHTML(){const c=completion();return c.done===c.total?'<span class="mb-done">✓ 必選項目已完成</span>':'已完成 '+c.done+' / '+c.total+' 項';}
function syncMobileBar(){const m=document.getElementById("mbProgress");if(m)m.innerHTML=mbProgressHTML();}

/* ---- 匯出（含完成度提醒） ---- */
function guardExport(proceed){
  const c=completion();
  if(c.missing.length) showConfirm("還有以下項目尚未完成：\n"+c.missing.map(m=>"・"+m).join("\n"),proceed);
  else proceed();
}
function downloadTxt(){guardExport(doDownload);}
function doDownload(){
  const text=buildText(),arc=ARCHETYPES[currentIndex];
  const fname=((sel.hero.trim()||arc.name))+"_角色卡.txt";
  const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  showToast("已匯出 "+fname);
}
function copyTxt(){guardExport(doCopy);}
async function doCopy(){
  const text=buildText();
  try{await navigator.clipboard.writeText(text);showToast("已複製到剪貼簿");}
  catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("已複製到剪貼簿");}catch(_){showToast("複製失敗，請手動選取");}document.body.removeChild(ta);}
}

/* ---- 角色資料編碼（供存檔／讀取使用） ---- */
function buildPayload(){const arc=ARCHETYPES[currentIndex];return {a:arc.name,h:sel.hero,r:sel.real,l:sel.look,n:sel.note,ps:sel.powerSource,pf:sel.profession,pt:sel.professionTalent,pts:sel.professionTalentSubject,ft:sel.freeTalent,fts:sel.freeTalentSubject,pe:sel.personalities,mo:sel.motivation,fl:sel.flaw};}
function applyPayload(p){
  const idx=ARCHETYPES.findIndex(a=>a.name===p.a);if(idx<0)return false;
  currentIndex=idx;sel=blankSel();sel.archIndex=idx;
  sel.hero=p.h||"";sel.real=p.r||"";sel.look=p.l||"";sel.note=p.n||"";
  sel.powerSource=p.ps??null;sel.profession=p.pf??null;sel.professionTalent=p.pt??null;sel.professionTalentSubject=p.pts??null;
  sel.freeTalent=p.ft??null;sel.freeTalentSubject=p.fts??null;
  sel.personalities=Array.isArray(p.pe)?p.pe:[];sel.motivation=p.mo??null;sel.flaw=p.fl??null;
  return true;
}

/* ---- 本機存檔（localStorage；需下載檔案後在瀏覽器開啟才能用） ---- */
const STORE_KEY="heroBuilds_v1";
function storageAvailable(){try{const k="__t";localStorage.setItem(k,"1");localStorage.removeItem(k);return true;}catch(e){return false;}}
function storageGet(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||"[]");}catch(e){return [];}}
function storageSet(a){try{localStorage.setItem(STORE_KEY,JSON.stringify(a));return true;}catch(e){return false;}}
function saveBuild(){
  if(!storageAvailable()){showToast("此環境無法儲存，請下載檔案後在瀏覽器開啟");return;}
  const arc=ARCHETYPES[currentIndex],builds=storageGet();
  builds.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),ts:Date.now(),name:arc.name,hero:sel.hero.trim(),data:buildPayload()});
  storageSet(builds);showToast("已儲存角色");renderSaves();
}
function loadBuild(p){if(applyPayload(p))openBuilder();}
function renderSaves(){
  const el=document.getElementById("savesSection");if(!el)return;
  const builds=storageAvailable()?storageGet():[];
  if(!builds.length){el.innerHTML="";return;}
  el.innerHTML='<h2 class="saves-title display">我的存檔</h2><div class="saves-list">'+builds.map(b=>{
    const d=new Date(b.ts),date=(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    return '<div class="save-item"><div class="save-meta"><span class="save-name display">'+esc(b.hero||"（未命名英雄）")+'</span><span class="save-sub">'+esc(b.name)+" · "+date+'</span></div><div class="save-btns"><button class="save-load" data-id="'+b.id+'">載入</button><button class="save-del" data-id="'+b.id+'">刪除</button></div></div>';
  }).join("")+'</div>';
}

/* ---- 完成度提醒對話框 ---- */
let _modalOk=null;
function showConfirm(msg,onOk){_modalOk=onOk;document.getElementById("modalBody").textContent=msg;document.getElementById("modal").classList.add("on");}
function hideModal(){document.getElementById("modal").classList.remove("on");_modalOk=null;}

let _choiceHandlers=[];
function showChoice(title,bodyHTML,options){
  document.getElementById("choiceTitle").textContent=title;
  document.getElementById("choiceBody").innerHTML=bodyHTML;
  _choiceHandlers=options.map(o=>o.onClick||null);
  document.getElementById("choiceActions").innerHTML=options.map((o,i)=>`<button class="btn ${o.cls||"btn-ghost"}" data-choice="${i}">${o.label}</button>`).join("");
  document.getElementById("choiceModal").classList.add("on");
}
function hideChoice(){document.getElementById("choiceModal").classList.remove("on");_choiceHandlers=[];}
function showInfo(title,msg){ showChoice(title,`<div class="choice-desc">${msg}</div>`,[{label:"知道了",cls:"btn-gold",onClick:null}]); }

/* ===================== 共用 ===================== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{s.classList.remove("on");s.scrollTop=0;});
  document.getElementById(id).classList.add("on");window.scrollTo(0,0);
  document.documentElement.style.overflow="hidden";
}
function goHome(){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));document.documentElement.style.overflow="";window.scrollTo(0,0);}
function showLanding(){document.getElementById("landing").style.display="";document.getElementById("registry").style.display="none";window.scrollTo(0,0);}
function showRegistry(){document.getElementById("landing").style.display="none";document.getElementById("registry").style.display="";renderSaves();window.scrollTo(0,0);}
let toastTimer;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200);}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(document.getElementById("choiceModal").classList.contains("on")) hideChoice();
    else if(document.getElementById("powerModal").classList.contains("on")) closePowerModal();
    else if(document.getElementById("profModal").classList.contains("on")) closeProfModal();
    else if(document.getElementById("modal").classList.contains("on")) hideModal();
    else if(document.getElementById("builderScreen").classList.contains("on")||document.getElementById("creatorScreen").classList.contains("on")) goHome();
  }
});

document.getElementById("modalOk").addEventListener("click",()=>{const f=_modalOk;hideModal();if(f)f();});
document.getElementById("modalCancel").addEventListener("click",hideModal);
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")hideModal();});
document.getElementById("choiceActions").addEventListener("click",e=>{const b=e.target.closest("[data-choice]");if(!b)return;const f=_choiceHandlers[+b.dataset.choice];hideChoice();if(f)f();});
document.getElementById("choiceModal").addEventListener("click",e=>{if(e.target.id==="choiceModal")hideChoice();});

document.getElementById("powerModal").addEventListener("click",e=>{
  if(e.target.id==="powerModal"){ closePowerModal(); return; }
  if(e.target.closest("[data-goto-sources]")){ creator.powerModal=null; gotoStep(2); return; }
  if(e.target.closest("[data-pw-modal-close]")){ closePowerModal(); return; }
  if(e.target.closest("[data-pw-modal-remove]")){ removePowerFromModal(); return; }
  const buy=e.target.closest("[data-add-slot]");
  if(buy){ if(!buy.disabled) addSlot(); return; }
  const cat=e.target.closest("[data-cat]");
  if(cat){ const t=cat.dataset.cat; const willExpand=(creator.powerModal.collapsed[t]!==false); creator.powerModal.collapsed={}; if(willExpand) creator.powerModal.collapsed[t]=false; const inner=document.getElementById("pwModalListInner"); if(inner) inner.innerHTML=renderPowerListInner(); return; }
  const pick=e.target.closest("[data-pw-pick]");
  if(pick&&!pick.classList.contains("taken")){ pickPowerInModal(+pick.dataset.pwPick); return; }
  const srcBtn=e.target.closest("[data-pw-src]");
  if(srcBtn){ const [id,s]=srcBtn.dataset.pwSrc.split(":").map(Number); setPowerSource(id,s); return; }
  const lv=e.target.closest("[data-pw-level]");
  if(lv){ if(!lv.classList.contains("disabled")){ const [id,li]=lv.dataset.pwLevel.split(":").map(Number); setPowerLevel(id,li); } return; }
  const enh=e.target.closest("[data-pw-enh]");
  if(enh){ if(!enh.classList.contains("disabled")){ const [id,ei]=enh.dataset.pwEnh.split(":").map(Number); togglePwEnh(id,ei); } return; }
  const lim=e.target.closest("[data-pw-lim]");
  if(lim){ const [id,li]=lim.dataset.pwLim.split(":").map(Number); clickLimit(id,li); return; }
});
document.getElementById("powerModal").addEventListener("input",e=>{
  const se=e.target.closest("[data-pw-search]");
  if(se){ creator.powerModal.search=se.value; const inner=document.getElementById("pwModalListInner"); if(inner) inner.innerHTML=renderPowerListInner(); }
});
document.getElementById("powerModal").addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ") return;
  if(e.target.closest("[data-pw-search]")) return;          // 搜尋框照常輸入
  const t=e.target.closest("[data-cat],[data-pw-pick],[data-pw-enh],[data-pw-lim]");
  if(t&&!t.classList.contains("disabled")&&!t.classList.contains("taken")){ e.preventDefault(); t.click(); }
});
document.getElementById("profModal").addEventListener("click",e=>{
  if(e.target.id==="profModal"){ closeProfModal(); return; }
  const closeBtn=e.target.closest("[data-prof-modal-close]");
  if(closeBtn){ if(!closeBtn.disabled) closeProfModal(); return; }
  const profRoll=e.target.closest("[data-prof-roll]");
  if(profRoll){ const k=profRoll.dataset.profRoll; if(k==="talent")rollProfTalent(); else if(k==="subject")rollProfSubj(); else if(k==="bond")rollBond(); return; }
  const bondPick=e.target.closest("[data-bond-custom-pick]");
  if(bondPick){ chooseBondCustom(); return; }
  const opt=e.target.closest("[data-group]");
  if(opt&&!opt.classList.contains("disabled")){ const g=opt.dataset.group, idx=+opt.dataset.idx; if(g==="profTalent")selectProfTalent(idx); else if(g==="profSubj")selectProfSubj(idx); else if(g==="bond")selectBondPreset(idx); return; }
});
document.getElementById("profModal").addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ") return;
  if(e.target.closest("[data-bond-custom]")) return;        // 自創羈絆輸入框照常輸入
  const t=e.target.closest("[data-prof-roll],[data-bond-custom-pick],[data-group],[data-prof-modal-close]");
  if(t&&!t.classList.contains("disabled")&&!t.disabled){ e.preventDefault(); t.click(); }
});
document.getElementById("profModal").addEventListener("input",e=>{
  const bc=e.target.closest("[data-bond-custom]");
  if(bc){ creator.bondCustom=bc.value; }
});
document.getElementById("savesSection").addEventListener("click",e=>{
  const load=e.target.closest(".save-load"),del=e.target.closest(".save-del");
  if(load){const b=storageGet().find(x=>x.id===load.dataset.id);if(b)loadBuild(b.data);}
  else if(del){storageSet(storageGet().filter(x=>x.id!==del.dataset.id));renderSaves();}
});
document.getElementById("landArchetype").addEventListener("click",showRegistry);
document.getElementById("landCustom").addEventListener("click",openCreator);
renderSaves();
</script>
